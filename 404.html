<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body { 
            font-family: 'Georgia', sans-serif;  
            /* Using the exact deep purple and dark teal tones from the 1st image */
            background: radial-gradient(circle at 20% 30%, rgba(43, 24, 69, 0.6) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(13, 43, 46, 0.7) 0%, transparent 50%),
                        #090b0e;
            background-size: 200% 200%;
            animation: ambientPulse 12s ease-in-out infinite;
            color: #c9d1d9; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            overflow: hidden;
        }
        
        /* Smoothly shifts the light coordinates so the purple and teal switch fields */
        @keyframes ambientPulse {
            0% {
                background-position: 0% 0%;
            }
            50% {
                background-position: 100% 100%;
            }
            100% {
                background-position: 0% 0%;
            }
        }

        .error-container { max-width: 500px; }
        
        .error-code-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 140px;
            font-weight: 600;
            line-height: 1;
            letter-spacing: -2px;
            color: #f0f6fc;
            user-select: none;
            margin-bottom: 24px;
            text-shadow: 0 4px 25px rgba(0, 0, 0, 0.6);
        }
        
        .logo-container {
            width: 130px;
            height: 130px;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            overflow: hidden; 
            box-shadow: 0 0 35px rgba(147, 85, 224, 0.2);
            animation: logoGlow 6s ease-in-out infinite alternate;
        }
        
        @keyframes logoGlow {
            0% { box-shadow: 0 0 25px rgba(147, 85, 224, 0.15); }
            100% { box-shadow: 0 0 45px rgba(163, 100, 212, 0.35); }
        }

        .logo-img { width: 100%; height: 100%; object-fit: cover; }
        h2 { font-size: 24px; font-weight: 700; margin: 0 0 8px 0; color: #f0f6fc; }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code-wrapper">
            <span>4</span>
            <div class="logo-container">
                <img src="assets/pictures/1780995787737.jpeg" alt="Logo" class="logo-img">
            </div>
            <span>4</span>
        </div>
        <h2>Didn’t find anything here!</h2>
    </div>
</body>
</html>
