<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvalonFlow</title>

      <!-- Favicon as .ico -->
<link rel="icon" href="/favicon.png" type="image/png" sizes="48x48">

    <!-- Structured Data for Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AvalonFlow",
      "url": "https://avalonflow.site",
      "logo": "https://avalonFlow.site/favicon.png"
    }
</script>

<style>
        /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

/* ================= Header Logo Card Neon ================= */

.minimal-logo-header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 70px 0 30px 0;
  background: transparent;
}

/* Clean, open wrapper for the image layer */
.logo-shimmer-wrapper {
  position: relative;
  display: inline-block;
}

.avalon-logo-img {
  display: block;
  width: 95px; /* Clean mobile display width */
  height: auto;
  margin: 0 auto;

  /* KEEP COLORS ORIGINAL & VIBRANT */
  mix-blend-mode: normal; 
  filter: none; 

  /* ACCURATE CONTOUR CROP: Drops background corners seamlessly without cutting into the logo */
  clip-path: url(#logo-contour);
  -webkit-clip-path: url(#logo-contour);

  /* Creates a moving light pass directly on the image graphics */
  -webkit-mask-image: linear-gradient(
    -75deg, 
    rgba(0, 0, 0, 1) 35%, 
    rgba(255, 255, 255, 0.45) 50%, 
    rgba(0, 0, 0, 1) 65%
  );
  mask-image: linear-gradient(
    -75deg, 
    rgba(0, 0, 0, 1) 35%, 
    rgba(255, 255, 255, 0.45) 50%, 
    rgba(0, 0, 0, 1) 65%
  );
  
  /* Stretches the mask size so it can slide across from side to side */
  -webkit-mask-size: 400% 100%;
  mask-size: 400% 100%;
  
  -webkit-mask-position: 0% 0%;
  mask-position: 0% 0%;
  
  /* Triggers the smooth, realistic glare animation */
  animation: dynamicLightPass 4s infinite ease-in-out;
}

/* The Glare Animation Keyframes */
@keyframes dynamicLightPass {
  0% {
    -webkit-mask-position: 0% 0%;
    mask-position: 0% 0%;
  }
  65% {
    -webkit-mask-position: 100% 0%;
    mask-position: 100% 0%; /* Glides the highlight entirely across the logo */
  }
  100% {
    -webkit-mask-position: 100% 0%;
    mask-position: 100% 0%; /* Elegant pause before restarting */
  }
}









    footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 18px 0;
    font-size: 14px;
    color: #555;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.08);
    z-index: 6;
}
    </style>
</head>
<body>
    <!-- Floating Background -->
    <div id="floating-bg"></div>

<header class="minimal-logo-header">
  <div class="logo-shimmer-wrapper">
    <img src="assets/pictures/favicon.png" alt="Avalon Logo" class="avalon-logo-img">
  </div>
</header>

<svg width="0" height="0" style="position: absolute; pointer-events: none;">
  <defs>
    <clipPath id="logo-contour" clipPathUnits="objectBoundingBox">
      <path d="M 0.5 0.02 
               C 0.55 0.05, 0.78 0.45, 1.00 0.82 
               C 1.0 1.88, 1.40 0.64, 0.82 0.92
               C 0.72 0.88, 0.60 0.72, 0.50 0.85
               C 0.60 0.98, 0.22 0.96, 0.12 0.92
               C 0.02 0.88, 0.22 0.45, 0.45 0.05 
               Z" />
    </clipPath>
  </defs>
</svg>






    <!-- Sticky Footer -->
    <footer>
        © 2026 AvalonFlow • Powered by Centrical™
    </footer>

    <script>
        /* ---------- Floating Particles ---------- */
        const bg = document.getElementById('floating-bg');
        const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
        function particle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random()*20+10;
            p.style.width = s+'px';
            p.style.height = s+'px';
            p.style.left = Math.random()*100+'vw';
            p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
            p.style.animationDuration = (Math.random()*20+10)+'s';
            bg.appendChild(p);
            setTimeout(()=>p.remove(),30000);
        }
        setInterval(particle,800);
</script>

</body>
</html>
