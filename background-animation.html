#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

/* ================= Header Logo Card Neon ================= */

.minimal-logo-header {
  display: flex;
  justify-content: center;
  align-items: center;

  /* Reduced top padding dramatically so it sits near the top edge */
  padding: 10px 0 10px 0; 

  /* Optional: Ensures it stays firmly at the absolute top of the page layout */
  width: 100%;
  margin-top: -82px; 

  background: transparent !important;
}

.logo-shimmer-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  overflow: hidden;
  background: transparent !important; /* Kept perfectly transparent, no card background */
}

.avalon-logo-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;

  /* Keep your logo scaling */
  transform: scale(0.40);
  transform-origin: center center;

  /* ---------- LOGO GLASS EFFECT ---------- */
  /* This blurs the particles directly through the transparent logo asset itself */
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0.9; 
  /* -------------------------------------- */

  filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.05));
  mix-blend-mode: multiply; 
  background:  transparent !important;
  border: none !important;            
  outline: none !important;
}

:root {
  /* Gemini Live Cloud inspired base variables */
  --glass-bg: rgba(15, 23, 42, 0.35); /* Deeper Slate-Blue tint to anchor the glowing cloud colors */
  --glass-border: rgba(255, 255, 255, 0.08);

  /* The iconic Gemini multi-chromatic glow palette */
  --gemini-blue: #3b82f6;
  --gemini-purple: #a855f7;
  --gemini-cyan: #06b6d4;
  --neon-glow: rgba(59, 130, 246, 0.35); 
}

/* 1. Master Container & Sizing Controllers */
.assistant-dock-wrap {
  position: fixed;
  bottom: 70px; /* Kept your adjusted alignment clear of the footer */
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  width: 100%;
  max-width: 380px; /* Compact width when collapsed */
  padding: 0 16px;
  box-sizing: border-box;
  transition: max-width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Active Expanded State via JS */
.assistant-dock-wrap.expanded {
  max-width: 500px; /* Expands wider smoothly when open */
}

/* 2. The Glass Morphic Shield with Live Cloud Integration */
.glass-dock {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(210%); /* Increased blur/saturate to maximize cloud blending */
  -webkit-backdrop-filter: blur(20px) saturate(210%);
  border: 1px solid var(--glass-border);
  border-radius: 40px; /* Deep rounded pill look */
  padding: 12px 24px;
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5),
              0 0 0 1px rgba(255, 255, 255, 0.02) inset;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  overflow: hidden;
  
  /* REMOVES THE BLUE TAP HIGHLIGHT ON MOBILE DEVICES */
  -webkit-tap-highlight-color: transparent;
}

/* 2. Enhanced Ambient Cloud Background */
.glass-dock::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border-radius: inherit; /* Matches pill curvature flawlessly */
  
  /* A seamless multi-stop gradient designed to loop beautifully */
  background: linear-gradient(
    135deg,
    rgba(6, 182, 212, 0.2),  /* Cyan */
    rgba(59, 130, 246, 0.15), /* Blue */
    rgba(168, 85, 247, 0.2),  /* Purple */
    rgba(6, 182, 212, 0.2)   /* Loop anchor back to Cyan */
  );
  
  /* Blown up wide so we can pan smoothly across the color landscape */
  background-size: 400% 400%; 
  z-index: 0;
  animation: fluidCloud 12s ease infinite;
  pointer-events: none;
}

/* Fluid Cloud Ambient Flow Animation */
@keyframes fluidCloud {
  0% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
  100% {
    background-position: 0% 50%;
  }
}

/* Hover glow depth over background ambient gradients */
.glass-dock:hover {
  border-color: rgba(6, 182, 212, 0.35); /* Shifting edge highlight to Cyan */
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6),
              0 0 20px var(--neon-glow);
}

/* Structural shifts when the capsule opens into a card */
.assistant-dock-wrap.expanded .glass-dock {
  border-radius: 24px; /* Softens smoothly back into a card layout */
  padding: 20px;
  cursor: default;
}

/* Ensure inner content loads cleanly ABOVE the animated cloud background */
.dock-collapsed-view, .dock-expanded-view {
  position: relative;
  z-index: 1;
}

/* 3. Collapsed View Inner Elements Alignment */
.dock-collapsed-view {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  width: 100%;
}

.status-indicator.active {
  width: 8px;
  height: 8px;
  background-color: var(--gemini-cyan); /* Matches the alive voice state */
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gemini-cyan);
  flex-shrink: 0;
}

.dock-text {
  color: rgba(255, 255, 255, 0.92);
  font-size: 14px;
  font-weight: bold;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 4. Pure Voice Transcript Panel Design */
.dock-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.dock-header h4 {
  margin: 0;
  color: rgba(255, 255, 255, 0.6);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.close-btn {
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.4);
  font-size: 20px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color 0.2s ease;
}

.close-btn:hover {
  color: #ef4444;
}

.voice-transcript-canvas {
  width: 100%;
  min-height: 80px;
  max-height: 180px;
  overflow-y: auto;
  padding-right: 4px;
}

.streaming-text {
  color: #ffffff;
  font-size: 16px;
  line-height: 1.5;
  font-weight: 400;
  margin: 0;
  letter-spacing: -0.1px;
}

/* Smooth internal text entry to match expanding container curve */
.dock-expanded-view {
  animation: contentReveal 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards;
}

@keyframes contentReveal {
  0% {
    opacity: 0;
    transform: translateY(8px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 5. Kinetic Audio Wave Engine (Refined Fluid Motion) */
.audio-wave-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 20px;
  margin-left: auto; /* Force-pins visualizer directly to the right edge */
  flex-shrink: 0;
}

.audio-wave-pill .stroke {
  display: block;
  background: linear-gradient(to top, var(--gemini-cyan), var(--gemini-blue), var(--gemini-purple));
  height: 100%;
  width: 3px;
  border-radius: 10px;
  animation: dynamicPulse 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  transform-origin: center;
}

/* Staggering target heights and cycles for voice realism without layout thrashing */
.audio-wave-pill .stroke:nth-child(1) { --max-h: 0.5; animation-delay: 0.1s; animation-duration: 0.75s; }
.audio-wave-pill .stroke:nth-child(2) { --max-h: 0.9; animation-delay: 0.25s; animation-duration: 0.9s; }
.audio-wave-pill .stroke:nth-child(3) { --max-h: 0.6; animation-delay: 0.0s; animation-duration: 0.7s; }
.audio-wave-pill .stroke:nth-child(4) { --max-h: 1.0; animation-delay: 0.4s; animation-duration: 1.1s; }
.audio-wave-pill .stroke:nth-child(5) { --max-h: 0.4; animation-delay: 0.15s; animation-duration: 0.65s; }

@keyframes dynamicPulse {
  0%, 100% { 
    transform: scaleY(0.2); 
    opacity: 0.6;
  }
  50% { 
    transform: scaleY(var(--max-h)); 
    opacity: 1;
  }
}

.d-none {

  try {
    // Prevent duplicate logs in the same session
    if (sessionStorage.getItem('visitor_logged_tg')) return;

    // Fetch network layout IP metadata cleanly
    const ipResponse = await fetch('https://ipapi.co/json/').catch(() => null);
    const ipData = ipResponse ? await ipResponse.json() : {};

      device: navigator.userAgent,
      language: navigator.language,
      platform: navigator.platform,
      screenResolution: `${window.screen.width}x${window.screen.height}`,
      ip: ipData.ip || "Unknown",

      region: ipData.region || "Unknown",

                        `📱 *Device Setup:* ${payload.device}\n` +
                        `📐 *Screen Res:* ${payload.screenResolution}\n` +
                        `⏰ *Time:* ${payload.timestamp}`;

function normalize(text) {
  return text.toLowerCase().replace(/[^\w\s]/g, '');
}

function similarity(a, b){
    const aWords = normalize(a).split(' ');
    const bWords = normalize(b).split(' ');
    const important = ['password','ticket','support','billing','plan','rewards','custom','cycle','bond','app','notification'];
    let score = 0;
    aWords.forEach(w=>{
        if(bWords.includes(w)){
            score += important.includes(w) ? 2 : 1;
        }
    });
    return score / bWords.length;
}

function findFAQByIntent(input) {
  const text = input.toLowerCase();
  let bestKey = null;
  let maxSim = 0;

  // Scan the Premium Vault text keys to determine the best response phrase match
  for (const key of Object.keys(PREMIUM_AUDIO_VAULT)) {
    const simScore = similarity(text, key);
    if (simScore > maxSim) {
      maxSim = simScore;
      bestKey = key;
    }
  }
  return maxSim > 0.25 ? bestKey : null;
}

function getTypingDelay(text) {
  return Math.min(100 + text.length * 5, 300);
}

function toggleDock(forcedState = null) {
  const dockWrap = document.querySelector('.assistant-dock-wrap');
  const collapsedView = document.getElementById('collapsedView');
  const expandedView = document.getElementById('expandedView');
  const dockStatusText = document.getElementById('dockStatusText');

  if (!dockWrap || !collapsedView || !expandedView) return;

  const currentlyExpanded = dockWrap.classList.contains('expanded');
  const targetState = forcedState !== null ? forcedState : !currentlyExpanded;

  if (targetState === currentlyExpanded) return; 

  if (targetState === true) {
    dockWrap.classList.add('expanded');
    setTimeout(() => {
      collapsedView.classList.add('d-none');
      expandedView.classList.remove('d-none');
    }, 150);
  } else {
    stopActiveKairosVoice();
    killSpeechEngineCompletely();

    collapsedView.classList.remove('d-none');

function generateFollowUp(msg) {
  const text = msg.toLowerCase();
  if (text.length < 5) return "Can you tell me a bit more about what you need?";
  if (/help|issue|problem|error|not working/.test(text)) return "Got you. Is this about a payment, account access, or something else?";
  if (text.includes("?")) return "Are you asking about support, rewards, or your account?";
  if (/money|earn|profit/.test(text)) return "Do you want to check your reward progress or understand how it works?";
  return "What would you like help with—support, rewards, or dashboard settings?";
}

function detectIntent(msg){
    const text = msg.toLowerCase();
    if(/light mode|too dark|increase brightness/.test(text)) return {type:'theme', value:'light'};
    if(/dark mode|too bright|reduce brightness/.test(text)) return {type:'theme', value:'dark'};
    if(/ticket|complaint/.test(text)) return {type:'ticket'};
    if(/logout|sign out/.test(text)) return {type:'logout'};
    return {type:'chat'};
}

function generateSmartReply(msg) {
  const text = msg.toLowerCase();
  const shortReply = msg.trim().split(" ").length <= 2;

  if (personality.lastIntent === "faq" && shortReply) {
    personality.lastIntent = null;
    return "Want me to break that specific resolution down step-by-step?";
  }

  const localFAQMatch = findFAQByIntent(msg);
  if (localFAQMatch) {
    personality.lastIntent = "faq";
    return localFAQMatch;
  }

  const last = conversationMemory.slice(-2).map(m => m.content).join(" ").toLowerCase();
  const lastBot = conversationMemory.filter(m => m.role === "bot").slice(-1)[0]?.content.toLowerCase() || "";

  if (last.includes("password") && text.includes("not working")) {
    return "Got it—you’re having trouble resetting your password. Are you seeing an error or just not receiving the link?";
  }
  if (last.includes("ticket") && /not working|failed|error/.test(text)) {
    return "Is the ticket not generating or are you not seeing it in your dashboard?";
  }

  if (/yes|yeah|sure|ok/.test(text) && lastBot.includes("ticket")) {
    if (typeof generateTicket === "function") generateTicket();
    return "Done. Your support ticket has been created seamlessly.";
  }

  if (/no|not really/.test(text)) return "Alright. What would you like help with instead?";

  if (/reward balance|progress|earnings balance|cashback/.test(text)) {
    let unlocked = JSON.parse(localStorage.getItem('unlockedPlans')) || {};
    let unlockTimes = JSON.parse(localStorage.getItem('unlockTimes')) || {};
    let res = "Bond progress:\n";
    let activeAny = false;

    ['premium', 'basic', 'lite', 'custom'].forEach(plan => {
      if (unlocked[plan]) {
        activeAny = true;
        const now = Date.now();
        const elapsed = now - (unlockTimes[plan] || now);
        const total = plan === 'premium' ? 14 * 86400000 : plan === 'basic' ? 28 * 86400000 : 42 * 86400000;
        const percent = Math.min(100, Math.round((elapsed / total) * 100));
        res += `${plan}: ${percent}%\n`;
      } else {
        res += `${plan}: Locked\n`;
      }
    });
    return activeAny ? res : "Bond progress:\npremium: Locked\nbasic: Locked\nlite: Locked\ncustom: Locked";
  }

  return generateFollowUp(msg);
}

function adaptTone(msg) {
  const text = msg.toLowerCase();
  if (/frustrated|angry|not working|annoying|stupid/.test(text)) {
    personality.tone = "calm";
    personality.userMood = "frustrated";
  } else if (/thanks|nice|good|perfect/.test(text)) {
    personality.tone = "friendly";
    personality.userMood = "positive";
  } else {
    personality.tone = "neutral";
  }
}

function humanize(text) {
  if (!text) return "";
  const fillers = ["", "", "Alright… ", "Okay, so ", "Got it. ", "Hmm, ", "Let me see… ", "Right, ", "Makes sense. "];
  let prefix = fillers[Math.floor(Math.random() * fillers.length)];

  if (personality.tone === "calm") prefix = "I get how that can be frustrating. ";
  if (personality.tone === "friendly") return prefix + text + " 👍";
  return prefix + text;
}

async function processUserCommandLocally(commandText) {
  const transcriptCanvas = document.getElementById('kairosTranscript');
  const lowerCommand = commandText.trim().toLowerCase();

  if (transcriptCanvas) transcriptCanvas.innerText = "Thinking...";

  const deckA = document.getElementById('audioDeckA');
  const deckB = document.getElementById('audioDeckB');
  let currentLiveDeck = activeDeck;

  // --- INTERACTIVE MEDIA CONTROLS INTERCEPTORS ---
  if (
      lowerCommand === "pause" || 
      /\b(pause|stop|halt|freeze|hold)\b/.test(lowerCommand) && /\b(music|audio|song|track|playing|it)\b/.test(lowerCommand)
  ) {
      if (currentLiveDeck && !currentLiveDeck.paused) {
          currentLiveDeck.pause();
          speakResponse("music paused let me know when you want to resume");
      } else {
          speakResponse("there is no music playing right now");
      }
      return;
  }

  if (
      lowerCommand === "resume" || lowerCommand === "continue" || lowerCommand === "unpause" ||
      /\b(resume|continue|unpause)\b/.test(lowerCommand) ||
      /\b(play|start)\b/.test(lowerCommand) && /\b(again|music|track|song|audio|it)\b/.test(lowerCommand)
  ) {
      if (currentLiveDeck && currentLiveDeck.paused && currentLiveDeck.src) {
          currentLiveDeck.play().catch(err => console.log(err));
          speakResponse("resuming track");
      } else {
          speakResponse("no paused track found in the session queue");
      }
      return;
  }

  if (
      lowerCommand === "next" || lowerCommand === "skip" ||
      /\b(skip|next|change|forward)\b/.test(lowerCommand) && /\b(track|song|music|audio|this|one|it)\b/.test(lowerCommand) ||
      lowerCommand.includes("play something else")
  ) {
      if (musicQueue.length > 0 && currentTrackIndex < musicQueue.length - 1) {
          currentTrackIndex++;
          const nextFile = musicQueue[currentTrackIndex];
          if(deckA) deckA.ontimeupdate = null;
          if(deckB) deckB.ontimeupdate = null;

          let trackTitle = nextFile.split('/').pop().replace('.mp3', '');
          botMusicReply(`Skipping forward. Playing ${trackTitle}.`, nextFile);
      } else if (musicQueue.length > 0) {
          speakResponse("youve reached the end of the current playlist stream");
      } else {
          speakResponse("no active queue to skip forward");
      }
      return;
  }

  if (
      lowerCommand === "prev" || lowerCommand === "previous" || lowerCommand === "back" ||
      /\b(prev|previous|back|last)\b/.test(lowerCommand) && /\b(track|song|music|audio|one|it)\b/.test(lowerCommand) ||
      lowerCommand.includes("go back")
  ) {
      if (musicQueue.length > 0 && currentTrackIndex > 0) {
          currentTrackIndex--;
          const prevFile = musicQueue[currentTrackIndex];
          if(deckA) deckA.ontimeupdate = null;
          if(deckB) deckB.ontimeupdate = null;

          let trackTitle = prevFile.split('/').pop().replace('.mp3', '');
          botMusicReply(`Going back. Playing ${trackTitle}.`, prevFile);
      } else if (currentTrackIndex === 0) {
          speakResponse("this is the very first track in the queue");
      } else {
          speakResponse("no active queue history to step backward");
      }
      return;
  }

  if (expectingMusicResponse) {
      expectingMusicResponse = false;
      if (/^(yes|yeah|yup|sure|ok|please)\b/.test(lowerCommand)) {
          musicQueue = [...audioLibrary];
          currentTrackIndex = Math.floor(Math.random() * audioLibrary.length);
          const randomFile = musicQueue[currentTrackIndex];
          let trackTitle = randomFile.split('/').pop().replace('.mp3', '');
          botMusicReply(`Playing a random track from your library: ${trackTitle}.`, randomFile);
      } else {
          speakResponse("no worries what else can i help you with");
      }
      return;
  }

  if (lowerCommand.startsWith("play ") || lowerCommand.includes("play me") || lowerCommand === "play") {
      const searchTarget = lowerCommand.replace("play me", "").replace("play", "").trim().replace(/[^a-z0-9]/g, "");

      const matchedFile = audioLibrary.find(file => {
          const cleanFile = file.toLowerCase().replace(/[^a-z0-9]/g, "");
          return cleanFile.includes(searchTarget) || searchTarget.includes(cleanFile);
      });

      if (matchedFile) {
          const trackIdx = audioLibrary.indexOf(matchedFile);
          musicQueue = audioLibrary.slice(trackIdx);
          currentTrackIndex = 0;

          let trackTitle = matchedFile.split('/').pop().replace('.mp3', '');
          botMusicReply(`Playing ${trackTitle} for you.`, matchedFile);
      } else if (searchTarget === "") {
          musicQueue = [...audioLibrary];
          currentTrackIndex = Math.floor(Math.random() * audioLibrary.length);
          const randomFile = musicQueue[currentTrackIndex];
          let trackTitle = randomFile.split('/').pop().replace('.mp3', '');
          botMusicReply(`Playing a random track from your library: ${trackTitle}.`, randomFile);
      } else {
          expectingMusicResponse = true;
          speakResponse("i couldnt find that track inside the vault directory want me to play a random one from the library instead");
      }
      return;
  }

  if (/^(hi|hello|hey|yo|wassup|sup|ski)\b/.test(lowerCommand)) {
    const lines = ["Yo! How can I help you today?", "hey there i'm online how can i help you today", "Sup. What's on your mind?"];
    speakResponse(lines[Math.floor(Math.random() * lines.length)]);
    return;
  }

  const intent = detectIntent(commandText);
  if (intent.type === 'theme') {
    speakResponse(`Switched to ${intent.value} mode.`);
    return;
  }
  if (intent.type === 'ticket') {
    personality.lastIntent = "ticket";
    speakResponse("generate a ticket under technical category and describe the issue in detail");
    return;
  }
  if (intent.type === 'logout') {
    speakResponse("Logging you out...");
    return;
  }

  if (/quote|motivate|inspire/.test(lowerCommand)) {
    const targetQuote = quotes[Math.floor(Math.random() * quotes.length)];
    speakResponse(targetQuote);
    return;
  }

  if (commandText.trim().length === 0) {
    toggleDock(false);
    return;
  }

  // ====================================================================
  // 6a. NON-INTERFERING LIVE CHAT ESCALATION LAYER (SARAH ESCALATION MATRIX)
  // ====================================================================
  const localFAQMatch = findFAQByIntent(commandText);

  if (!localFAQMatch) {
    const escalationKeywords = ["avalonflow", "avaloncare", "support", "dashboard", "help", "chat", "live"];
    const needsEscalation = escalationKeywords.some(keyword => lowerCommand.includes(keyword));

    if (needsEscalation) {
      const escalationMessage = "That requires priority authorization. Hold on a moment while I connect your session directly with Sarah from Nobu Hospitality LLC...";

      speakResponse(escalationMessage);

      if (transcriptCanvas) {
        transcriptCanvas.innerHTML = `<strong>${escalationMessage}</strong><br><br><span style='opacity:0.6; font-size:0.9em;'>Connecting you with Sarah in a bit...</span>`;
      }

      setTimeout(() => {
        window.location.href = "https://membership.avalonflow.site/livechat";
      }, 3500);
      return;
    }
  }

  adaptTone(commandText);
  const coreReplyText = generateSmartReply(commandText);

  if (coreReplyText && coreReplyText !== generateFollowUp(commandText)) {
    speakResponse(coreReplyText);
    return;
  }

  // Fallback A: Chrome Gemini Nano
  if (window.ai && window.ai.languageModel) {
    try {
      const caps = await window.ai.languageModel.capabilities();
      if (caps.available !== 'no') {
        const session = await window.ai.languageModel.create({
          systemPrompt: "You are Kairos, a deeply intuitive, calm, and supportive assistant. Respond under two sentences."
        });
        const aiReply = await session.prompt(commandText);
        session.destroy();

        kairosChatHistory.push({ role: "user", parts: [{ text: commandText }] });
        kairosChatHistory.push({ role: "model", parts: [{ text: aiReply.trim() }] });

        speakResponse(aiReply.trim());
        return;
      }
    } catch (e) {
      console.warn("Local AI dropped out.", e);
    }
  }

  // Fallback B: Cloud Endpoint Session
  try {
    const GEMINI_API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE"; 
    const MODEL_NAME = "gemini-3.5-flash"; 
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${GEMINI_API_KEY}`;

    const requestContents = [...kairosChatHistory, { role: "user", parts: [{ text: commandText }] }];
    const response = await fetch(URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: requestContents,
        systemInstruction: {
          parts: [{ text: "You are Kairos, a deeply intuitive, calm, and supportive assistant. Respond with genuine empathy and concise warmth under two sentences." }]
        },
        generationConfig: { maxOutputTokens: 80 }
      })
    });

    if (!response.ok) throw new Error();
    const data = await response.json();
    const replyText = data.candidates[0].content.parts[0].text.trim();

    kairosChatHistory.push({ role: "user", parts: [{ text: commandText }] });
    kairosChatHistory.push({ role: "model", parts: [{ text: replyText }] });

    speakResponse(replyText);
  } catch (err) {
    speakResponse(coreReplyText || "What would you like help with—support, rewards, or dashboard settings?");
  }
}

// Helper backup method for when premium vault asset fails or falls over
function fallbackSynthesisExecution(spokenText, words, transcriptCanvas) {
  const utterance = new SpeechSynthesisUtterance(spokenText);
  if (selectedFemaleVoice) utterance.voice = selectedFemaleVoice;
  let wordIndex = 0;

  utterance.onstart = () => {
    setWaveAnimationSpeed(true);
    activeTypingInterval = setInterval(() => {
      if (wordIndex < words.length) {
        transcriptCanvas.innerText += (wordIndex === 0 ? "" : " ") + words[wordIndex];
        wordIndex++;
      } else {
        clearInterval(activeTypingInterval);
      }
    }, 80);
  };

  utterance.onend = () => {
    setWaveAnimationSpeed(false);
    isProcessingCommand = false;
    setTimeout(() => { activateKairosVoiceOnDemand(); }, 400);
  };

  kairosVoiceEngine.speak(utterance);
}

          if (statusText) statusText.innerText = "Playing Audio Stream...";
          setTimeout(() => setWaveAnimationSpeed(true), 200); 
        } else {
          setTimeout(() => { activateKairosVoiceOnDemand(); }, 400);
        }
      };

      nativeCloudAudio.onerror = () => {
        setWaveAnimationSpeed(false);
        isProcessingCommand = false;
        toggleDock(false);
      };

      await nativeCloudAudio.play();
      return; 

    } catch (cloudEngineErr) {
      console.warn("Cloud Speech Engine dropped out. Reverting gracefully to local card synthesis:", cloudEngineErr);
    }
  }

  // ROUTE TO: Standard Local Browser Synthesis Card System
  console.log("💻 Local browser speech synthesis framework card initialized.");
  fallbackSynthesisExecution(spokenText, words, transcriptCanvas);
}

// ==========================================
// 8. MULTI-DECK 10s CROSSFADE ENGINE WORKFLOW
// ==========================================
function botMusicReply(text, file) {
    const finalText = humanize(text);

    const deckA = document.getElementById('audioDeckA');
    const deckB = document.getElementById('audioDeckB');
    if (!deckA || !deckB) return;

    const isMusicCurrentlyPlaying = (deckA && !deckA.paused && deckA.src) || (deckB && !deckB.paused && deckB.src);
    if (!isMusicCurrentlyPlaying) {
        speakResponse(finalText);
    } else {
        const transcriptCanvas = document.getElementById('kairosTranscript');
        if (transcriptCanvas) transcriptCanvas.innerText = text;
    }

    let primaryDeck = activeDeck === deckA ? deckB : deckA;
    let secondaryDeck = activeDeck === deckA ? deckA : deckB;

    if (!activeDeck) {
        activeDeck = deckA;
        activeDeck.src = file;
        activeDeck.volume = 1;
        activeDeck.load();
        activeDeck.play().catch(err => console.log("Playback bypass:", err));
        setupTrackEndMonitor(activeDeck);
    } else {
        executeCrossfade(secondaryDeck, primaryDeck, file);
    }
}

function executeCrossfade(currentDeck, nextDeck, nextFile) {
    nextDeck.src = nextFile;
    nextDeck.volume = 0;
    nextDeck.load();
    nextDeck.play().catch(err => console.log("Crossfade buffer ready:", err));

    activeDeck = nextDeck;

    const fadeSteps = 50; 
    const intervalTime = (crossfadeDuration * 1000) / fadeSteps; 
    let currentStep = 0;

    const fadeInterval = setInterval(() => {
        currentStep++;
        let currentVol = 1 - (currentStep / fadeSteps);
        let nextVol = currentStep / fadeSteps;

        currentDeck.volume = Math.max(0, Math.min(1, currentVol));
        nextDeck.volume = Math.max(0, Math.min(1, nextVol));

        if (currentStep >= fadeSteps) {
            clearInterval(fadeInterval);
            currentDeck.pause();
            currentDeck.src = ""; 
            setupTrackEndMonitor(nextDeck);
        }
    }, intervalTime);
}

// ==========================================
// 9. HARDWARE VOICE RECOGNITION (DICTATION)
// ==========================================
function setupTrackEndMonitor(audioDeck) {
    if (!audioDeck) return;
    audioDeck.onended = () => {
        if (musicQueue.length > 0 && currentTrackIndex < musicQueue.length - 1) {
            currentTrackIndex++;
            const nextFile = musicQueue[currentTrackIndex];
            botMusicReply(`Moving to next track in queue.`, nextFile);
        } else {
            console.log("🎵 Active audio system directory play queue has finished execution.");
            setWaveAnimationSpeed(false);
            const dockStatusText = document.getElementById('dockStatusText');
            if (dockStatusText) dockStatusText.innerText = KAIROS_TITLE + "...";
            if (statusText) statusText.innerText = KAIROS_TITLE + "...";
        }
    };
}

function killSpeechEngineCompletely() {
  isKairosListeningActive = false;
  if (kairosSpeechRecognizer) {
    try {
      kairosSpeechRecognizer.abort();
      kairosSpeechRecognizer.onresult = null;
      kairosSpeechRecognizer.onend = null;
      kairosSpeechRecognizer.onerror = null;
    } catch (e) {}
    kairosSpeechRecognizer = null;
  }
  console.log("🔒 Microphone hardware turned completely OFF.");
}

function activateKairosVoiceOnDemand() {
  if (isProcessingCommand || (kairosVoiceEngine && kairosVoiceEngine.speaking)) return;

  stopActiveKairosVoice();
  killSpeechEngineCompletely();

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) return;

  const dockStatusText = document.getElementById('dockStatusText');
  const transcriptCanvas = document.getElementById('kairosTranscript');

  if (dockStatusText) dockStatusText.innerText = "Kairos is listening...";
  if (statusText) statusText.innerText = "Kairos is listening...";
  toggleDock(true);

  if (transcriptCanvas) {
    transcriptCanvas.innerHTML = "I'm right here let me know what you need<br><br><span style='opacity:0.6; font-size:0.9em;'>Listening</span>";
  }

  if (navigator.vibrate) navigator.vibrate(40);

  kairosSpeechRecognizer = new SpeechRecognition();
  kairosSpeechRecognizer.continuous = true;
  kairosSpeechRecognizer.interimResults = true; 
  kairosSpeechRecognizer.lang = 'en-US';

  kairosSpeechRecognizer.onresult = (event) => {
    if (isProcessingCommand) return; 

    let interimTranscript = '';
    let finalTranscript = '';

    for (let i = event.resultIndex; i < event.results.length; ++i) {
      const text = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalTranscript += text;
      else interimTranscript += text;
    }

    let processedText = (finalTranscript + interimTranscript).trim();
    if (processedText.length > 0) {
      gatheredUserCommand = processedText;
      if (transcriptCanvas) transcriptCanvas.innerText = processedText + "...";
      resetSilenceTimer(SILENCE_WAIT_TIME);
    }
  };

  kairosSpeechRecognizer.onerror = (err) => {
    if (err.error === 'not-allowed') {
      if (dockStatusText) dockStatusText.innerText = "Mic access blocked.";
      if (statusText) statusText.innerText = "Mic access blocked.";
      isProcessingCommand = false;
      toggleDock(false);
    }
  };

  function resetSilenceTimer(customWaitTime = 2000) {
    if (voiceSilenceTimer) clearTimeout(voiceSilenceTimer);
    voiceSilenceTimer = setTimeout(() => {
      isProcessingCommand = true; 
      killSpeechEngineCompletely();

      if (!gatheredUserCommand || gatheredUserCommand.trim().length === 0) {
        isProcessingCommand = false;
        toggleDock(false); 
        return;
      }

      conversationMemory.push({ role: "user", content: gatheredUserCommand, time: Date.now() });
      chatHistory.push({ sender: 'user', text: gatheredUserCommand, type: "text" });
      localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

      processUserCommandLocally(gatheredUserCommand);
      recordChatMessage();
      gatheredUserCommand = ""; 
    }, customWaitTime);
  }

  resetSilenceTimer(4500);

  try {
    isKairosListeningActive = true;
    kairosSpeechRecognizer.start();
  } catch (e) {
    console.error("Context error initializing speech framework components:", e);
  }
}

function stopActiveKairosVoice() {
  if (kairosVoiceEngine) kairosVoiceEngine.cancel();
  setWaveAnimationSpeed(false);
}

  speakResponse(greetingText);
}
