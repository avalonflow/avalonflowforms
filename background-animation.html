<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvalonFlow</title>

      <!-- Favicon as .ico -->
<link rel="icon" href="/favicon.png" type="image/png" sizes="36x36">

    <!-- Structured Data for Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AvalonFlow",
      "url": "https://avalonflow.site",
      "logo": "https://avalonFlow.site/favicon.png"
    }
</script>

<style>
        /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

/* ================= Header Logo Card Neon ================= */

.minimal-logo-header {
  display: flex;
  justify-content: center;
  align-items: center;

  /* Reduced top padding dramatically so it sits near the top edge */
  padding: 10px 0 10px 0; 

  /* Optional: Ensures it stays firmly at the absolute top of the page layout */
  width: 100%;
  margin-top: -82px; 

  background: transparent !important;
}

.logo-shimmer-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  overflow: hidden;
  background: transparent !important; /* Kept perfectly transparent, no card background */
}

.avalon-logo-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;

  /* Keep your logo scaling */
  transform: scale(0.40);
  transform-origin: center center;

  /* ---------- LOGO GLASS EFFECT ---------- */
  /* This blurs the particles directly through the transparent logo asset itself */
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0.9; 
  /* -------------------------------------- */

  filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.05));
  mix-blend-mode: multiply; 
  background:  transparent !important;
  border: none !important;            
  outline: none !important;
}

:root {
  /* Gemini Live Cloud inspired base variables */
  --glass-bg: rgba(15, 23, 42, 0.35); /* Deeper Slate-Blue tint to anchor the glowing cloud colors */
  --glass-border: rgba(255, 255, 255, 0.08);
  
  /* The iconic Gemini multi-chromatic glow palette */
  --gemini-blue: #3b82f6;
  --gemini-purple: #a855f7;
  --gemini-cyan: #06b6d4;
  --neon-glow: rgba(59, 130, 246, 0.35); 
}

/* 1. Master Container & Sizing Controllers */
.assistant-dock-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  width: 100%;
  max-width: 380px; /* Compact width when collapsed */
  padding: 0 16px;
  box-sizing: border-box;
  transition: max-width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Active Expanded State via JS */
.assistant-dock-wrap.expanded {
  max-width: 500px; /* Expands wider smoothly when open */
}

/* 2. The Glass Morphic Shield with Live Cloud Integration */
.glass-dock {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(210%); /* Increased blur/saturate to maximize cloud blending */
  -webkit-backdrop-filter: blur(20px) saturate(210%);
  border: 1px solid var(--glass-border);
  border-radius: 40px; /* Deep rounded pill look */
  padding: 12px 24px;
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5),
              0 0 0 1px rgba(255, 255, 255, 0.02) inset;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  overflow: hidden;
}

/* Hidden Cloud Pseudo-element running inside the pill background */
.glass-dock::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  /* Shifting nebulous mesh representing the live voice state */
  background: radial-gradient(circle at 30% 40%, rgba(6, 182, 212, 0.15), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.15), transparent 40%),
              radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.12), transparent 50%);
  z-index: 0;
  animation: cloudShift 8s ease infinite;
  pointer-events: none;
}

/* Hover glow depth over background ambient gradients */
.glass-dock:hover {
  border-color: rgba(6, 182, 212, 0.35); /* Shifting edge highlight to Cyan */
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6),
              0 0 20px var(--neon-glow);
}

/* Structural shifts when the capsule opens into a card */
.assistant-dock-wrap.expanded .glass-dock {
  border-radius: 24px; /* Softens smoothly back into a card layout */
  padding: 20px;
  cursor: default;
}

/* Ensure inner content loads cleanly ABOVE the animated cloud background */
.dock-collapsed-view, .dock-expanded-view {
  position: relative;
  z-index: 1;
}

/* 3. Collapsed View Inner Elements Alignment */
.dock-collapsed-view {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  width: 100%;
}

.status-indicator.active {
  width: 8px;
  height: 8px;
  background-color: var(--gemini-cyan); /* Matches the alive voice state */
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gemini-cyan);
  flex-shrink: 0;
}

.dock-text {
  color: rgba(255, 255, 255, 0.92);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 4. Kinetic Audio Wave Engine (Color-Shifted to Gemini Cloud Scheme) */
.audio-wave-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 20px;
  margin-left: auto; /* Force-pins visualizer directly to the right edge */
  flex-shrink: 0;
}

.audio-wave-pill .stroke {
  display: block;
  position: relative;
  /* Shifting gradient from Cyan to Blue to Purple along the wave spectrum */
  background: linear-gradient(to top, var(--gemini-cyan), var(--gemini-blue), var(--gemini-purple));
  height: 100%;
  width: 3px;
  border-radius: 10px;
  animation: bounce 1.2s ease-in-out infinite;
}

/* Staggering the animation parameters to establish fluid, organic frequency imitation */
.audio-wave-pill .stroke:nth-child(1) { animation-delay: 0.3s; animation-duration: 0.8s; }
.audio-wave-pill .stroke:nth-child(2) { animation-delay: 0.1s; animation-duration: 1.1s; }
.audio-wave-pill .stroke:nth-child(3) { animation-delay: 0.6s; animation-duration: 0.9s; }
.audio-wave-pill .stroke:nth-child(4) { animation-delay: 0.2s; animation-duration: 1.3s; }
.audio-wave-pill .stroke:nth-child(5) { animation-delay: 0.4s; animation-duration: 0.7s; }

/* Cloud Background Ambient Motion Shift */
@keyframes cloudShift {
  0%, 100% {
    transform: translate(0px, 0px) rotate(0deg) scale(1);
  }
  33% {
    transform: translate(30px, -20px) rotate(120deg) scale(1.15);
  }
  66% {
    transform: translate(-20px, 40px) rotate(240deg) scale(0.9);
  }
}

/* The kinetic bounce animation */
@keyframes bounce {
  0%, 100% {
    height: 4px; /* Minimal baseline amplitude */
  }
  50% {
    height: 20px; /* Peak height contained inside the glass container */
  }
}

/* Utility to completely hide elements instantly during card transition */
.d-none {
  display: none !important;
}






  
     
  

  



















    footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 18px 0;
    font-size: 14px;
    color: #555;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.08);

}
    </style>
</head>
<body>
    <!-- Floating Background -->
    <div id="floating-bg"></div>

<header class="minimal-logo-header">
  <div class="logo-shimmer-wrapper">
    <img src="assets/pictures/1780995787737.jpeg" alt="Avalon Logo" class="avalon-logo-img">
  </div>
</header>


<div class="assistant-dock-wrap">
  <div class="glass-dock" id="kairosDock" onclick="toggleDock()">
    
    <div class="dock-collapsed-view" id="collapsedView">
      <div class="status-indicator active"></div>
      <span class="dock-text" id="dockStatusText">Kairos is listening...</span>
      
      <div class="audio-wave-pill">
        <span class="stroke"></span>
        <span class="stroke"></span>
        <span class="stroke"></span>
        <span class="stroke"></span>
        <span class="stroke"></span>
      </div>
    </div>

    <div class="dock-expanded-view d-none" id="expandedView">
      <div class="dock-header">
        <h4>Kairos Intelligence</h4>
        <button class="close-btn" onclick="event.stopPropagation(); toggleDock();">×</button>
      </div>
      <div class="dock-body">
        <p class="system-log">⚡ Local audio engine ready (320kbps)</p>
      </div>
      <div class="dock-footer">
        <input type="text" placeholder="Ask Kairos to execute action..." class="dock-input" onclick="event.stopPropagation();">
      </div>
    </div>

  </div>
</div>


    <!-- Sticky Footer -->
    <footer>
        © 2026 AvalonFlow • Powered by Centrical™
    </footer>

    <script>

/**
 * Toggles the local assistant dock layout between a compact audio pill 
 * and an expanded data dashboard command card.
 */
function toggleDock() {
  const dockWrap = document.querySelector('.assistant-dock-wrap');
  const collapsedView = document.getElementById('collapsedView');
  const expandedView = document.getElementById('expandedView');
  
  if (!dockWrap || !collapsedView || !expandedView) return;

  const isExpanding = !dockWrap.classList.contains('expanded');
  
  // 1. Immediately trigger the master glass panel container's morph animation
  dockWrap.classList.toggle('expanded');
  
  if (isExpanding) {
    // 2. Expanding: Let the capsule morph open slightly before swapping inner layouts
    setTimeout(() => {
      collapsedView.classList.add('d-none');
      expandedView.classList.remove('d-none');
      
      // Auto-focus the control field for rapid input execution if desired
      const dockInput = expandedView.querySelector('.dock-input');
      if (dockInput) dockInput.focus();
    }, 150); // 150ms matches the sweet spot of the 0.4s cubic-bezier curve
    
  } else {
    // 3. Collapsing: Instantly restore the compact pill views for clean scale-down
    expandedView.classList.add('d-none');
    collapsedView.classList.remove('d-none');
    // Ensure display properties fall back perfectly to the stylesheet's flex layout
    collapsedView.style.display = ''; 
  }
}


        /* ---------- Floating Particles ---------- */
        const bg = document.getElementById('floating-bg');
        const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
        function particle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random()*20+10;
            p.style.width = s+'px';
            p.style.height = s+'px';
            p.style.left = Math.random()*100+'vw';
            p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
            p.style.animationDuration = (Math.random()*20+10)+'s';
            bg.appendChild(p);
            setTimeout(()=>p.remove(),30000);
        }
        setInterval(particle,800);
</script>

</body>
</html>
