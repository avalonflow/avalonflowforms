<style>
        /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

/* ================= Header Logo Card Neon ================= */

.minimal-logo-header {
  display: flex;
  justify-content: center;
  align-items: center;

  /* Reduced top padding dramatically so it sits near the top edge */
  padding: 10px 0 10px 0; 

  /* Optional: Ensures it stays firmly at the absolute top of the page layout */
  width: 100%;
  margin-top: -82px; 

  background: transparent !important;
}

.logo-shimmer-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  overflow: hidden;
  background: transparent !important; /* Kept perfectly transparent, no card background */
}

.avalon-logo-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;

  /* Keep your logo scaling */
  transform: scale(0.40);
  transform-origin: center center;

  /* ---------- LOGO GLASS EFFECT ---------- */
  /* This blurs the particles directly through the transparent logo asset itself */
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0.9; 
  /* -------------------------------------- */

  filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.05));
  mix-blend-mode: multiply; 
  background:  transparent !important;
  border: none !important;            
  outline: none !important;
}

:root {
  /* Gemini Live Cloud inspired base variables */
  --glass-bg: rgba(15, 23, 42, 0.35); /* Deeper Slate-Blue tint to anchor the glowing cloud colors */
  --glass-border: rgba(255, 255, 255, 0.08);
  
  /* The iconic Gemini multi-chromatic glow palette */
  --gemini-blue: #3b82f6;
  --gemini-purple: #a855f7;
  --gemini-cyan: #06b6d4;
  --neon-glow: rgba(59, 130, 246, 0.35); 
}

/* 1. Master Container & Sizing Controllers */
.assistant-dock-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  width: 100%;
  max-width: 380px; /* Compact width when collapsed */
  padding: 0 16px;
  box-sizing: border-box;
  transition: max-width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Active Expanded State via JS */
.assistant-dock-wrap.expanded {
  max-width: 500px; /* Expands wider smoothly when open */
}

/* 2. The Glass Morphic Shield with Live Cloud Integration */
.glass-dock {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(210%); /* Increased blur/saturate to maximize cloud blending */
  -webkit-backdrop-filter: blur(20px) saturate(210%);
  border: 1px solid var(--glass-border);
  border-radius: 40px; /* Deep rounded pill look */
  padding: 12px 24px;
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5),
              0 0 0 1px rgba(255, 255, 255, 0.02) inset;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  overflow: hidden;
}

/* Hidden Cloud Pseudo-element running inside the pill background */
.glass-dock::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  /* Shifting nebulous mesh representing the live voice state */
  background: radial-gradient(circle at 30% 40%, rgba(6, 182, 212, 0.15), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.15), transparent 40%),
              radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.12), transparent 50%);
  z-index: 0;
  animation: cloudShift 8s ease infinite;
  pointer-events: none;
}

/* Hover glow depth over background ambient gradients */
.glass-dock:hover {
  border-color: rgba(6, 182, 212, 0.35); /* Shifting edge highlight to Cyan */
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6),
              0 0 20px var(--neon-glow);
}

/* Structural shifts when the capsule opens into a card */
.assistant-dock-wrap.expanded .glass-dock {
  border-radius: 24px; /* Softens smoothly back into a card layout */
  padding: 20px;
  cursor: default;
}

/* Ensure inner content loads cleanly ABOVE the animated cloud background */
.dock-collapsed-view, .dock-expanded-view {
  position: relative;
  z-index: 1;
}

/* 3. Collapsed View Inner Elements Alignment */
.dock-collapsed-view {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  width: 100%;
}

.status-indicator.active {
  width: 8px;
  height: 8px;
  background-color: var(--gemini-cyan); /* Matches the alive voice state */
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gemini-cyan);
  flex-shrink: 0;
}

.dock-text {
  color: rgba(255, 255, 255, 0.92);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 4. Pure Voice Transcript Panel Design */
.dock-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.dock-header h4 {
  margin: 0;
  color: rgba(255, 255, 255, 0.6);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.close-btn {
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.4);
  font-size: 20px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color 0.2s ease;
}

.close-btn:hover {
  color: #ef4444;
}

.voice-transcript-canvas {
  width: 100%;
  min-height: 80px;
  max-height: 180px;
  overflow-y: auto;
  padding-right: 4px;
}

.streaming-text {
  color: #ffffff;
  font-size: 16px;
  line-height: 1.5;
  font-weight: 400;
  margin: 0;
  letter-spacing: -0.1px;
}

/* 5. Kinetic Audio Wave Engine */
.audio-wave-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 20px;
  margin-left: auto; /* Force-pins visualizer directly to the right edge */
  flex-shrink: 0;
}

.audio-wave-pill .stroke {
  display: block;
  position: relative;
  background: linear-gradient(to top, var(--gemini-cyan), var(--gemini-blue), var(--gemini-purple));
  height: 100%;
  width: 3px;
  border-radius: 10px;
  animation: bounce 1.2s ease-in-out infinite;
}

/* Staggering the animation parameters to establish fluid, organic frequency imitation */
.audio-wave-pill .stroke:nth-child(1) { animation-delay: 0.3s; animation-duration: 0.8s; }
.audio-wave-pill .stroke:nth-child(2) { animation-delay: 0.1s; animation-duration: 1.1s; }
.audio-wave-pill .stroke:nth-child(3) { animation-delay: 0.6s; animation-duration: 0.9s; }
.audio-wave-pill .stroke:nth-child(4) { animation-delay: 0.2s; animation-duration: 1.3s; }
.audio-wave-pill .stroke:nth-child(5) { animation-delay: 0.4s; animation-duration: 0.7s; }

/* Cloud Background Ambient Motion Shift */
@keyframes cloudShift {
  0%, 100% { transform: translate(0px, 0px) rotate(0deg) scale(1); }
  33% { transform: translate(30px, -20px) rotate(120deg) scale(1.15); }
  66% { transform: translate(-20px, 40px) rotate(240deg) scale(0.9); }
}

/* The kinetic bounce animation */
@keyframes bounce {
  0%, 100% { height: 4px; }
  50% { height: 20px; }
}

.d-none {
  display: none !important;
}

<header class="minimal-logo-header">

<div class="assistant-dock-wrap">
  <div class="glass-dock" id="kairosDock" onclick="toggleDock()">
    
    <div class="dock-collapsed-view" id="collapsedView">
      <div class="status-indicator active"></div>
      <span class="dock-text" id="dockStatusText">Kairos Assistant...</span>

    <div class="dock-expanded-view d-none" id="expandedView">
      <div class="dock-header">
        <h4>Kairos Intelligence</h4>
        <button class="close-btn" onclick="event.stopPropagation(); toggleDock();">×</button>
      </div>
      
      <div class="dock-body">
        <div class="voice-transcript-canvas">
          <p id="kairosTranscript" class="streaming-text">Listening for your command...</p>
        </div>
      </div>
    </div>

  </div>
</div>

    <script>

/**
 * Kairos Intelligent Voice & UI Controller (Serverless Client-Side Edition)
 * Handles Wake-Word Detection, Client-side Text-to-Speech (Female Voice), and Card Morphing
 */

// Global state variables for the audio engines
let kairosSpeechRecognizer = null;
let isKairosListeningActive = false;
let kairosVoiceEngine = window.speechSynthesis;
let selectedFemaleVoice = null;

// Silence and command tracking variables
let voiceSilenceTimer = null;
let gatheredUserCommand = "";
let isProcessingCommand = false;

// Configuration Constants
const WAKE_WORDS = ['hey kairos', 'hello kairos', 'hi kairos', 'kairos'];
const SILENCE_WAIT_TIME = 2500; // 2.5 seconds window to wait for user commands

/**
 * Picks a high-quality female voice natively available in the browser system.
 */
function loadFemaleVoice() {
  if (!kairosVoiceEngine) return;
  
  const voices = kairosVoiceEngine.getVoices();
  
  // Look for highly natural-sounding built-in female voices
  selectedFemaleVoice = voices.find(voice => 
    (voice.name.includes('Google') || voice.name.includes('Natural')) && 
    (voice.name.includes('Female') || voice.name.includes('Zira') || voice.name.includes('Google US English') || voice.name.includes('UK English Female'))
  ) || voices.find(voice => voice.lang.startsWith('en')) || voices[0];
}

if (window.speechSynthesis) {
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = loadFemaleVoice;
  }
  loadFemaleVoice();
}

/**
 * Toggles the local assistant dock layout between a compact audio pill 
 * and an expanded streaming text canvas.
 */
function toggleDock(forcedState = null) {
  const dockWrap = document.querySelector('.assistant-dock-wrap');
  const collapsedView = document.getElementById('collapsedView');
  const expandedView = document.getElementById('expandedView');
  const statusText = document.getElementById('dockStatusText');
  
  if (!dockWrap || !collapsedView || !expandedView) return;

  const currentlyExpanded = dockWrap.classList.contains('expanded');
  const targetState = forcedState !== null ? forcedState : !currentlyExpanded;
  
  if (targetState === currentlyExpanded) return; 

  if (targetState === true) {
    dockWrap.classList.add('expanded');
    setTimeout(() => {
      collapsedView.classList.add('d-none');
      expandedView.classList.remove('d-none');
    }, 150);
  } else {
    stopActiveKairosVoice();
    dockWrap.classList.remove('expanded');
    expandedView.classList.add('d-none');
    collapsedView.classList.remove('d-none');
    collapsedView.style.display = ''; 
    
    // Explicitly reset states back to rest
    isProcessingCommand = false;
    gatheredUserCommand = "";
    if (voiceSilenceTimer) clearTimeout(voiceSilenceTimer);
    
    if (statusText) {
      statusText.innerText = "Kairos Assistant...";
    }
  }
}

/**
 * Dynamic UI Feedback Control
 */
function setWaveAnimationSpeed(isSpeaking) {
  const strokes = document.querySelectorAll('.audio-wave-pill .stroke');
  strokes.forEach((stroke) => {
    if (isSpeaking) {
      stroke.style.animationPlayState = 'running';
    } else {
      stroke.style.animationPlayState = 'paused';
    }
  });
}

/**
 * Client-Side Text-To-Speech Player
 */
function speakAndTypeResponse(fullTextResponse) {
  stopActiveKairosVoice();

  const transcriptCanvas = document.getElementById('kairosTranscript');
  if (!transcriptCanvas) return;
  
  transcriptCanvas.innerText = ""; 
  const words = fullTextResponse.split(" ");
  let wordIndex = 0;
  
  const utterance = new SpeechSynthesisUtterance(fullTextResponse);
  if (selectedFemaleVoice) utterance.voice = selectedFemaleVoice;
  
  utterance.rate = 1.0;  
  utterance.pitch = 1.1; 

  utterance.onstart = () => {
    setWaveAnimationSpeed(true);
    
    const typingInterval = setInterval(() => {
      if (wordIndex < words.length) {
        transcriptCanvas.innerText += (wordIndex === 0 ? "" : " ") + words[wordIndex];
        wordIndex++;
        
        const canvasContainer = document.querySelector('.voice-transcript-canvas');
        if (canvasContainer) canvasContainer.scrollTop = canvasContainer.scrollHeight;
      } else {
        clearInterval(typingInterval);
      }
    }, 180);
  };

  utterance.onend = () => {
    setWaveAnimationSpeed(false);
    // Smoothly turn off processing state and restart listener loop after speaking concludes
    isProcessingCommand = false;
    restartSpeechEngineSafety();
  };

  utterance.onerror = () => {
    setWaveAnimationSpeed(false);
    isProcessingCommand = false;
    restartSpeechEngineSafety();
  };

  kairosVoiceEngine.speak(utterance);
}

/**
 * Local Command Processor
 */
async function processUserCommandLocally(commandText) {
  const transcriptCanvas = document.getElementById('kairosTranscript');
  const dynamicCommand = commandText.trim();

  if (transcriptCanvas) transcriptCanvas.innerText = "Thinking...";

  let replyText = "I'm here. I noticed you activated me, but I didn't catch a specific command. How can I help you today?";
  
  if (dynamicCommand.length > 0) {
    replyText = "I heard you say: '" + dynamicCommand + "'. I am running entirely in your browser view right now.";
    
    if (dynamicCommand.includes('hello') || dynamicCommand.includes('hi')) {
      replyText = "Hello! I am Kairos, your intelligent local assistant. Your system is fully operational.";
    } else if (dynamicCommand.includes('music') || dynamicCommand.includes('play')) {
      replyText = "Understood. Synchronizing audio configurations and launching player structures.";
    }
  }

  setTimeout(() => {
    speakAndTypeResponse(replyText);
  }, 400);
}

/**
 * Safely stops active local voice playback
 */
function stopActiveKairosVoice() {
  if (kairosVoiceEngine) {
    kairosVoiceEngine.cancel();
  }
  setWaveAnimationSpeed(false);
}

/**
 * Helper to safely restart recognition stream without throw exceptions
 */
function restartSpeechEngineSafety() {
  if (isKairosListeningActive && !kairosVoiceEngine.speaking && !isProcessingCommand) {
    try { 
      kairosSpeechRecognizer.start(); 
      console.log("🎙️ Re-ignited background environment watch...");
    } catch(e){}
  }
}

/**
 * Initializes the ambient background audio microphone stream
 */
function initAmbientVoiceEngine() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  
  if (!SpeechRecognition) {
    console.error("❌ Ambient speech infrastructure not supported on this browser viewport.");
    return;
  }

  kairosSpeechRecognizer = new SpeechRecognition();
  kairosSpeechRecognizer.continuous = true;
  
  // FIX: Switched to true so the engine updates immediately word-by-word without hanging!
  kairosSpeechRecognizer.interimResults = true; 
  kairosSpeechRecognizer.lang = 'en-US';

  kairosSpeechRecognizer.onresult = (event) => {
    if (isProcessingCommand) return; // Ignore input processing blocks while she speaks

    const statusText = document.getElementById('dockStatusText');
    const transcriptCanvas = document.getElementById('kairosTranscript');
    
    let currentSpeechChunk = '';

    for (let i = event.resultIndex; i < event.results.length; ++i) {
      currentSpeechChunk += event.results[i][0].transcript;
    }

    const lowerTranscript = currentSpeechChunk.toLowerCase().trim();
    const isDockExpanded = document.querySelector('.assistant-dock-wrap').classList.contains('expanded');

    // STATE A: Pill is closed, looking purely for Wake Words
    if (!isDockExpanded) {
      const wakeWordDetected = WAKE_WORDS.some(word => lowerTranscript.includes(word));

      if (wakeWordDetected) {
        console.log("⚡ Wake word recognized dynamically!");
        
        if (statusText) statusText.innerText = "Kairos is listening...";
        toggleDock(true);
        
        if (transcriptCanvas) transcriptCanvas.innerText = "I'm listening, go ahead...";
        
        // Isolate any extra command spoken immediately in the same breath
        let directIntent = lowerTranscript.replace(/hey kairos|hello kairos|hi kairos|kairos/, '').trim();
        gatheredUserCommand = directIntent;

        // Start the 2.5-second countdown timer right now
        resetSilenceTimer();
        
        if (navigator.vibrate) navigator.vibrate(40);
      }
    } 
    // STATE B: Pill is wide open, actively collecting the command words
    else {
      // Clear the countdown timer because the user is still talking
      resetSilenceTimer();
      
      // Strip out wake words if they repeat them, collect the core request
      let filteredText = lowerTranscript.replace(/hey kairos|hello kairos|hi kairos|kairos/, '').trim();
      if (filteredText.length > 0) {
        gatheredUserCommand = filteredText;
        if (transcriptCanvas && transcriptCanvas.innerText === "I'm listening, tell me what you need...") {
          transcriptCanvas.innerText = "...";
        }
      }
    }
  };

  /**
   * Resets the silence threshold countdown window.
   * If the user stops talking for 2.5 seconds, wrap up and execute response!
   */
  function resetSilenceTimer() {
    if (voiceSilenceTimer) clearTimeout(voiceSilenceTimer);
    
    voiceSilenceTimer = setTimeout(() => {
      console.log("⏱️ Silence threshold reached. Executing gathered command:", gatheredUserCommand);
      
      isProcessingCommand = true;
      kairosSpeechRecognizer.stop(); // Turn off mic input so she doesn't hear herself talk
      
      processUserCommandLocally(gatheredUserCommand);
      gatheredUserCommand = ""; // Wipe input cache block clear
    }, SILENCE_WAIT_TIME);
  }

  // Automatic recovery loop parameters
  kairosSpeechRecognizer.onend = () => {
    restartSpeechEngineSafety();
  };

  kairosSpeechRecognizer.onerror = (err) => {
    if (err.error === 'not-allowed') {
      console.warn("🎙️ Mic permission denied.");
      isKairosListeningActive = false;
    }
    // Automatically reset processing filters on casual error drops
    if (err.error === 'no-speech') {
      restartSpeechEngineSafety();
    }
  };

  isKairosListeningActive = true;
  kairosSpeechRecognizer.start();
  setWaveAnimationSpeed(false); 
  console.log("🎙️ Ambient audio pipeline activated: Resting on 'Kairos Assistant...' state.");
}

window.addEventListener('DOMContentLoaded', () => {
  initAmbientVoiceEngine();
});

            p.style.animationDuration = (Math.random()*20+10)+'s';
            bg.appendChild(p);
            setTimeout(()=>p.remove(),30000);
        }
        setInterval(particle,800);
</script>
