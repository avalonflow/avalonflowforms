<style>
        /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

/* ================= Header Logo Card Neon ================= */

.minimal-logo-header {
  display: flex;
  justify-content: center;
  align-items: center;

  /* Reduced top padding dramatically so it sits near the top edge */
  padding: 10px 0 10px 0; 

  /* Optional: Ensures it stays firmly at the absolute top of the page layout */
  width: 100%;
  margin-top: -82px; 

  background: transparent !important;
}

.logo-shimmer-wrapper {
  position: relative;
  width: 200px;
  height: 200px;
  overflow: hidden;
  background: transparent !important; /* Kept perfectly transparent, no card background */
}

.avalon-logo-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;

  /* Keep your logo scaling */
  transform: scale(0.40);
  transform-origin: center center;

  /* ---------- LOGO GLASS EFFECT ---------- */
  /* This blurs the particles directly through the transparent logo asset itself */
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  opacity: 0.9; 
  /* -------------------------------------- */

  filter: drop-shadow(0 4px 14px rgba(0, 0, 0, 0.05));
  mix-blend-mode: multiply; 
  background:  transparent !important;
  border: none !important;            
  outline: none !important;
}

:root {
  /* Gemini Live Cloud inspired base variables */
  --glass-bg: rgba(15, 23, 42, 0.35); /* Deeper Slate-Blue tint to anchor the glowing cloud colors */
  --glass-border: rgba(255, 255, 255, 0.08);
  
  /* The iconic Gemini multi-chromatic glow palette */
  --gemini-blue: #3b82f6;
  --gemini-purple: #a855f7;
  --gemini-cyan: #06b6d4;
  --neon-glow: rgba(59, 130, 246, 0.35); 
}

/* 1. Master Container & Sizing Controllers */
.assistant-dock-wrap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 9999;
  width: 100%;
  max-width: 380px; /* Compact width when collapsed */
  padding: 0 16px;
  box-sizing: border-box;
  transition: max-width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Active Expanded State via JS */
.assistant-dock-wrap.expanded {
  max-width: 500px; /* Expands wider smoothly when open */
}

/* 2. The Glass Morphic Shield with Live Cloud Integration */
.glass-dock {
  position: relative;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(210%); /* Increased blur/saturate to maximize cloud blending */
  -webkit-backdrop-filter: blur(20px) saturate(210%);
  border: 1px solid var(--glass-border);
  border-radius: 40px; /* Deep rounded pill look */
  padding: 12px 24px;
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5),
              0 0 0 1px rgba(255, 255, 255, 0.02) inset;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  overflow: hidden;
}

/* Hidden Cloud Pseudo-element running inside the pill background */
.glass-dock::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  /* Shifting nebulous mesh representing the live voice state */
  background: radial-gradient(circle at 30% 40%, rgba(6, 182, 212, 0.15), transparent 40%),
              radial-gradient(circle at 70% 60%, rgba(168, 85, 247, 0.15), transparent 40%),
              radial-gradient(circle at 50% 30%, rgba(59, 130, 246, 0.12), transparent 50%);
  z-index: 0;
  animation: cloudShift 8s ease infinite;
  pointer-events: none;
}

/* Hover glow depth over background ambient gradients */
.glass-dock:hover {
  border-color: rgba(6, 182, 212, 0.35); /* Shifting edge highlight to Cyan */
  box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.6),
              0 0 20px var(--neon-glow);
}

/* Structural shifts when the capsule opens into a card */
.assistant-dock-wrap.expanded .glass-dock {
  border-radius: 24px; /* Softens smoothly back into a card layout */
  padding: 20px;
  cursor: default;
}

/* Ensure inner content loads cleanly ABOVE the animated cloud background */
.dock-collapsed-view, .dock-expanded-view {
  position: relative;
  z-index: 1;
}

/* 3. Collapsed View Inner Elements Alignment */
.dock-collapsed-view {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 12px;
  width: 100%;
}

.status-indicator.active {
  width: 8px;
  height: 8px;
  background-color: var(--gemini-cyan); /* Matches the alive voice state */
  border-radius: 50%;
  box-shadow: 0 0 10px var(--gemini-cyan);
  flex-shrink: 0;
}

.dock-text {
  color: rgba(255, 255, 255, 0.92);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 4. Pure Voice Transcript Panel Design */
.dock-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}

.dock-header h4 {
  margin: 0;
  color: rgba(255, 255, 255, 0.6);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.close-btn {
  background: none;
  border: none;
  color: rgba(255, 255, 255, 0.4);
  font-size: 20px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
  transition: color 0.2s ease;
}

.close-btn:hover {
  color: #ef4444;
}

.voice-transcript-canvas {
  width: 100%;
  min-height: 80px;
  max-height: 180px;
  overflow-y: auto;
  padding-right: 4px;
}

.streaming-text {
  color: #ffffff;
  font-size: 16px;
  line-height: 1.5;
  font-weight: 400;
  margin: 0;
  letter-spacing: -0.1px;
}

/* 5. Kinetic Audio Wave Engine */
.audio-wave-pill {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 20px;
  margin-left: auto; /* Force-pins visualizer directly to the right edge */
  flex-shrink: 0;
}

.audio-wave-pill .stroke {
  display: block;
  position: relative;
  background: linear-gradient(to top, var(--gemini-cyan), var(--gemini-blue), var(--gemini-purple));
  height: 100%;
  width: 3px;
  border-radius: 10px;
  animation: bounce 1.2s ease-in-out infinite;
}

/* Staggering the animation parameters to establish fluid, organic frequency imitation */
.audio-wave-pill .stroke:nth-child(1) { animation-delay: 0.3s; animation-duration: 0.8s; }
.audio-wave-pill .stroke:nth-child(2) { animation-delay: 0.1s; animation-duration: 1.1s; }
.audio-wave-pill .stroke:nth-child(3) { animation-delay: 0.6s; animation-duration: 0.9s; }
.audio-wave-pill .stroke:nth-child(4) { animation-delay: 0.2s; animation-duration: 1.3s; }
.audio-wave-pill .stroke:nth-child(5) { animation-delay: 0.4s; animation-duration: 0.7s; }

/* Cloud Background Ambient Motion Shift */
@keyframes cloudShift {
  0%, 100% { transform: translate(0px, 0px) rotate(0deg) scale(1); }
  33% { transform: translate(30px, -20px) rotate(120deg) scale(1.15); }
  66% { transform: translate(-20px, 40px) rotate(240deg) scale(0.9); }
}

/* The kinetic bounce animation */
@keyframes bounce {
  0%, 100% { height: 4px; }
  50% { height: 20px; }
}

.d-none {
  display: none !important;
}

    <script>
/**
 * AvalonFlow: Kairos Intelligent Voice, Text & UI Controller
 * Core Integrated Edition (Speech Synthesis, Ambient Dictation, Client-Side FAQ Matching, and AI Fail-safes)
 */

// ==========================================
// 1. GLOBAL ENGINE CONFIGURATIONS & STATE
// ==========================================
let kairosSpeechRecognizer = null;
let isKairosListeningActive = false;
let kairosVoiceEngine = window.speechSynthesis;
let selectedFemaleVoice = null;

let voiceSilenceTimer = null;
let gatheredUserCommand = "";
let isProcessingCommand = false;

// Shared Session Memory Array
let chatHistory = JSON.parse(localStorage.getItem('tg_chat_history_v3')) || [];
let kairosChatHistory = []; 
let conversationMemory = []; // Keeps track of text-to-bot turns (Max 10)

// Pushed to 3500ms to allow natural breathing pauses during complex voice chats
const SILENCE_WAIT_TIME = 3500; 

// Dom elements references
const botMessagesContainer = document.getElementById('botMessagesContainer');
const botInput = document.getElementById('botInput');
const botSendBtn = document.getElementById('botSendBtn');

const personality = {
    tone: "neutral", // friendly | calm | professional
    lastIntent: null,
    userMood: "unknown"
};

// Data Structures
const quotes = [ 
  "Believe in yourself and all that you are.", "Small steps each day lead to big results.", 
  "Life is about moments, not things.", "Consistency is the key to success.", "Every day is a fresh start.", 
  "Faith is the compass that guides you through life’s storms.", "Pray not just for what you want, but for the strength to receive it.", 
  "Trust God’s timing; He never runs late.", "Your faith can move mountains, but your actions must build the path.", 
  "Don’t chase money; build systems that make money chase you.", "Financial freedom begins when you learn to control your money, not your lifestyle.", 
  "Save like a pessimist, invest like an optimist.", "Wealth grows when patience waters it daily.", 
  "Your income is limited only by your imagination and action.", "Make your money work harder than you do.", 
  "Dream big, start small, move consistently." 
];

const faqs = [
  { q: "How do I reset my password?", a: "Click 'Forgot password' on the login page and follow instructions.", tags: ["password", "reset", "login", "signin", "account access"] },
  { q: "How can I update my billing info?", a: "Navigate to your Sidebar, then 'Withdrawals' to update payment methods.", tags: ["billing", "payment", "withdrawal", "card", "update payment", "finance"] },
  { q: "Where can I view my ticket history?", a: "All your submitted tickets and their status are visible under 'Support > My Tickets'.", tags: ["ticket", "history", "support", "track ticket", "previous issues"] },
  { q: "How do I contact live support?", a: "Generate a ticket and email support at avalonflowsystem.helpdesk@gmail.com including your reference.", tags: ["support", "contact", "help", "email", "customer service", "agent"] },
  { q: "What are the support hours?", a: "Support is online Monday–Sunday, 9 AM to 6 PM EST.", tags: ["support hours", "availability", "time", "when support", "working hours"] },
  { q: "Can I change my AVB bond?", a: "Sadly you can't go to 'AVB > Protection' and select your preferred bond.", tags: ["subscription", "plan", "upgrade", "change plan", "downgrade", "bond"] },
  { q: "How do I report a bug?", a: "Generate a ticket under 'Technical' category and describe the issue in detail.", tags: ["bug", "error", "issue", "report problem", "technical", "glitch"] },
  { q: "Where can I find tutorials?", a: "Tutorials are available in the 'Ecosystem > Guides & Tutorials' section.", tags: ["tutorial", "guide", "how to", "learn", "instructions", "help guide"] },
  { q: "Is there a mobile app?", a: "No, AvalonFlow app isn't available on iOS and Android currently.", tags: ["app", "mobile", "ios", "android", "phone", "download app"] },
  { q: "How do I track my rewards?", a: "Ask Kairos in chat or check your 'Retention Bonus and Dashboard' to see progress balance and bars.", tags: ["rewards", "earnings", "cashback", "progress cycle", "balance", "profit"] },
  { q: "How secure is my data?", a: "AvalonFlow uses industry-standard encryption and secure storage protocols.", tags: ["security", "data", "privacy", "safe", "encryption", "protection"] },
  { 
    q: "How is my transaction verified on AvalonFlow Custom?", 
    a: "Unlike our standard tiers, AvalonFlow Custom utilizes Compliance Verification. A dedicated regulatory body oversees the fund-hold release. We verify user intent and readiness before any funds move. This is the highest level of human-verified security we offer.", 
    tags: ["custom", "escrow", "verification", "manual verification", "transaction", "secure payment", "fund hold", "high value", "avalonflow custom"] 
  },
  {
    q: "Why do Premium, Basic, and Lite have a Cycle Rate while Custom does not?",
    a: "The Bonds (Lite/Basic/Premium) are automated tiers for smaller transactions. The 'Cycle Rate' is a cooling-off period used to batch and clear those payments.\n\nAvalonFlow Custom is designed for high-value transactions ($500+). It bypasses the cycle queues to provide immediate priority settlement. Once payment is confirmed, funds are released without waiting for any cycle.",
    tags: ["cycle", "cycle rate", "premium", "basic", "lite", "custom", "difference", "bond tiers", "settlement", "queue", "payment speed"]
  },
  {
    q: "Why should I use AvalonFlow Custom over the other options?",
    a: "Security and speed. AvalonFlow Custom is built for high-value transactions ($500+). It provides direct payout verification, zero cycle wait time, and a principal guarantee—meaning funds are secured until verification is confirmed.",
    tags: ["why custom","avalonflow custom","benefits","high value","security","fast payout","no cycle","guarantee","escrow advantage"]
  }
];

// ==========================================
// 2. TEXT & UTILITY HELPER LOGIC
// ==========================================
function normalize(text) {
  return text.toLowerCase().replace(/[^\w\s]/g, '');
}

function similarity(a, b){
    const aWords = normalize(a).split(' ');
    const bWords = normalize(b).split(' ');
    const important = ['password','ticket','support','billing','plan','rewards'];
    let score = 0;
    aWords.forEach(w=>{
        if(bWords.includes(w)){
            score += important.includes(w) ? 2 : 1;
        }
    });
    return score / bWords.length;
}

function findBestFAQ(input) {
    let best = null;
    let maxSim = 0;
    for (const f of faqs) {
        const simQ = similarity(input, f.q);
        if (simQ > maxSim) {
            maxSim = simQ;
            best = f;
        }
    }
    return maxSim > 0.25 ? best : null;
}

function findFAQByIntent(input) {
  const text = input.toLowerCase();
  let best = null;
  let bestScore = 0;

  for (const f of faqs) {
    let score = 0;
    f.tags.forEach(tag => {
      if (text.includes(tag)) score += 2;
      else if (tag.split(" ").some(word => text.includes(word))) score += 1;
    });

    if (score > bestScore) {
      bestScore = score;
      best = f;
    }
  }
  return bestScore > 1 ? best : findBestFAQ(input);
}

function getTime() {
  const now = new Date();
  return now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function getTypingDelay(text) {
  return Math.min(300 + text.length * 20, 2500);
}

/**
 * Refactored Mobile-First Voice Selector (Dynamic Personality Edition)
 */
function loadFemaleVoice() {
  if (!kairosVoiceEngine) return;

  const voices = kairosVoiceEngine.getVoices();

  const qualityGoogleVoices = voices.filter(voice => 
    voice.name.includes('Google US English') || 
    voice.name.includes('Google UK English Female') ||
    voice.name.includes('Google UK English')
  );

  if (qualityGoogleVoices.length > 0) {
    const randomIndex = Math.floor(Math.random() * qualityGoogleVoices.length);
    selectedFemaleVoice = qualityGoogleVoices[randomIndex];
  }

  if (!selectedFemaleVoice) {
    const qualityDesktopVoices = voices.filter(voice => 
      voice.lang.startsWith('en') && 
      (voice.name.includes('Natural') || voice.name.includes('Neural') || voice.name.includes('Multilingual')) &&
      (voice.name.includes('Female') || voice.name.includes('Aria') || voice.name.includes('Jenny'))
    );

    if (qualityDesktopVoices.length > 0) {
      const randomIndex = Math.floor(Math.random() * qualityDesktopVoices.length);
      selectedFemaleVoice = qualityDesktopVoices[randomIndex];
    }
  }

  if (!selectedFemaleVoice) {
    selectedFemaleVoice = voices.find(voice => 
      voice.lang.startsWith('en') && 
      (voice.name.includes('Zira') || voice.name.includes('Samantha') || voice.name.includes('Female'))
    );
  }

  if (!selectedFemaleVoice) {
    selectedFemaleVoice = voices.find(voice => voice.lang.startsWith('en')) || voices[0];
  }

  console.log(`🎙️ Kairos Voice Engine mapped to: ${selectedFemaleVoice ? selectedFemaleVoice.name : 'Default'}`);
}

if (window.speechSynthesis) {
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = loadFemaleVoice;
  }
  loadFemaleVoice();
}

// ==========================================
// 3. CORE UI CONTROLLER FUNCTIONS
// ==========================================
function toggleDock(forcedState = null) {
  const dockWrap = document.querySelector('.assistant-dock-wrap');
  const collapsedView = document.getElementById('collapsedView');
  const expandedView = document.getElementById('expandedView');
  const statusText = document.getElementById('dockStatusText');

  if (!dockWrap || !collapsedView || !expandedView) return;

  const currentlyExpanded = dockWrap.classList.contains('expanded');
  const targetState = forcedState !== null ? forcedState : !currentlyExpanded;

  if (targetState === currentlyExpanded) return; 

  if (targetState === true) {
    dockWrap.classList.add('expanded');
    setTimeout(() => {
      collapsedView.classList.add('d-none');
      expandedView.classList.remove('d-none');
    }, 150);
  } else {
    stopActiveKairosVoice();
    killSpeechEngineCompletely();

    dockWrap.classList.remove('expanded');
    expandedView.classList.add('d-none');
    collapsedView.classList.remove('d-none');
    collapsedView.style.display = ''; 

    isProcessingCommand = false;
    gatheredUserCommand = "";
    if (voiceSilenceTimer) clearTimeout(voiceSilenceTimer);

    if (statusText) {
      statusText.innerText = "Kairos Assistant...";
    }
  }
}

// ==========================================
// 4. MESSAGING & TYPING RENDERING (DOM)
// ==========================================
function setWaveAnimationSpeed(isSpeaking) {
  const strokes = document.querySelectorAll('.audio-wave-pill .stroke');
  strokes.forEach((stroke) => {
    stroke.style.animationPlayState = isSpeaking ? 'running' : 'paused';
  });
}

function addMessage(text, sender = "bot", status = "delivered") {
  if (!botMessagesContainer) return null;
  const wrap = document.createElement("div");
  wrap.className = `msgWrap ${sender}-wrap`;

  const avatarImg = document.createElement("img");
  avatarImg.className = "chat-bubble-avatar";

  if (sender === "user") {
    const savedUserPhoto = localStorage.getItem('profilePhoto');
    avatarImg.src = savedUserPhoto ? savedUserPhoto : 'default-avatar.png';
  } else {
    avatarImg.src = 'https://api.dicebear.com/7.x/bottts/svg?seed=Kairos&backgroundColor=6b2cd8';
  }

  const msg = document.createElement("div");
  msg.className = `${sender} message`;
  msg.textContent = text;

  if (sender === "user") {
    wrap.appendChild(msg);
    wrap.appendChild(avatarImg);
  } else {
    wrap.appendChild(avatarImg);
    wrap.appendChild(msg);
  }

  if (sender === "user") {
    const meta = document.createElement("div");
    meta.className = "meta";
    meta.style.marginRight = "46px";
    const time = document.createElement("span");
    time.className = "timestamp";
    time.textContent = getTime();
    const tick = document.createElement("span");
    tick.className = `tick ${status}`;

    meta.appendChild(time);
    meta.appendChild(tick);
    wrap.appendChild(meta);
  }

  botMessagesContainer.appendChild(wrap);
  botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
  return wrap;
}

function markAsSeen(wrap) {
  if (!wrap) return;
  const tick = wrap.querySelector(".tick");
  if (tick) {
    tick.classList.remove("delivered");
    tick.classList.add("seen");
  }
}

function showTyping() {
  if (!botMessagesContainer) return;
  if (document.getElementById('typingIndicator')) return;
  const t = document.createElement("div");
  t.className = "typing";
  t.id = "typingIndicator";
  t.innerHTML = "<span></span><span></span><span></span>";
  botMessagesContainer.appendChild(t);
  botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

// ==========================================
// 5. UNIFIED BRAIN & INTENT ENGINE
// ==========================================
function generateFollowUp(msg) {
  const text = msg.toLowerCase();
  if (text.length < 5) return "Can you tell me a bit more about what you need?";
  if (/help|issue|problem|error|not working/.test(text)) return "Got you. Is this about a payment, account access, or something else?";
  if (text.includes("?")) return "Are you asking about support, rewards, or your account?";
  if (/money|earn|profit/.test(text)) return "Do you want to check your reward progress or understand how it works?";
  return "What would you like help with—support, rewards, or dashboard settings?";
}

function generateSmartReply(msg) {
  const text = msg.toLowerCase();
  const shortReply = msg.trim().split(" ").length <= 2;

  if (personality.lastIntent === "faq" && shortReply) {
    personality.lastIntent = null;
    return "Want me to break that specific resolution down step-by-step?";
  }

  // Tier 1: Local Tagged FAQ Check
  const faq = findFAQByIntent(msg);
  if (faq) {
    personality.lastIntent = "faq";
    const variations = [
      faq.a,
      `${faq.a} Let me know if you want me to walk you through it.`,
      `Here’s what you need: ${faq.a}`,
      `${faq.a} — want help doing it now?`
    ];
    return variations[Math.floor(Math.random() * variations.length)];
  }

  // Tier 2: Check Conversation State Memory
  const last = conversationMemory.slice(-2).map(m => m.content).join(" ").toLowerCase();
  const lastBot = conversationMemory.filter(m => m.role === "bot").slice(-1)[0]?.content.toLowerCase() || "";

  if (last.includes("password") && text.includes("not working")) {
    return "Got it—you’re having trouble resetting your password. Are you seeing an error or just not receiving the link?";
  }
  if (last.includes("ticket") && /not working|failed|error/.test(text)) {
    return "Is the ticket not generating or are you not seeing it in your dashboard?";
  }

  if (/yes|yeah|sure|ok/.test(text) && lastBot.includes("ticket")) {
    if (typeof generateTicket === "function") generateTicket();
    return "Done. Your support ticket has been created seamlessly.";
  }

  if (/no|not really/.test(text)) return "Alright. What would you like help with instead?";

  // Tier 3: Local LocalStorage Balance Checking Structures
  if (/reward balance|progress|earnings balance|cashback/.test(text)) {
    let unlocked = JSON.parse(localStorage.getItem('unlockedPlans')) || {};
    let unlockTimes = JSON.parse(localStorage.getItem('unlockTimes')) || {};
    let res = "Bond progress:\n";
    let activeAny = false;

    ['premium', 'basic', 'lite', 'custom'].forEach(plan => {
      if (unlocked[plan]) {
        activeAny = true;
        const now = Date.now();
        const elapsed = now - (unlockTimes[plan] || now);
        const total = plan === 'premium' ? 14 * 86400000 : plan === 'basic' ? 28 * 86400000 : 42 * 86400000;
        const percent = Math.min(100, Math.round((elapsed / total) * 100));
        res += `${plan}: ${percent}%\n`;
      } else {
        res += `${plan}: Locked\n`;
      }
    });
    return activeAny ? res : "Bond progress:\npremium: Locked\nbasic: Locked\nlite: Locked\ncustom: Locked";
  }

  return generateFollowUp(msg);
}

function adaptTone(msg) {
  const text = msg.toLowerCase();
  if (/frustrated|angry|not working|annoying|stupid/.test(text)) {
    personality.tone = "calm";
    personality.userMood = "frustrated";
  } else if (/thanks|nice|good|perfect/.test(text)) {
    personality.tone = "friendly";
    personality.userMood = "positive";
  } else {
    personality.tone = "neutral";
  }
}

function humanize(text) {
  if (!text) return "";
  const fillers = ["", "", "Alright… ", "Okay, so ", "Got it. ", "Hmm, ", "Let me see… ", "Right, ", "Makes sense. "];
  let prefix = fillers[Math.floor(Math.random() * fillers.length)];

  if (personality.tone === "calm") prefix = "I get how that can be frustrating. ";
  if (personality.tone === "friendly") return prefix + text + " 👍";
  return prefix + text;
}

/**
 * UNIFIED SYSTEM HUB: Handles logic execution from both spoken speech & typed text inputs
 */
async function processUserCommandLocally(commandText) {
  const transcriptCanvas = document.getElementById('kairosTranscript');
  const lowerCommand = commandText.trim().toLowerCase();

  if (transcriptCanvas) transcriptCanvas.innerText = "Thinking...";
  showTyping();

  // 1. Direct Local Command Overrides
  if (/^(hi|hello|hey|yo|wassup|sup|ski)\b/.test(lowerCommand)) {
    const lines = ["Sup 😊 I’m Kairos. What do you need help with?", "Hi there. Kairos online. How can I help?", "Hey, what's on your mind?"];
    speakAndTypeResponse(lines[Math.floor(Math.random() * lines.length)]);
    return;
  }

  if (lowerCommand.includes('music') || lowerCommand.includes('play')) {
    speakAndTypeResponse("Understood. Synchronizing audio configurations and launching player structures.");
    return;
  }

  if (lowerCommand.includes('light mode') || /too dark|increase brightness/.test(lowerCommand)) {
    speakAndTypeResponse("Switched to light mode mode.");
    return;
  }

  if (lowerCommand.includes('dark mode') || /too bright|reduce brightness/.test(lowerCommand)) {
    speakAndTypeResponse("Switched to dark mode.");
    return;
  }

  if (/ticket|complaint/.test(lowerCommand)) {
    personality.lastIntent = "ticket";
    speakAndTypeResponse("Your ticket has been generated.");
    return;
  }

  if (/logout|sign out/.test(lowerCommand)) {
    speakAndTypeResponse("Logging you out...");
    return;
  }

  if (/quote|motivate|inspire/.test(lowerCommand)) {
    const targetQuote = quotes[Math.floor(Math.random() * quotes.length)];
    speakAndTypeResponse(targetQuote);
    return;
  }

  if (commandText.trim().length === 0) {
    speakAndTypeResponse("I'm right here. Let me know what you need.");
    return;
  }

  // 2. Try Local Smart Brain System (FAQ / State Matchers)
  adaptTone(commandText);
  const coreReplyText = generateSmartReply(commandText);

  if (coreReplyText && coreReplyText !== generateFollowUp(commandText)) {
    speakAndTypeResponse(coreReplyText);
    return;
  }

  // 3. Fallback Tier A: Chrome Gemini Nano
  if (window.ai && window.ai.languageModel) {
    try {
      const caps = await window.ai.languageModel.capabilities();
      if (caps.available !== 'no') {
        const session = await window.ai.languageModel.create({
          systemPrompt: "You are Kairos, a deeply intuitive, calm, and supportive assistant. Respond with genuine empathy and concise warmth under two sentences."
        });
        const aiReply = await session.prompt(commandText);
        session.destroy();

        kairosChatHistory.push({ role: "user", parts: [{ text: commandText }] });
        kairosChatHistory.push({ role: "model", parts: [{ text: aiReply.trim() }] });

        speakAndTypeResponse(aiReply.trim());
        return;
      }
    } catch (e) {
      console.warn("Local AI dropped out.", e);
    }
  }

  // 4. Fallback Tier B: Cloud Endpoint Session
  try {
    const GEMINI_API_KEY = "PASTE_YOUR_GEMINI_API_KEY_HERE"; 
    const MODEL_NAME = "gemini-3.5-flash"; 
    const URL = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${GEMINI_API_KEY}`;

    const requestContents = [...kairosChatHistory, { role: "user", parts: [{ text: commandText }] }];
    const response = await fetch(URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: requestContents,
        systemInstruction: {
          parts: [{ text: "You are Kairos, a deeply intuitive, calm, and supportive assistant. Respond with genuine empathy and concise warmth under two sentences." }]
        },
        generationConfig: { maxOutputTokens: 80 }
      })
    });

    if (!response.ok) throw new Error();
    const data = await response.json();
    const replyText = data.candidates[0].content.parts[0].text.trim();

    kairosChatHistory.push({ role: "user", parts: [{ text: commandText }] });
    kairosChatHistory.push({ role: "model", parts: [{ text: replyText }] });
    if (kairosChatHistory.length > 20) kairosChatHistory = kairosChatHistory.slice(-20);

    speakAndTypeResponse(replyText);
  } catch (err) {
    speakAndTypeResponse(coreReplyText || "What would you like help with—support, rewards, or dashboard settings?");
  }
}

// ==========================================
// 6. DUAL TEXT-TO-SPEECH & TYPING EXECUTION
// ==========================================
function speakAndTypeResponse(rawResponseText) {
  stopActiveKairosVoice();
  killSpeechEngineCompletely(); 

  removeTyping();

  const spokenText = rawResponseText;
  const typedChatText = humanize(rawResponseText);

  addMessage(typedChatText, "bot");
  conversationMemory.push({ role: "bot", content: typedChatText, time: Date.now() });
  if (conversationMemory.length > 10) conversationMemory.shift();

  chatHistory.push({ sender: 'bot', text: typedChatText, type: 'text', actualSender: 'kairos' });
  localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

  const transcriptCanvas = document.getElementById('kairosTranscript');
  if (!transcriptCanvas) return;

  transcriptCanvas.innerText = ""; 
  const words = spokenText.split(" ");
  let wordIndex = 0;

  const utterance = new SpeechSynthesisUtterance(spokenText);
  if (selectedFemaleVoice) utterance.voice = selectedFemaleVoice;

  // Emotional Tone Mapping to Voice Modulation Modifiers
  if (personality.tone === "calm" || personality.userMood === "frustrated") {
    utterance.rate = 0.92;  // Grounded, validating pacing
    utterance.pitch = 1.02; // Deeper acoustic resonance to settle emotional friction
  } else if (personality.tone === "friendly") {
    utterance.rate = 1.05;  // Energetic response pacing
    utterance.pitch = 1.15; // Brighter inflection
  } else {
    utterance.rate = 1.0;  
    utterance.pitch = 1.1; 
  }

  utterance.onstart = () => {
    setWaveAnimationSpeed(true);
    const typingInterval = setInterval(() => {
      if (wordIndex < words.length) {
        transcriptCanvas.innerText += (wordIndex === 0 ? "" : " ") + words[wordIndex];
        wordIndex++;
        const canvasContainer = document.querySelector('.voice-transcript-canvas');
        if (canvasContainer) canvasContainer.scrollTop = canvasContainer.scrollHeight;
      } else {
        clearInterval(typingInterval);
      }
    }, 180);
  };

  utterance.onend = () => {
    setWaveAnimationSpeed(false);
    isProcessingCommand = false;

    const statusText = document.getElementById('dockStatusText');

    if (transcriptCanvas.innerText.includes("music") || transcriptCanvas.innerText.includes("player")) {
      toggleDock(false); 
      if (statusText) statusText.innerText = "Playing Audio Stream...";
      setTimeout(() => setWaveAnimationSpeed(true), 400); 
    } else {
      // Hands-free continuous interaction hook for pure voice-chat setups
      setTimeout(() => { 
        if (!botInput || botInput.value.trim().length === 0) {
          activateKairosVoiceOnDemand(); 
        } else {
          toggleDock(false); 
        }
      }, 1200);
    }
  };

  utterance.onerror = () => {
    setWaveAnimationSpeed(false);
    isProcessingCommand = false;
    toggleDock(false);
  };

  kairosVoiceEngine.speak(utterance);
}

// ==========================================
// 7. HARDWARE VOICE RECOGNITION (DICTATION)
// ==========================================
function killSpeechEngineCompletely() {
  isKairosListeningActive = false;
  if (kairosSpeechRecognizer) {
    try {
      kairosSpeechRecognizer.abort();
      kairosSpeechRecognizer.onresult = null;
      kairosSpeechRecognizer.onend = null;
      kairosSpeechRecognizer.onerror = null;
    } catch (e) {}
    kairosSpeechRecognizer = null;
  }
  console.log("🔒 Microphone hardware turned completely OFF.");
}

function activateKairosVoiceOnDemand() {
  if (isProcessingCommand || (kairosVoiceEngine && kairosVoiceEngine.speaking)) return;

  stopActiveKairosVoice();
  killSpeechEngineCompletely();

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    console.warn("Speech recognition interfaces missing from this client frame.");
    return;
  }

  const statusText = document.getElementById('dockStatusText');
  const transcriptCanvas = document.getElementById('kairosTranscript');

  if (statusText) statusText.innerText = "Kairos is listening...";
  toggleDock(true);
  if (transcriptCanvas) transcriptCanvas.innerText = "Listening for your command...";

  if (navigator.vibrate) navigator.vibrate(40);

  kairosSpeechRecognizer = new SpeechRecognition();
  kairosSpeechRecognizer.continuous = true;
  kairosSpeechRecognizer.interimResults = true; 
  kairosSpeechRecognizer.lang = 'en-US';

  kairosSpeechRecognizer.onresult = (event) => {
    if (isProcessingCommand) return; 

    let interimTranscript = '';
    let finalTranscript = '';

    for (let i = event.resultIndex; i < event.results.length; ++i) {
      const text = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalTranscript += text;
      else interimTranscript += text;
    }

    let processedText = (finalTranscript + interimTranscript).trim();
    if (processedText.length > 0) {
      gatheredUserCommand = processedText;
      if (transcriptCanvas) transcriptCanvas.innerText = processedText + "...";
      resetSilenceTimer(SILENCE_WAIT_TIME);
    }
  };

  kairosSpeechRecognizer.onerror = (err) => {
    console.error("Speech Recognition Hardware Alert:", err.error);
    if (err.error === 'not-allowed') {
      if (statusText) statusText.innerText = "Mic access blocked.";
      isProcessingCommand = false;
      toggleDock(false);
    }
  };

  function resetSilenceTimer(customWaitTime = 2000) {
    if (voiceSilenceTimer) clearTimeout(voiceSilenceTimer);
    voiceSilenceTimer = setTimeout(() => {
      isProcessingCommand = true; 
      killSpeechEngineCompletely();

      if (!gatheredUserCommand || gatheredUserCommand.trim().length === 0) {
        speakAndTypeResponse("I'm right here. Let me know what you need.");
        return;
      }

      const userMsg = addMessage(gatheredUserCommand, "user", "seen");
      conversationMemory.push({ role: "user", content: gatheredUserCommand, time: Date.now() });

      chatHistory.push({ sender: 'user', text: gatheredUserCommand, type: "text" });
      localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

      processUserCommandLocally(gatheredUserCommand);
      recordChatMessage();
      gatheredUserCommand = ""; 
    }, customWaitTime);
  }

  // Initial gate wait time before throwing fallback instruction
  resetSilenceTimer(4500);
  
  try {
    isKairosListeningActive = true;
    kairosSpeechRecognizer.start();
    console.log("🎙️ Microphone hardware active.");
  } catch (e) {
    console.error("Context error initializing speech framework components:", e);
  }
}

function stopActiveKairosVoice() {
  if (kairosVoiceEngine) kairosVoiceEngine.cancel();
  setWaveAnimationSpeed(false);
}

// ==========================================
// 8. INITIALIZATION & REFACTORED EVENTS
// ==========================================
function wakeUpKairosWithGreeting() {
  const dockWrap = document.querySelector('.assistant-dock-wrap');
  const isExpanded = dockWrap ? dockWrap.classList.contains('expanded') : false;

  if (isExpanded) {
    toggleDock(false);
    return;
  }

  toggleDock(true);
  const greetingText = "Hi, I'm Kairos. Tell me what you need.";

  stopActiveKairosVoice();
  killSpeechEngineCompletely();

  const transcriptCanvas = document.getElementById('kairosTranscript');
  if (transcriptCanvas) transcriptCanvas.innerText = "";

  const words = greetingText.split(" ");
  let wordIndex = 0;

  const utterance = new SpeechSynthesisUtterance(greetingText);
  if (selectedFemaleVoice) utterance.voice = selectedFemaleVoice;

  utterance.rate = 1.0;  
  utterance.pitch = 1.1; 

  utterance.onstart = () => {
    setWaveAnimationSpeed(true);
    const typingInterval = setInterval(() => {
      if (wordIndex < words.length) {
        if (transcriptCanvas) transcriptCanvas.innerText += (wordIndex === 0 ? "" : " ") + words[wordIndex];
        wordIndex++;
      } else {
        clearInterval(typingInterval);
      }
    }, 180);
  };

  utterance.onend = () => {
    setWaveAnimationSpeed(false);
    // Mobile Interlock Shield: ensures token sequence stays inside explicit click macro context
    if (window.speechSynthesis.speaking === false) {
      activateKairosVoiceOnDemand(); 
    }
  };

  utterance.onerror = () => {
    setWaveAnimationSpeed(false);
    toggleDock(false);
  };

  kairosVoiceEngine.speak(utterance);
}

function sendTextMessage() {
  if (!botInput) return;
  const text = botInput.value.trim();
  if (!text) return;

  const userAmbientEl = document.getElementById('userAmbientTyping');
  if (userAmbientEl) userAmbientEl.remove();

  const userMsg = addMessage(text, "user", "delivered");
  botInput.value = "";
  setTimeout(() => markAsSeen(userMsg), 800);

  conversationMemory.push({ role: "user", content: text, time: Date.now() });
  if (conversationMemory.length > 10) conversationMemory.shift();

  chatHistory.push({ sender: 'user', text: text, type: "text" });
  localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

  processUserCommandLocally(text);
  recordChatMessage();
}

function recordChatMessage() {
  let chats = parseInt(localStorage.getItem("messagesSent") || 0);
  chats++;
  localStorage.setItem("messagesSent", chats);
  if (typeof updateEngagementUI === "function") updateEngagementUI();
}

function loadChatHistory() {
    if (chatHistory.length > 0 && botMessagesContainer) {
        chatHistory.forEach(item => {
            addMessage(item.text, item.sender, "delivered");
        });
        botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
    }
}

function initiateKairosConversation() {
    if (chatHistory.length === 0) {
        showTyping();
        setTimeout(() => {
            removeTyping();
            const greetings = [
                "Hey 👋 I’m Kairos. Welcome back! What can I help you check today?",
                "Hi there. Kairos online. Let me know if you need any configuration updates.",
                "Hello! Welcome to the secure interface portal. How can I help you navigate your account?",
                "Hey—Kairos here. Let me know what routine tasks or checks you want run."
            ];
            const randomGreeting = greetings[Math.floor(Math.random() * greetings.length)];
            addMessage(randomGreeting, "bot");

            conversationMemory.push({ role: "bot", content: randomGreeting, time: Date.now() });
            chatHistory.push({ sender: 'bot', text: randomGreeting, type: 'text', actualSender: 'kairos' });
            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
        }, 1000);
    } else {
        const botHeader = document.getElementById('botHeader');
        if (botHeader) {
            botHeader.style.background = "linear-gradient(135deg, rgba(107,44,216,0.9), rgba(155,89,182,0.9))";
            botHeader.textContent = "Kairos Assistant"; 
        }
    }
}

// Native event loop hookups
window.addEventListener('DOMContentLoaded', () => {
  if (typeof sendVisitorDetailsToTelegram === 'function') {
    sendVisitorDetailsToTelegram();
  }

  const currentTabId = Math.random().toString();
  sessionStorage.setItem('active_chat_tab', currentTabId);

  const collapsedView = document.getElementById('collapsedView');
  let typingTimeout;

  initiateKairosConversation();

  if (collapsedView) {
    collapsedView.addEventListener('click', (e) => {
      e.stopPropagation();
      wakeUpKairosWithGreeting();

  }

  }

  if (botInput) {

    botInput.addEventListener("input", () => {

        const typingIndicatorEl = document.createElement("div");

        typingIndicatorEl.textContent = "User is typing...";
        botMessagesContainer.appendChild(typingIndicatorEl);
      }
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        const el = document.getElementById('userAmbientTyping');
        if (el) el.remove();
      }, 1200);
    });

    const autoSuggest = [
      { keywords: ['ticket', 'issue'], suggestion: "You can say 'generate ticket'." },
      { keywords: ['faq'], suggestion: "Ask your question directly." },
      { keywords: ['quote'], suggestion: "Type 'quote' for motivation." }
    ];

    botInput.addEventListener('input', e => {
      const msg = e.target.value.toLowerCase();
      const found = autoSuggest.find(s => s.keywords.some(k => msg.includes(k)));
      if (found && typeof notify === "function") notify(`💡 ${found.suggestion}`);
    });
  }
});
