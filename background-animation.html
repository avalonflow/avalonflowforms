<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvalonFlow</title>

      <!-- Favicon as .ico -->
<link rel="icon" href="/favicon.png" type="image/png" sizes="48x48">

    <!-- Structured Data for Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AvalonFlow",
      "url": "https://avalonflow.site",
      "logo": "https://avalonFlow.site/favicon.png"
    }
</script>

<style>
        /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}

/* ================= Header Logo Card Neon ================= */

.minimal-logo-header {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 70px 0 30px 0;
  background: transparent;
}

/* THE CIRCULAR WINDOW:
   This defines the 180px bounding circle.
*/
.logo-shimmer-wrapper {
  position: relative;
  display: inline-block;
  width: 180px;          
  height: 180px;         
  border-radius: 50%;   /* Turns the container wrapper into a perfect circle */
  overflow: hidden;     /* Keeps the shimmer pass inside the circle boundaries */
  
  /* TRICK: If your design needs a background fill behind the logo inside the circle, 
    add it here (e.g., background: #120224;). Otherwise, leave it transparent.
  */
  background: transparent; 
}

.avalon-logo-img {
  display: block;
  width: 100%;          
  height: 100%;
  
  /* YOUR CSS TRICK COMBO */
  object-fit: contain;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.4));

  /* THE UNZOOMED APPROACH:
    We apply the border-radius directly to the image element itself. 
    This ensures that even when shrunk down to 0.40, the image's own 
    dark square corners are forced into a perfect circle shape.
  */
  transform: scale(0.30); 
  border-radius: 50%;     /* Snaps the shrunk square asset into a crisp circle */
  
  /* Centers the scaled graphic perfectly inside your 180px frame */
  position: absolute;
  top: 0; 
  left: 0;

  /* RESTORES FULL ORIGINAL GRAPHICS & COLORS */
  mix-blend-mode: normal; 

  /* Moving light pass shimmer overlay setup */
  -webkit-mask-image: linear-gradient(
    -75deg, 
    rgba(0, 0, 0, 1) 35%, 
    rgba(255, 255, 255, 0.4) 50%, 
    rgba(0, 0, 0, 1) 65%
  );
  mask-image: linear-gradient(
    -75deg, 
    rgba(0, 0, 0, 1) 35%, 
    rgba(255, 255, 255, 0.4) 50%, 
    rgba(0, 0, 0, 1) 65%
  );
  
  -webkit-mask-size: 400% 100%;
  mask-size: 400% 100%;
  -webkit-mask-position: 0% 0%;
  mask-position: 0% 0%;
  
  /* Animates the premium glare pass smoothly across the graphic */
  animation: dynamicLightPass 4s infinite ease-in-out;
}

/* The Glare Animation Keyframes */
@keyframes dynamicLightPass {
  0% {
    -webkit-mask-position: 0% 0%;
    mask-position: 0% 0%;
  }
  65% {
    -webkit-mask-position: 100% 0%;
    mask-position: 100% 0%;
  }
  100% {
    -webkit-mask-position: 100% 0%;
    mask-position: 100% 0%;
  }
}












    footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 18px 0;
    font-size: 14px;
    color: #555;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.08);
    z-index: 6;
}
    </style>
</head>
<body>
    <!-- Floating Background -->
    <div id="floating-bg"></div>

<header class="minimal-logo-header">
  <div class="logo-shimmer-wrapper">
    <img src="assets/pictures/favicon.png" alt="Avalon Logo" class="avalon-logo-img">
  </div>
</header>


    <!-- Sticky Footer -->
    <footer>
        © 2026 AvalonFlow • Powered by Centrical™
    </footer>

    <script>
        /* ---------- Floating Particles ---------- */
        const bg = document.getElementById('floating-bg');
        const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
        function particle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random()*20+10;
            p.style.width = s+'px';
            p.style.height = s+'px';
            p.style.left = Math.random()*100+'vw';
            p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
            p.style.animationDuration = (Math.random()*20+10)+'s';
            bg.appendChild(p);
            setTimeout(()=>p.remove(),30000);
        }
        setInterval(particle,800);
</script>

</body>
</html>
