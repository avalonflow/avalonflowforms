async function sendVisitorDetailsToTelegram() {

const photoInput = document.getElementById('photoInput');
const profilePhoto = document.getElementById('profilePhoto');
const avatarLabel = document.getElementById('avatarLabel'); // Targeted the span

const cropModal = document.getElementById('cropModal');
const cropImage = document.getElementById('cropImage');

const DEFAULT_AVATAR = 'default-avatar.png';
let isProcessing = false;


// CLICK TO ADD OR REMOVE
profilePhoto.addEventListener('click', () => {
    if (isProcessing) return;

    // Check if a custom photo is currently set
    const hasPhoto = localStorage.getItem('profilePhoto');

    if (hasPhoto) {
        // REMOVE PICTURE: Clear it out instantly
        localStorage.removeItem('profilePhoto');
        profilePhoto.src = DEFAULT_AVATAR;
        if (avatarLabel) avatarLabel.textContent = "Add Profile Picture";
    } else {
        // ADD PICTURE: Open the file picker if it's empty
        photoInput.click();
    }
});


// AUTO PROCESS IMAGE (no save button)
photoInput.addEventListener('change', (e) => {

    const file = e.target.files[0];
    if (!file || isProcessing) return;

    isProcessing = true;

    const reader = new FileReader();

    reader.onload = function(event) {

        const rawImage = event.target.result;

        const img = new Image();
        img.src = rawImage;

        img.onload = function() {

            const canvas = document.createElement('canvas');
            const size = Math.min(img.width, img.height);

            canvas.width = size;
            canvas.height = size;

            const ctx = canvas.getContext('2d');

            ctx.drawImage(
                img,
                (img.width - size) / 2,
                (img.height - size) / 2,
                size,
                size,
                0,
                0,
                size,
                size
            );

            const finalImage = canvas.toDataURL('image/png');

            // update avatar instantly
            profilePhoto.src = finalImage;

            // save permanently
            localStorage.setItem('profilePhoto', finalImage);
            
            // Switch label text to show it can now be removed
            if (avatarLabel) avatarLabel.textContent = "Remove Profile Picture";

            // close modal
            cropModal.classList.add('hidden');

            // reset input to prevent re-trigger bugs
            photoInput.value = '';

            // unlock system shortly after
            setTimeout(() => {
                isProcessing = false;
            }, 300);
        };
    };

    reader.readAsDataURL(file);
});

// 🔐 PLAN CONFIG (SYNCED WITH RETURNS)
// ================================
const plans = {
    premium: { per12h: 298.29, ac: "premiumAC" },
    basic:   { per12h: 183.29, ac: "basicAC" },
    lite:    { per12h: 118.29, ac: "liteAC" },
    custom:  { per12h: 0, ac: "customAC" }
};

const BASE_ACU = 147349.26;
const BASE_ACTIVE_BONDS = 1;

const ALL_PLANS = ["premium", "basic", "lite", "custom"];

// ================================
// 📦 PAID PLANS
// ================================
const paidPlans = JSON.parse(localStorage.getItem("paidPlans")) || {};

// ================================
// 🎯 DISPLAY STATE
// ================================
let displayedAC = {
    premium: 0,
    basic: 0,
    lite: 0,
    custom: 0
};

let lastCycleCount = {
    premium: 0,
    basic: 0,
    lite: 0,
    custom: 0
};

// ================================
// 🔁 HELPERS
// ================================
const CYCLE_MS = 12 * 60 * 60 * 1000;

function getPlan(planKey) {
    return paidPlans[planKey];
}

function isLocked(planData, now) {
    return !planData?.active || now >= planData.expiresAt;
}

// ================================
// 📊 ACTIVE PLANS COUNT (RAW STATE)
// ================================
function updateActivePlans() {
    const now = Date.now();
    const currentDeviceId = localStorage.getItem("avalonflow_deviceId");

    const activeCount = BASE_ACTIVE_BONDS + ALL_PLANS.reduce((count, plan) => {
        const planData = paidPlans[plan];

        if (!planData) return count;

        // Device binding check
        if (planData.deviceId && planData.deviceId !== currentDeviceId) return count;

        // Only real paid + not expired
        const isActive = planData.active && now < planData.expiresAt;

        return isActive ? count + 1 : count;
    }, 0);

    const el = document.getElementById('activePlans');

    // instant update (no animation)
    if (el) el.textContent = activeCount;
}

// ================================
// 💰 TOTAL ACU (FIXED - NO RESET ON LOCK)
// ================================
function updateTotalACU() {
    const now = Date.now();

    const total = BASE_ACU + ALL_PLANS.reduce((sum, plan) => {
        const data = getPlan(plan);
        if (!data) return sum;

        const per12h = plan === "custom"
            ? ((data.amount || 0) * 1.5) / 2
            : plans[plan].per12h;

        const elapsed = now - data.activatedAt;
        const cycles = Math.floor(elapsed / CYCLE_MS);
        const cycleProgress = (elapsed % CYCLE_MS) / CYCLE_MS;

        const liveValue = (cycles * per12h) + (cycleProgress * per12h);

        // 🔥 KEY FIX: freeze value instead of removing it
        const finalValue = isLocked(data, now)
            ? displayedAC[plan]
            : liveValue;

        return sum + finalValue;
    }, 0);

    const el = document.getElementById("totalACU");
    if (el) {
    el.textContent =
        "$" + total.toLocaleString(undefined, {
            minimumFractionDigits: 2,
            maximumFractionDigits: 2
        });
}

    localStorage.setItem("totalACU", total.toFixed(2));
}

// ================================
// 📈 PER PLAN ACU (FIXED)
// ================================
function updatePlanACU() {
    const now = Date.now();

    ALL_PLANS.forEach(plan => {
        const data = getPlan(plan);
        const el = document.getElementById(plans[plan].ac);
        if (!el || !data) return;

        const per12h = plan === "custom"
            ? ((data.amount || 0) * 1.5) / 2
            : plans[plan].per12h;

        const elapsed = now - data.activatedAt;
        const cycles = Math.floor(elapsed / CYCLE_MS);
        const cycleProgress = (elapsed % CYCLE_MS) / CYCLE_MS;

        const targetAC = (cycles * per12h) + (cycleProgress * per12h);

        // 🔥 KEY FIX: freeze when locked instead of resetting
        const finalTarget = isLocked(data, now)
            ? displayedAC[plan]
            : targetAC;

        const diff = finalTarget - displayedAC[plan];
        displayedAC[plan] += diff * 0.08;

        el.textContent = displayedAC[plan].toFixed(2) + " ACU";

        // cycle animation
        if (cycles > lastCycleCount[plan]) {
            const card = document.getElementById(plan + "Card");
            card?.classList.add("cycle-burst");

            setTimeout(() => {
                card?.classList.remove("cycle-burst");
            }, 1200);

            lastCycleCount[plan] = cycles;
        }
    });
}

// ================================
// 🔄 MAIN UPDATE
// ================================
function updateACU() {
    updatePlanACU();
    updateTotalACU();
    updateActivePlans();
}

// ================================
// 🚀 LOOP
// ================================
function animate() {
    updateACU();
    requestAnimationFrame(animate);
}

window.addEventListener("load", () => {
    animate();
});

// ---------- Auto-refresh in case localStorage changes externally ----------
setInterval(updateACU, 30000); // every 30 seconds

    if (remaining <= 0) return "expired";

    // 9–6 HIDE

);

// 🔁 VISIBILITY RULES (your exact logic)

else if (state === "show_mid") {

else if (state === "hide_mid") {

else {

/* --------------------------
AVB ENGINE (DASHBOARD MATCH)
-------------------------- */

(function avbEngine() {

    const urlParams = new URLSearchParams(window.location.search);
    const hasInitParam =
        urlParams.get("session") === "refresh" ||
        urlParams.get("mode") === "init";

    const keyAlreadyUsed = localStorage.getItem("avb_key_used");

    if (hasInitParam && !keyAlreadyUsed) {
        localStorage.removeItem("avb_expiry_time");
        localStorage.removeItem("avb_redirected_to_avb");
        localStorage.removeItem("avb_session_state");
        
        localStorage.setItem("avb_key_used", "true");
    }

    if (!localStorage.getItem("avb_expiry_time")) {
        localStorage.setItem(
            "avb_expiry_time",
            Date.now() + 15 * 60 * 1000
        );
    }

    let triggered = false;
    let vibRunning = false;
    let vibTimeout;

    const startVibrationCycle = () => {
        if (vibRunning) return;
        vibRunning = true;

        const loop = () => {
            if (!vibRunning) return;

            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300]);
            }

            vibTimeout = setTimeout(loop, 15000);
        };

        loop();
    };

    const stopVibrationCycle = () => {
        vibRunning = false;
        if (vibTimeout) clearTimeout(vibTimeout);
        if (navigator.vibrate) navigator.vibrate(0);
    };

    const check = () => {
        const expiryTime = parseInt(
            localStorage.getItem("avb_expiry_time"),
            10
        );

        const remainingSec = Math.floor(
            (expiryTime - Date.now()) / 1000
        );

        if (!triggered && remainingSec <= 360 && remainingSec > 0) {

            triggered = true;

            startVibrationCycle();

            console.log("AVB warning triggered with vibration cycle");
        }

        // optional safety stop if time passes out of range
        if (remainingSec <= 0 || remainingSec > 360) {
            stopVibrationCycle();
        }
    };

    check();
    const avbInterval = setInterval(check, 1000);

})();
