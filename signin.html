    <script>
    (function() {
        const SecurityEngine = {
            validateExecutionEnvironment: function() {
                const authorizedDomain = "avalonflow.site";
                const currentHost = window.location.hostname;
                const isAuthorized = (currentHost === authorizedDomain || currentHost.endsWith('.' + authorizedDomain));
                
                if (!isAuthorized) {
                    this.triggerSelfDestruct();
                    return false;
                }
                return true;
            },

            get404Template: function() {
                return `
                    <div class="error-container">
                        <div class="error-code-wrapper">
                            <span>4</span>
                            <div class="logo-container">
                                <img src="assets/pictures/1780995787737.jpeg" alt="Logo" class="logo-img">
                            </div>
                            <span>4</span>
                        </div>
                        <h2>Didn’t find anything here!</h2>
                    </div>
                `;
            },

            triggerSelfDestruct: function() {
                localStorage.clear();
                sessionStorage.clear();
                document.body.innerHTML = this.get404Template();
                document.body.classList.add('render-ready');
                try { window.open('', '_self').close(); } catch (e) {}
                this.activateInspectorTrap();
                this.activateEnvironmentSabotage();
            },

            activateResetListener: function() {
                window.addEventListener('message', (event) => {
                    if (event.origin !== window.location.origin) return;
                    if (event.data && event.data.type === 'COMMAND_SYSTEM_RESET') {
                        localStorage.setItem('_sys_reset_token', event.data.resetId);
                        localStorage.setItem('_sys_reset_expiry', event.data.expiresAt);
                        const currentUrl = new URL(window.location.href);
                        currentUrl.searchParams.set('auth_reset', event.data.resetId);
                        window.location.href = currentUrl.toString();
                    }
                });
            },

            establish7DayClearance: function() {
                const expiry = Date.now() + (7 * 24 * 60 * 60 * 1000);
                localStorage.setItem('_sys_persistence_anchor', expiry.toString());
            },

            isPersistenceWindowActive: function() {
                const savedAnchor = localStorage.getItem('_sys_persistence_anchor');
                return savedAnchor && Date.now() < parseInt(savedAnchor, 10);
            },

            checkResetValidation: function() {
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('auth_reset');
                const incomingOTK = urlParams.get('otk');

                if (urlToken) {
                    if (urlToken === localStorage.getItem('_sys_reset_token') && Date.now() < parseInt(localStorage.getItem('_sys_reset_expiry') || 0, 10)) {
                        this.establish7DayClearance();
                        this.executeSystemRevival();
                        return true; 
                    }
                    this.triggerSelfDestruct();
                    return false;
                }

                if (incomingOTK) {
                    try {
                        const [entropy, expirationTimestamp] = atob(incomingOTK).split('.');
                        if (Date.now() > parseInt(expirationTimestamp, 10) || localStorage.getItem('active_session_otk') !== incomingOTK) {
                            this.triggerSelfDestruct();
                            return false;
                        }
                        localStorage.removeItem('active_session_otk');
                        this.establish7DayClearance();
                        this.executeSystemRevival();
                        return true;
                    } catch (e) { this.triggerSelfDestruct(); return false; }
                }
                return false;
            },

            executeSystemRevival: function() {
                localStorage.removeItem('_sys_reset_token');
                localStorage.removeItem('_sys_reset_expiry');
                const user = new URLSearchParams(window.location.search).get('user');
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + (user ? `?user=${encodeURIComponent(user)}` : '');
                window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
                window.location.reload();
            },

            getHardwareID: function() {
                const components = [navigator.userAgent, navigator.platform, screen.width, screen.height].join('|');
                let hash = 0;
                for (let i = 0; i < components.length; i++) hash = ((hash << 5) - hash) + components.charCodeAt(i);
                return '1' + (hash | 0).toString(16); 
            },

            detectAgencyProfile: function() {
                return navigator.userAgent.includes("Corporate-Gateway") ? 'GOVERNMENT' : 'PRIVATE';
            },

            activateInspectorTrap: function() { setInterval(() => { debugger; }, 50); },

            activateEnvironmentSabotage: function() {
                console.log = console.warn = console.error = console.info = () => {};
                setInterval(() => {
                    const paths = ['4|1|3|0|2'.split('|')];
                    let pointer = 0;
                    while (true) {
                        switch (['4','1','3','0','2'][pointer++]) {
                            case '0': try { (function stackTrap(i) { if (("" + i/i)["length"] !== 1 || i % 20 === 0) (function(){}).constructor("debugger")(); else stackTrap(++i); })(0); } catch(e) {} continue;
                            case '1': if (Math.random() > 0.5) window.status = 'VALIDATING'; continue;
                            case '2': return;
                            case '3': if (window.outerHeight - window.innerHeight > 160 || window.outerWidth - window.innerWidth > 160) this.triggerSelfDestruct(); continue;
                            case '4': (Date.now() % 1000) * 0x5a1b; continue;
                        }
                        break;
                    }
                }, 200); 
            },

            injectSecureApp: function(agencyType) {
                const payload = document.getElementById('hidden-application-payload');
                if (!payload || !payload.innerHTML.trim()) { this.triggerSelfDestruct(); return; }
                const frame = document.createElement('iframe');
                frame.style = 'width:100vw;height:100vh;border:none;position:fixed;top:0;left:0;z-index:999999';
                frame.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-forms'); 
                document.body.appendChild(frame);
                const ctx = frame.contentWindow || frame.contentDocument;
                ctx.AUTHORIZED_AGENCY = agencyType;
                ctx.document.open(); ctx.document.write(payload.innerHTML); ctx.document.close();
                payload.style.display = 'none'; 
                document.body.classList.add('render-ready');
            },

            run: function() {
                if (!this.validateExecutionEnvironment()) return;

                this.activateResetListener();
                if (this.checkResetValidation()) return;

                const id = this.getHardwareID();
                const type = this.detectAgencyProfile();
                
                if (this.isPersistenceWindowActive() || ((id.startsWith('a') || id.startsWith('1')) && (type === 'GOVERNMENT' || type === 'PRIVATE'))) {
                    this.activateInspectorTrap();         
                    this.activateEnvironmentSabotage();   
                    document.readyState === 'loading' ? window.addEventListener('DOMContentLoaded', () => this.injectSecureApp(type)) : this.injectSecureApp(type);
                } else {
                    this.triggerSelfDestruct();
                }
            }
        };

        // Parent Window Communication Hub
        window.addEventListener("message", (e) => { 
            if (e.data?.type === "UPDATE_TITLE") document.title = e.data.title; 
            
            // Handle seamless URL mutations from sandbox context
            if (e.data?.type === "UPDATE_URL" && e.origin === window.location.origin) {
                const newUrl = window.location.protocol + "//" + window.location.host + e.data.path;
                window.history.pushState({ path: newUrl }, '', newUrl);
            }
        });

        document.readyState === 'loading' ? window.addEventListener('DOMContentLoaded', () => SecurityEngine.run()) : SecurityEngine.run();
    })();
    </script>

    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.4); opacity: 0.5; }
}

@keyframes glitchShift {
    0% { transform: translate(1px, 0); opacity: 0.6; }
    100% { transform: translate(-1px, 0); opacity: 0.3; }
}

@keyframes glitchShift2 {
    0% { transform: translate(-1px, 0); opacity: 0.4; }
    100% { transform: translate(1px, 0); opacity: 0.2; }
}

    bottom: 0;
    left: 0;
    width: 100%;

    font-size: 14px;
    color: #555;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.08);
    z-index: 6;
}

<body>

<div id="floating-bg"></div>

<header style="text-align:center; padding:40px 0; z-index: 2; position: relative;">
  <div class="logo-card">
    <img src="assets/pictures/1775740874549.jpg" alt="AvalonFlow Logo">
  </div>
</header>

<main>
    <div id="loginForm">
        <h2 class="gradient-animation">Sign-in</h2>

        <input type="text" id="AvalonFlowID" placeholder="AvalonFlow ID or Email Address">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>
        <button onclick="biometricLogin()">Login with Device Security</button>

        <p id="loginError" style="color:red;"></p>

        <!-- Mini TV -->
        <div id="ticketRef">
            <div id="credentialsDisplay"></div>
            <div id="guidanceMessage"></div>
        </div>
    </div>
</main>

<!-- Sticky Footer -->
<footer>
    © 2026 AvalonFlow Corp • All Rights Reserved
</footer>

<script>
  // Prevent user from going back to previous pages
  history.pushState(null, null, location.href);

  window.addEventListener('popstate', function () {
    history.go(1); // keeps user on this page
  });

  // Optional: also prevent back with keyboard shortcuts
  window.addEventListener('keydown', function (e) {
    if ((e.key === 'Backspace' && e.target === document.body) || e.key === 'ArrowLeft') {
      e.preventDefault();
    }
  });

window.addEventListener("DOMContentLoaded", () => {
    /* ---------- Floating Particles ---------- */
        const container = document.getElementById('floating-bg');
        for (let i = 0; i < 60; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 20 + 10;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (Math.random() * 20 + 10) + 's';
            container.appendChild(p);
        }



    let identity = JSON.parse(localStorage.getItem("avalonflow_identity"));

if (!identity) {
    identity = {
        id: generateID(),
        sessionRef: generateSession()
    };

    localStorage.setItem(
        "avalonflow_identity",
        JSON.stringify(identity)
    );
}

    const idEl = document.getElementById("credentialsDisplay");
    const guideEl = document.getElementById("guidanceMessage");

    /* ---------- ROTATING MESSAGES (SAFE) ---------- */
    const messages = [
        "Keep your access credentials safe.",
        "Your session is unique per login.",
        "Do not share your AvalonFlow ID.",
        "Contact support with your session reference."
    ];

    let msgIndex = 0;

    function rotateMessages() {
        guideEl.style.opacity = 1;
        guideEl.textContent = messages[msgIndex];
        msgIndex = (msgIndex + 1) % messages.length;
    }

    rotateMessages();
    setInterval(rotateMessages, 4000);

    /* ---------- SAFE ID REVEAL (NO BREAK UI) ---------- */
    const idText = identity.id;

    idEl.classList.add("glitch");
    idEl.setAttribute("data-text", "🆔: " + idText);

    idEl.textContent = "🆔: ";

    let i = 0;

    function revealID() {
        if (i <= idText.length) {
            idEl.textContent = "🆔: " + idText.substring(0, i);
            i++;
            setTimeout(revealID, 70);
        } else {
            setTimeout(() => {
                idEl.classList.remove("glitch");
            }, 500);
        }
    }

    revealID();

    /* ---------- SAFE SCAN SOUND (NO DRIFT SYNC) ---------- */
    let scanSound;

    function createScanSound() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext();

        return function play() {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.type = "sine";
            osc.frequency.setValueAtTime(520, ctx.currentTime);

            gain.gain.setValueAtTime(0.0001, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.04, ctx.currentTime + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.start();
            osc.stop(ctx.currentTime + 0.18);
        };
    }

    document.addEventListener("click", () => {
        if (!scanSound) scanSound = createScanSound();
    }, { once: true });

    const SCAN_INTERVAL = 3800;

    document.addEventListener("click", () => {

        function loopScan() {
            if (scanSound) scanSound();
            setTimeout(loopScan, SCAN_INTERVAL);
        }

        setTimeout(loopScan, SCAN_INTERVAL);

    }, { once: true });

});
        /* ---------- Identity Generator ---------- */
        function generateID() {
            return "AF-" + Math.random().toString(36).substring(2, 6).toUpperCase()
                + "-" + Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        function generateSession() {
            return "AF-SESSION-" + Date.now().toString().slice(-6) + "-" +
                Math.random().toString(36).substring(2, 6).toUpperCase();
        }

function login() {

    const idInput = document.getElementById("AvalonFlowID").value.trim();
    const passInput = document.getElementById("password").value.trim();

    const identity = JSON.parse(localStorage.getItem("avalonflow_identity"));
    const section2Data = JSON.parse(localStorage.getItem("section2Data"));

    if (!identity || !identity.id || !identity.sessionRef) {
        document.getElementById("loginError").innerText =
            "System error. Identity missing.";
        return;
    }

    if (!section2Data || !section2Data.email || !section2Data.password) {
        document.getElementById("loginError").innerText =
            "No account found. Please sign up first.";
        return;
    }

    const isIDMatch = idInput === identity.id;
    const isEmailMatch = idInput === section2Data.email;
    const isPasswordMatch = passInput === section2Data.password;

    if ((isIDMatch || isEmailMatch) && isPasswordMatch) {
        window.location.href = `https://membership.avalonflow.site/dashboard?ticket=${identity.sessionRef}`;
    } else {
        document.getElementById("loginError").innerText =
            "Access details not recognized.";
    }
}
    
/* ---------- Device Detection (UX tuning only) ---------- */    
const DEVICE = (() => {    
  const ua = navigator.userAgent || "";    
  return {    
    isAndroid: /Android/i.test(ua),    
    isiOS: /iPhone|iPad|iPod/i.test(ua),    
    isDesktop: !/Android|iPhone|iPad|iPod/i.test(ua)    
  };    
})();    

/* ---------- Biometric Limits ---------- */    
const BIOMETRIC_COOLDOWN = 60_000; // 1 minute    
const BIOMETRIC_MAX_TRIES = 3;    
const BIOMETRIC_TIMEOUT = DEVICE.isiOS ? 45_000 : 60_000; // 🔧 faster on iOS    

function biometricLocked() {    
  const lastFail = Number(localStorage.getItem("bio_last_fail") || 0);    
  return Date.now() - lastFail < BIOMETRIC_COOLDOWN;    
}    

function recordBiometricFail() {    
  const tries = Number(localStorage.getItem("bio_tries") || 0) + 1;    
  localStorage.setItem("bio_tries", tries);    
  localStorage.setItem("bio_last_fail", Date.now());    
}    

function resetBiometricFails() {    
  localStorage.removeItem("bio_tries");    
  localStorage.removeItem("bio_last_fail");    
}    

/* ---------- Biometric Login Improved ---------- */    
async function biometricLogin() {

  const identity = JSON.parse(localStorage.getItem("avalonflow_identity"));

  if (!identity) {
    return fallbackLogin("No account found.");
  }

  if (!window.PublicKeyCredential) {
    return fallbackLogin("Device security not supported.");
  }

  if (biometricLocked()) {
    return fallbackLogin("Too many attempts. Use fallback.");
  }

  try {

    if (localStorage.getItem("avalonflow_biometric_enabled") !== "true") {

      const credential = await navigator.credentials.create({
        publicKey: {
          challenge: crypto.getRandomValues(new Uint8Array(32)),
          rp: { name: "AvalonFlow", id: location.hostname },
          user: {
            id: crypto.getRandomValues(new Uint8Array(16)),
            name: "avalonflow-user",
            displayName: "AvalonFlow User"
          },
          pubKeyCredParams: [{ type: "public-key", alg: -7 }],
          authenticatorSelection: {
            authenticatorAttachment: "platform",
            userVerification: "required",
            residentKey: "required"
          },
          timeout: BIOMETRIC_TIMEOUT
        }
      });

      if (credential) {
        localStorage.setItem("avalonflow_biometric_enabled", "true");
      } else {
        return fallbackLogin("Device registration failed.");
      }
    }

    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge: crypto.getRandomValues(new Uint8Array(32)),
        userVerification: "required",
        timeout: BIOMETRIC_TIMEOUT
      }
    });

    if (!assertion) {
      return fallbackLogin("Authentication failed.");
    }

    resetBiometricFails();

    window.location.href = `https://membership.avalonflow.site/dashboard?ticket=${identity.sessionRef}`;

  } catch (err) {

    recordBiometricFail();

    if (Number(localStorage.getItem("bio_tries")) >= BIOMETRIC_MAX_TRIES) {
      fallbackLogin("Biometric locked. Use fallback.");
    } else {
      fallbackLogin("Authentication cancelled or failed.");
    }
  }
}    

/* ---------- Fallback ---------- */  
function fallbackLogin(message) {  
  if (message) alert(message);  
  document.body.classList.add("show-fallback");  
}  

/* ---------- Set Button Text Dynamically ---------- */  
window.addEventListener("DOMContentLoaded", () => {  
  const btn = document.querySelector('[onclick="biometricLogin()"]');  
  if (btn) {  
    btn.innerText = DEVICE.isiOS ? "Login with Face/Touch ID" : "Login with Fingerprint";  
  }  
});  

// Remove the listener that fires immediately
window.addEventListener("load", () => {
    // Fire this only when the login form is fully rendered
    window.parent.postMessage({
        type: "UPDATE_TITLE",
        title: "Profile Login" 
    }, "*");
window.parent.postMessage({ type: "UPDATE_URL", path: "/signin" }, "*");
});
</script>
