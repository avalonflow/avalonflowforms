<style>
  body {
    font-family: Georgia, serif;
    background: #0d0d0d;
    color: #fff;
    margin: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    position: relative;
  }

            /* ---------- Floating Background ---------- */
#floating-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;

    /* Soft white/blue futuristic background */
    background: radial-gradient(circle at bottom, #cfe8ff, #ffffff);

    overflow: hidden;
}

.particle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.6;

    animation: floatParticles linear infinite;

    /* Soft futuristic glow */
    background: rgba(120, 180, 255, 0.7);
    box-shadow: 0 0 10px #8ec5ff, 0 0 20px #b7dcff;
}

@keyframes floatParticles {
    0% {
        transform: translateY(100vh) scale(0.3);
        opacity: 0;
    }

    50% {
        opacity: 1;
    }

    100% {
        transform: translateY(-10vh) scale(1);
        opacity: 0;
    }
}
  

        /* ---------- Notification Bar ---------- */
        .notification-bar {
            position: fixed;
            top: -80px;
            right: 20px;
            background: rgba(30, 144, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(30,144,255,0.4);
            color: #fff;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
font-weight: bold;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            transition: top 0.5s ease, opacity 0.5s ease;
            z-index: 9999;
            opacity: 0;
            max-width: 350px;
            white-space: normal;
            overflow: hidden;
        }
        .notification-bar.show {
            top: 20px;
            opacity: 1;
        }
        .notification-bar::before {
            content: '';
            position: absolute;
            left: -50%;
            top: 0;
            width: 50%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            transform: skewX(-25deg);
            animation: liquidWave 2s linear infinite;
        }
        @keyframes liquidWave {
            0% { left: -50%; }
            100% { left: 100%; }
        }

  .glass-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(12px);
    border-radius: 18px;
    padding: 40px 30px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    z-index: 2;
    max-width: 500px;

    /* MODIFIED BACKGROUND: Combined your signature purple theme tint with a frosted glass baseline */
    background: linear-gradient(135deg, rgba(107, 44, 216, 0.15), rgba(255, 255, 255, 0.05));
    backdrop-filter: blur(10px); /* Gives it that premium frosted look behind the image */
    -webkit-backdrop-filter: blur(10px);

    /* 1. CRISP 3D BEVELLED BORDER */
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    border-right: 1px solid rgba(255, 255, 255, 0.25);

    /* 2. MULTI-LAYERED 3D DEPTH SHADOWS */
    box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.35),
        0 8px 16px rgba(0, 0, 0, 0.2),
        inset 0 2px 4px rgba(255, 255, 255, 0.5),
        inset 0 0 30px rgba(255, 255, 255, 0.1);

    /* 3. OPTIONAL: Subtle tilted perspective to reinforce the 3D space */
    transform: perspective(1000px) translateZ(0);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* FIX: Maintained perspective continuity during hover state transitions */
.step:hover {
    transform: perspective(1000px) translateY(-10px) translateZ(20px);
    box-shadow:
        0 30px 50px rgba(0, 0, 0, 0.45), /* Expands outer shadow as it floats higher */
        0 12px 24px rgba(0, 0, 0, 0.25),
        inset 0 2px 4px rgba(255, 255, 255, 0.6),
        inset 0 0 30px rgba(255, 255, 255, 0.15);
}


  .glass-card h1 {
    font-size: 28px; /* Adjust slightly based on your layout scale */
    line-height: 1.3;
    font-weight: bold;
    margin-bottom: 24px;
    background: linear-gradient(90deg, #6b2cd8, #b393ff, #6b2cd8);
    background-size: 200% auto;
    animation: gradientShift 6s linear infinite;
    
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    
    text-align: center;
}

  

  .glass-card a {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 24px;
    border-radius: 12px;
    background: rgba(107,44,216,0.6);
    color: #fff;
    font-weight: bold;
    text-decoration: none;
    cursor: pointer;
  }


    /* ================= Header Logo Card Neon ================= */
header .logo-card {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 90%;
  max-width: 300px;
  height: 180px;
  border-radius: 24px;
z-index: 3;
margin-top: -180px !important;
  /* Purple glass */
  background: rgba(107,44,216,0.2);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(107,44,216,0.4);

  /* Outer neon glow */
  box-shadow: 
    0 0 10px rgba(107,44,216,0.5),
    0 0 20px rgba(107,44,216,0.4),
    0 0 40px rgba(107,44,216,0.3),
    0 0 80px rgba(107,44,216,0.2);
  position: relative;
  margin: 0 auto;

  /* Smooth pulsing */
  animation: neonGlow 2.5s ease-in-out infinite alternate;
  transition: box-shadow 0.3s ease;
  overflow: hidden;
}

/* Inner border glow */
header .logo-card::before {
  content: '';
  position: absolute;
  inset: 2px; /* slightly smaller than card edges */
  border-radius: 22px;
  border: 2px solid rgba(107,44,216,0.6);
  box-shadow:
    0 0 10px rgba(107,44,216,0.8),
    0 0 20px rgba(107,44,216,0.6),
    0 0 30px rgba(107,44,216,0.4);
  pointer-events: none;
  z-index: 1;
  animation: innerGlow 2.5s ease-in-out infinite alternate;
}

/* Animated halo behind logo */
header .logo-card::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120%;
  height: 120%;
  background: radial-gradient(circle, rgba(107,44,216,0.4) 0%, transparent 70%);
  transform: translate(-50%, -50%) scale(1);
  border-radius: 50%;
  z-index: 0; /* behind logo image */
  animation: haloPulse 2.5s ease-in-out infinite alternate;
  pointer-events: none;
}

/* Image inside card stays on top */
header .logo-card img {
  max-width: 90%;
  max-height: 90%;
  height: auto;
  z-index: 2;
  position: relative;
}

/* Outer glow pulse animation */
@keyframes neonGlow {
  0% {
    box-shadow: 
      0 0 15px rgba(107,44,216,0.4),
      0 0 30px rgba(107,44,216,0.3),
      0 0 50px rgba(107,44,216,0.2),
      0 0 100px rgba(107,44,216,0.15);
  }
  50% {
    box-shadow: 
      0 0 25px rgba(107,44,216,0.8),
      0 0 50px rgba(107,44,216,0.6),
      0 0 80px rgba(107,44,216,0.4),
      0 0 120px rgba(107,44,216,0.25);
  }
  100% {
    box-shadow: 
      0 0 15px rgba(107,44,216,0.4),
      0 0 30px rgba(107,44,216,0.3),
      0 0 50px rgba(107,44,216,0.2),
      0 0 100px rgba(107,44,216,0.15);
  }
}

/* Inner border glow pulse animation */
@keyframes innerGlow {
  0% {
    box-shadow:
      0 0 5px rgba(107,44,216,0.5),
      0 0 10px rgba(107,44,216,0.4),
      0 0 15px rgba(107,44,216,0.3);
  }
  50% {
    box-shadow:
      0 0 15px rgba(107,44,216,0.8),
      0 0 25px rgba(107,44,216,0.6),
      0 0 35px rgba(107,44,216,0.4);
  }
  100% {
    box-shadow:
      0 0 5px rgba(107,44,216,0.5),
      0 0 10px rgba(107,44,216,0.4),
      0 0 15px rgba(107,44,216,0.3);
  }
}

/* Halo pulse animation behind logo */
@keyframes haloPulse {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.5;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.15);
    opacity: 0.7;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.5;
  }
}


          footer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 18px 0;
    font-size: 14px;
    color: #555;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(12px);
    box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.08);
    z-index: 6;
}
</style>
</head>

<header style="text-align:center; padding:40px 0;">

<div class="glass-card">

                Your information is kept strictly confidential.
            </p>

</div>

<footer>

<script>
  // Floating Particles
  const bg = document.getElementById('floating-bg');
  const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
  function particle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*20+10;
    p.style.width = s+'px';
    p.style.height = s+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
    p.style.animationDuration = (Math.random()*20+10)+'s';
    bg.appendChild(p);
    setTimeout(()=>p.remove(),30000);
  }
  setInterval(particle,800);

        /* ---------- Notification ---------- */
        window.addEventListener("load", () => {
            const notification = document.getElementById("planNotification");
            notification.textContent = "Welcome! Let’s get started";
            setTimeout(() => notification.classList.add("show"), 300);
            setTimeout(() => notification.classList.remove("show"), 3300);
        });

function getFingerprint() {
  return btoa(
    navigator.userAgent +
    screen.width + screen.height +
    navigator.language
  );
}

// Any section except Section 4
if (localStorage.getItem('formSubmitted') === 'true') {
  window.location.href = 'https://membership.avalonflow.site/sign-in';
  }
</script>

</body>
