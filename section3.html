<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvalonFlow – Section 3</title>

      <!-- Favicon as .ico -->
<link rel="icon" href="/favicon.png" type="image/png" sizes="48x48">

        <!-- Structured Data for Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AvalonFlow",
      "url": "https://avalonflow.site",
      "logo": "https://avalonFlow.site/favicon.png"
    }
</script>

<style>
  /* ---------- Base ---------- */
  body { font-family: Georgia, serif; margin:0; background:#0d0d0d; color:#fff; overflow-x:hidden; }
  button { cursor:pointer; }
  a { color:inherit; text-decoration:none; }

  /* Floating Background */
  #floating-bg { position:fixed; inset:0; z-index:0; pointer-events:none; background:radial-gradient(circle at bottom, #1a0d3a,#0d0d0d); overflow:hidden; }
  .particle { position:absolute; border-radius:50%; opacity:0.6; animation:floatParticles linear infinite; box-shadow:0 0 10px #6b2cd8,0 0 20px #6b2cd8; }
  @keyframes floatParticles { 0%{transform:translateY(100vh) scale(0.3);opacity:0;} 50%{opacity:1;} 100%{transform:translateY(-10vh) scale(1);opacity:0;} }

  /* Glass cards */
  /* Glass card base */
.glass-card {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 28px;
  margin-bottom: 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

/* Top trust line & bottom note */
.top-trust, .bottom-note {
  text-align: center;
  display: block;
  z-index: 3; /* above all cards and pseudo-elements */
}

.bottom-note {
  margin-top: 28px; /* spacing below last card */
  font-style: italic;
  color: #b5b5b5;
  font-size: 14px;
}
  

/* Payment method card */
.payment-method {
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.08);
  border-radius: 16px;
  padding: 18px;
  margin-top: 18px;
  border: 1px solid rgba(255,255,255,0.18);
  transition: 0.3s ease, transform 0.2s ease;
  cursor: pointer;
  backdrop-filter: blur(8px);
  display: block;
  z-index: 2; /* ensure above the glass wrapper background */
}

.payment-method:first-of-type {
  margin-top: 12px; /* reduce top spacing from top trust line */
}

.payment-method:hover{
  background: rgba(255,255,255,0.15);
  transform: translateY(-2px);
}

.payment-method.active{
  border: 1px solid #6b2cd8;
  box-shadow: 0 0 18px rgba(107,44,216,0.5);
}

/* Glow behind card */
.payment-method::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at center, rgba(107,44,216,0.2), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
  z-index: 0;
}

.payment-method:hover::before,
.payment-method.active::before {
  opacity: 1;
  transform: scale(1.1);
}

/* Shimmer on active card */
.payment-method.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: -75%;
  width: 50%;
  height: 100%;
  background: linear-gradient(
    120deg,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.15) 50%,
    rgba(255,255,255,0) 100%
  );
  transform: skewX(-20deg);
  animation: shimmer 1.5s infinite;
  pointer-events: none;
  z-index: 2;
}

@keyframes shimmer {
  0% { left: -75%; }
  50% { left: 125%; }
  100% { left: 125%; }
}

/* Payment header + logo */
.payment-header{
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: bold;
  font-size: 16px;
  position: relative;
  z-index: 1;
}

.token-logos{
display:flex;
align-items:center;
gap:6px;
}

.payment-logo{
  width: 40px;
  height: 40px;
  object-fit: contain;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.4));
}

.payment-container{
max-width:600px;
margin:0 auto;
}

/* Input styling */
.payment-method input{
  width: 100%;
  padding: 14px 16px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
display:none;
/* FIX */
  box-sizing: border-box;
}

.network-note{
font-size:12px;
color:#bdbdbd;
margin-top:6px;
font-style:italic;
opacity:0.9;
}

  .payment-method input::placeholder{
  color: #ccc;
  font-style: italic;
}

.payment-container.warning {
  animation: warning-glow 0.8s ease-in-out 2; /* glow twice */
  border: 2px solid #ff4d4d; /* red border */
  border-radius: 20px;
}

@keyframes warning-glow {
  0% { box-shadow: 0 0 0 rgba(255,77,77,0.7); }
  50% { box-shadow: 0 0 12px rgba(255,77,77,0.9); }
  100% { box-shadow: 0 0 0 rgba(255,77,77,0.7); }
}

  footer { position:fixed; bottom:0; left:0; width:100%; text-align:center; padding:18px 0; font-size:14px; color:#aaa; background:rgba(15,15,25,0.95); backdrop-filter:blur(12px); box-shadow:0 -5px 20px rgba(0,0,0,0.4); z-index:6; }
</style>
</head>
<body>
  <!-- Floating Background -->
  <div id="floating-bg"></div>

<header style="text-align: center; padding: 40px 0;">
  <div style="
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 350px;                /* slightly bigger frame */
      height: 180px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.12);  /* a little more visible */
      backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.3); /* stronger border */
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);  /* deeper shadow */
      margin: 0 auto;
    ">
    <img src="assets/pictures/imagitool-export (26).jpg" 
         alt="AvalonFlow Logo" 
         style="max-width: 90%; max-height: 90%; height: auto;">
  </div>
</header>

<section id="section3">
  <div class="payment-container">

    <!-- Single glass wrapper for everything -->
    <div class="glass-card">

      <!-- Top trust line -->
      <div class="top-trust">
        Secure payout systems supported by global payment networks
      </div>

      <!-- USDT / USDC -->
      <div class="payment-method" data-method="USDT / USDC ERC20">
        <div class="token-logos">
          <img class="payment-logo" src="https://assets.coingecko.com/coins/images/325/large/Tether.png">
          <img class="payment-logo" src="https://assets.coingecko.com/coins/images/6319/large/USD_Coin_icon.png">
          <span>USDT / USDC (ERC-20)</span>
        </div>
        <input id="acuAccount" placeholder="Enter your ERC-20 wallet address">
        <div class="network-note">⚠ ERC-20 network only</div>
      </div>

      <!-- PayPal -->
      <div class="payment-method" data-method="PayPal">
        <div class="payment-header">
          <img class="payment-logo" src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg">
          <span>PayPal</span>
        </div>
        <input id="paypalInput" placeholder="Enter your PayPal email">
      </div>

      <!-- Cash App -->
      <div class="payment-method" data-method="Cash App">
        <div class="payment-header">
          <img class="payment-logo" src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Cash_App_logo.svg">
          <span>Cash App</span>
        </div>
        <input id="cashInput" placeholder="Enter your $Cashtag">
      </div>

      <!-- Venmo -->
      <div class="payment-method" data-method="Venmo">
        <div class="payment-header">
          <img class="payment-logo" src="https://upload.wikimedia.org/wikipedia/commons/3/39/Venmo_logo.png">
          <span>Venmo</span>
        </div>
        <input id="venmoInput" placeholder="Enter your Venmo username">
      </div>

      <!-- Bottom reassurance -->
      <div class="bottom-note">
        Your payout destination can be updated later inside your AvalonFlow dashboard.
      </div>

    </div> <!-- closes single glass-card wrapper -->

  </div> <!-- closes payment-container -->
</section>

    <!-- Navigation Buttons -->
<div id="navButtons" style="max-width:600px;margin:40px auto 100px; display:flex;justify-content:space-between; position:relative; z-index:5;">
    <button id="prevBtn" style="background: rgba(107,44,216,0.9); border:1px solid #fff; padding:12px 24px; border-radius:12px; font-weight:bold; color:#fff;">Previous</button>
    <button id="nextBtn" style="background: rgba(107,44,216,0.9); border:1px solid #fff; padding:12px 24px; border-radius:12px; font-weight:bold; color:#fff;">Next</button>
</div>

<footer>© 2026 AvalonFlow • Powered by Centrical™</footer>

<script>
window.addEventListener("DOMContentLoaded", () => {

  // Floating particles
  const bg = document.getElementById('floating-bg');
  const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
  function particle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*20+10;
    p.style.width = s+'px';
    p.style.height = s+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
    p.style.animationDuration = (Math.random()*20+10)+'s';
    bg.appendChild(p);
    setTimeout(()=>p.remove(),30000);
  }
  setInterval(particle,800);

  const methods = document.querySelectorAll(".payment-method");
const inputs = document.querySelectorAll(".payment-method input");

let preference = "";

/* --------------------------
LOAD SAVED DATA
-------------------------- */

const saved = JSON.parse(localStorage.getItem("section3Data") || "{}");

if(saved.preference){

methods.forEach(method=>{

if(method.dataset.method === saved.preference){

method.classList.add("active");

const input = method.querySelector("input");
if(input) input.style.display = "block";

preference = saved.preference;

}

});

}

if(saved.acuAccount) document.getElementById("acuAccount").value = saved.acuAccount;
if(saved.paypal) document.getElementById("paypalInput").value = saved.paypal;
if(saved.cashapp) document.getElementById("cashInput").value = saved.cashapp;
if(saved.venmo) document.getElementById("venmoInput").value = saved.venmo;


/* --------------------------
CARD SELECTION
-------------------------- */

methods.forEach(method => {

const input = method.querySelector("input");

method.onclick = () => {

methods.forEach(m=>{
m.classList.remove("active");
m.querySelector("input").style.display = "none";
});

method.classList.add("active");
input.style.display = "block";

preference = method.dataset.method;

saveData();

};

});


/* --------------------------
AUTO SAVE INPUT
-------------------------- */

inputs.forEach(input=>{

input.addEventListener("input", saveData);

});


function saveData(){

const data = {
preference,
acuAccount: document.getElementById("acuAccount")?.value.trim(),
paypal: document.getElementById("paypalInput")?.value.trim(),
cashapp: document.getElementById("cashInput")?.value.trim(),
venmo: document.getElementById("venmoInput")?.value.trim()
};

localStorage.setItem("section3Data", JSON.stringify(data));

}

  // Navigation
  document.getElementById("nextBtn").onclick = () => {
  const container = document.querySelector(".payment-container");

  if (!preference) {
    container.scrollIntoView({ behavior: "smooth", block: "center" });
    container.classList.add("warning");
    setTimeout(() => container.classList.remove("warning"), 1600);
    return; // stop navigation
  }

  let inputId = "";
  switch (preference) {
    case "USDT / USDC ERC20": inputId = "acuAccount"; break;
    case "PayPal": inputId = "paypalInput"; break;
    case "Cash App": inputId = "cashInput"; break;
    case "Venmo": inputId = "venmoInput"; break;
  }

  const input = document.getElementById(inputId);

  if (!input || input.value.trim() === "") {
    container.scrollIntoView({ behavior: "smooth", block: "center" });
    container.classList.add("warning");
    setTimeout(() => container.classList.remove("warning"), 1600);
    return; // stop navigation
  }

  saveData();
  window.location.href = "https://link.avalonflow.site/section4";
};

});

function getFingerprint() {
  return btoa(
    navigator.userAgent +
    screen.width + screen.height +
    navigator.language
  );
}

// Any section except Section 4
if (localStorage.getItem('formSubmitted') === 'true') {
  window.location.href = 'after-submission';
    }
</script>

</body>
</html>
