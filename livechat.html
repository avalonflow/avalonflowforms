}

/* Messages */
.message {
  animation: fadeSlideIn 0.25s ease forwards;
  opacity: 0;
  font-size: 13px;
  padding: 6px 10px;
  display: inline-block;
  max-width: 85%;
}

.bot {
  text-align: left;
  color: #c7c7ff;
  background: rgba(107,44,216,0.12);
  border-radius: 10px 10px 10px 4px;
}

.user {
  text-align: right;
  color: #fff;
  background: rgba(155,89,182,0.3);
  border-radius: 10px 10px 4px 10px;
}

/* Wrap */
.msgWrap {
  display: flex;
  flex-direction: column;
  margin-bottom: 6px;
}

/* Animation */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Typing dots */
.typing {
  display: inline-flex;
  gap: 4px;
  background: rgba(107,44,216,0.12);
  padding: 6px 10px;
  border-radius: 10px 10px 10px 4px;
}

.typing span {
  width: 6px;
  height: 6px;
  background: #c7c7ff;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* Meta (time + ticks) */
.meta {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.timestamp {
  font-size: 10px;
  opacity: 0.5;
  color: #aaa;
}

/* Double ticks */
.tick {
  font-size: 11px;
  letter-spacing: -2px;
}

.tick.delivered::after {
  content: "✓✓";
  color: #bbb;
}

.tick.seen::after {
  content: "✓✓";
  color: #6c8cff;
}

/* Ambient */
.ambient {
  text-align: center;
  color: #aaa;
  font-size: 12px;
  opacity: 0.8;
}

/* Input */
#botInput {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  margin-right: 4px;
  outline: none;

/* Button */

  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
}

// ---------- NLP ----------
function normalize(text){
    return text.toLowerCase().replace(/[^\w\s]/g,'');
}

function similarity(a, b){
    const aWords = normalize(a).split(' ');
    const bWords = normalize(b).split(' ');

    const important = ['password','ticket','support','billing','plan','rewards'];

    let score = 0;

    aWords.forEach(w=>{
        if(bWords.includes(w)){
            score += important.includes(w) ? 2 : 1;
        }
    });

    return score / bWords.length;
}

function findFAQByIntent(input){
    const text = input.toLowerCase();

    let best = null;
    let bestScore = 0;

    for(const f of faqs){
        let score = 0;

        f.tags.forEach(tag=>{
            if(text.includes(tag)) score += 2;
            else if(tag.split(" ").some(word => text.includes(word))) score += 1;
        });

        if(score > bestScore){
            bestScore = score;
            best = f;
        }
    }

    return bestScore > 1 ? best : (typeof findBestFAQ === "function" ? findBestFAQ(input) : null);
}

    if(sender==="user"){

        const time=document.createElement("span");
        time.className="timestamp";
        time.textContent=getTime();

        const tick=document.createElement("span");
        tick.className=`tick ${status}`;

        meta.appendChild(time);
        meta.appendChild(tick);
        wrap.appendChild(meta);
    }

    botMessagesContainer.appendChild(wrap);
    botMessagesContainer.scrollTop=botMessagesContainer.scrollHeight;

    return wrap;
}

function markAsSeen(wrap){
    if (!wrap) return;
    const tick=wrap.querySelector(".tick");
    if(tick){
        tick.classList.remove("delivered");
        tick.classList.add("seen");
    }
}

// ---------- INTENT ENGINE ----------
function detectIntent(msg){
    const text = msg.toLowerCase();

    if(/light mode|too dark|cant see|increase brightness/.test(text))
        return {type:'theme', value:'light'};

    if(/dark mode|too bright|hurt.*eyes|reduce brightness/.test(text))
        return {type:'theme', value:'dark'};

    if(/help|issue|problem|not working/.test(text))
        return {type:'support'};

    if(/ticket|complaint|report issue/.test(text))
        return {type:'ticket'};

    if(/logout|sign out|log me out|exit/.test(text))
        return {type:'logout'};

    if(/quote|motivate|inspire/.test(text))
        return {type:'quote'};

    return {type:'chat'};
}

function generateFollowUp(msg){

    const text = msg.toLowerCase();

    if(text.length < 5){
        return "Can you tell me a bit more about what you need?";
    }

    if(/help|issue|problem|error|not working/.test(text)){
        return "Got you. Is this about a payment, account access, or something else?";
    }

    if(text.includes("?")){
        return "Are you asking about support, rewards, or your account?";
    }

    if(/money|earn|profit/.test(text)){
        return "Do you want to check your reward progress or understand how it works?";
    }

    if(/how|where|what/.test(text)){
        return "I can guide you step-by-step—what exactly are you trying to do?";
    }

    return "What would you like help with—support, tickets, rewards, or settings?";
}

function humanize(text){

    "",
    "Alright… ",
    "Okay, so ",
    "Got it. ",
    "Hmm, ",
    "Let me see… ",
    "Right, ",
    "Makes sense. "
];

    let prefix = fillers[Math.floor(Math.random()*fillers.length)];

    if(personality.tone === "calm"){
        prefix = "I get how that can be frustrating. ";
    }

    if(personality.tone === "friendly"){
        return prefix + text + " 👍";
    }

    return prefix + text;
}

    setTimeout(()=>{

        if(conversationMemory.length > 10){
            conversationMemory.shift();
        }

    }, delay);
}

async function sendMessage(){

    if(!text) return;

    removeUserTyping();

    const userMsg = addMessage(text,"user","delivered");
    botInput.value="";

    setTimeout(()=>markAsSeen(userMsg),800);

    conversationMemory.push({ role: "user", content: text, time: Date.now() });
    chatHistory.push({ sender: 'user', text: text });
    localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

// keep memory small (important)
if(conversationMemory.length > 10){
    conversationMemory.shift();
}

    handleMessage(text);

    try {

            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: CHAT_ID, text: text })

    } catch (e) {

    }
}

});


// ---------- Record Chat ----------
function recordChatMessage(){
    let chats=parseInt(localStorage.getItem("messagesSent")||0);
    chats++;
    localStorage.setItem("messagesSent",chats);
    if(typeof updateEngagementUI === "function") updateEngagementUI();
}


// ---------- Auto Suggestions ----------
const autoSuggest=[
    {keywords:['ticket','issue'], suggestion:"You can say 'generate ticket'."},
    {keywords:['faq'], suggestion:"Ask your question directly."},
    {keywords:['quote'], suggestion:"Type 'quote' for motivation."}
];

botInput.addEventListener('input', e=>{
    const msg=e.target.value.toLowerCase();
    const found=autoSuggest.find(s=>s.keywords.some(k=>msg.includes(k)));
    if(found && typeof notify === "function") notify(`💡 ${found.suggestion}`);
});

// ---------- Inbound Channel Processing Loop ----------
async function listenForTelegramMessages() {
    if (sessionStorage.getItem('active_chat_tab') !== currentTabId) {
        if (statusText) statusText.textContent = "Paused (Active in another tab)";
        scheduleNextCheck();
        return;
    }

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=20`;

    try {
        const response = await fetch(url);

        if (response.status === 429) {
            if (statusText) statusText.textContent = "Throttled. Adjusting frequency...";
            currentDelay = Math.min(currentDelay * 2, maxDelay); 
            scheduleNextCheck();
            return;
        }

        if (!response.ok) throw new Error('Dropped sync');

        const data = await response.json();

        if (data.ok) {
            currentDelay = baseDelay;
            if (statusText && !isSarahActive) statusText.textContent = "Synchronization active";

            if (data.result.length > 0) {
                showTyping();

                setTimeout(() => {
                    removeTyping();

                    data.result.forEach(update => {
                        if (update.message && update.message.text) {
                            const incomingText = update.message.text;

                            addMessage(incomingText, 'bot');

                            conversationMemory.push({ role: "bot", content: incomingText, time: Date.now() });
                            chatHistory.push({ sender: 'bot', text: incomingText });
                            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

                            lastUpdateId = update.update_id;
                            localStorage.setItem('tg_last_update_id', lastUpdateId);
                        }
                    });
                }, 1200); 
            }
        }
    } catch (error) {
        if (statusText && !isSarahActive) statusText.textContent = "Reconnecting feed...";
        currentDelay = Math.min(currentDelay * 1.5, maxDelay); 
    }

    scheduleNextCheck();
}

function scheduleNextCheck() {
    clearTimeout(pollingTimer);
    pollingTimer = setTimeout(listenForTelegramMessages, currentDelay);
}

// ---------- System-wide Quote Autorotation Loop ----------
function startQuoteAutorotation() {
    clearInterval(quoteRotationTimer);
    quoteRotationTimer = setInterval(() => {
        if (sessionStorage.getItem('active_chat_tab') === currentTabId && !isSarahActive) {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            botReply(randomQuote);
        }
    }, 60000); 
}

// ---------- Initialization Operational Rules ----------
function initiateKairosConversation() {
    if (chatHistory.length === 0) {
        showTyping();
        setTimeout(() => {
            removeTyping();
            const initialGreeting = "Hey 👋 I’m Kairos. Welcome back! Do you want me to connect you with Sarah regarding any issues you might have?";

            addMessage(initialGreeting, "bot");

            conversationMemory.push({ role: "bot", content: initialGreeting, time: Date.now() });
            chatHistory.push({ sender: 'bot', text: initialGreeting });
            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

            startQuoteAutorotation();
        }, 1500);
    } else {
        const clearSarahActive = chatHistory.some(m => m.text && m.text.includes("this is Sarah"));
        if (clearSarahActive) {
            isSarahActive = true; 
            const botHeader = document.getElementById('botHeader');
            if (botHeader) {
                botHeader.style.background = sarahProfile.avatarColor;
                botHeader.textContent = sarahProfile.name;
            }
            if (statusText) statusText.textContent = sarahProfile.statusText;
        } else {
            startQuoteAutorotation();
        }
    }
}

function loadChatHistory() {
    if (chatHistory.length > 0) {
        chatHistory.forEach(item => {
            const wrap = document.createElement("div");
            wrap.className = "msgWrap";
            const msg = document.createElement("div");
            msg.className = `${item.sender} message`;
            msg.textContent = item.text;
            wrap.appendChild(msg);

            if (item.sender === 'user') {
                const meta = document.createElement("div");
                meta.className = "meta";
                meta.innerHTML = `<span class="timestamp">${getTime()}</span><span class="tick seen"></span>`;
                wrap.appendChild(meta);
            }
            botMessagesContainer.appendChild(wrap);
        });
        botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadChatHistory();
    initiateKairosConversation();
    listenForTelegramMessages();
});


</script>
