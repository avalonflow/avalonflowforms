    <script>
    (function() {
        const SecurityEngine = {

            validateExecutionEnvironment: function() {
                const authorizedDomain = "avalonflow.site";
                const currentHost = window.location.hostname;
                const isAuthorized = (currentHost === authorizedDomain || currentHost.endsWith('.' + authorizedDomain));
                
                if (!isAuthorized) {
                    this.triggerSelfDestruct();
                    return false;
                }
                return true;
            },

            get404Template: function() {
                return `
                    <div class="error-container">
                        <div class="error-code-wrapper">
                            <span>4</span>
                            <div class="logo-container">
                                <img src="assets/pictures/1780995787737.jpeg" alt="Logo" class="logo-img">
                            </div>
                            <span>4</span>
                        </div>
                        <h2>Didn’t find anything here!</h2>
                    </div>
                `;
            },

            triggerSelfDestruct: function() {
                localStorage.clear();
                sessionStorage.clear();
                document.body.innerHTML = this.get404Template();
                document.body.classList.add('render-ready');
                try { window.open('', '_self').close(); } catch (e) {}
                this.activateInspectorTrap();
                this.activateEnvironmentSabotage();
            },

            activateResetListener: function() {
                window.addEventListener('message', (event) => {
                    if (event.origin !== window.location.origin) return;
                    if (event.data && event.data.type === 'COMMAND_SYSTEM_RESET') {
                        localStorage.setItem('_sys_reset_token', event.data.resetId);
                        localStorage.setItem('_sys_reset_expiry', event.data.expiresAt);
                        const currentUrl = new URL(window.location.href);
                        currentUrl.searchParams.set('auth_reset', event.data.resetId);
                        window.location.href = currentUrl.toString();
                    }
                });
            },

            establish7DayClearance: function() {
                const expiry = Date.now() + (7 * 24 * 60 * 60 * 1000);
                localStorage.setItem('_sys_persistence_anchor', expiry.toString());
            },

            isPersistenceWindowActive: function() {
                const savedAnchor = localStorage.getItem('_sys_persistence_anchor');
                return savedAnchor && Date.now() < parseInt(savedAnchor, 10);
            },

            checkResetValidation: function() {
                const urlParams = new URLSearchParams(window.location.search);
                const urlToken = urlParams.get('auth_reset');
                const incomingOTK = urlParams.get('otk');

                if (urlToken) {
                    if (urlToken === localStorage.getItem('_sys_reset_token') &&
                        Date.now() < parseInt(localStorage.getItem('_sys_reset_expiry') || 0, 10)) {
                        this.establish7DayClearance();
                        this.executeSystemRevival();
                        return true; 
                    }
                    this.triggerSelfDestruct();
                    return false;
                }

                if (incomingOTK) {
                    try {
                        const [entropy, expirationTimestamp] = atob(incomingOTK).split('.');
                        if (Date.now() > parseInt(expirationTimestamp, 10) ||
                            localStorage.getItem('active_session_otk') !== incomingOTK) {
                            this.triggerSelfDestruct();
                            return false;
                        }
                        localStorage.removeItem('active_session_otk');
                        this.establish7DayClearance();
                        this.executeSystemRevival();
                        return true;
                    } catch (e) {
                        this.triggerSelfDestruct();
                        return false;
                    }
                }
                return false;
            },

            executeSystemRevival: function() {
                localStorage.removeItem('_sys_reset_token');
                localStorage.removeItem('_sys_reset_expiry');
                const user = new URLSearchParams(window.location.search).get('user');
                const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + (user ? `?user=${encodeURIComponent(user)}` : '');
                window.history.replaceState({ path: cleanUrl }, '', cleanUrl);
                window.location.reload();
            },

            getHardwareID: function() {
                const components = [navigator.userAgent, navigator.platform, screen.width, screen.height].join('|');
                let hash = 0;
                for (let i = 0; i < components.length; i++)
                    hash = ((hash << 5) - hash) + components.charCodeAt(i);
                return '1' + (hash | 0).toString(16); 
            },

            detectAgencyProfile: function() {
                return navigator.userAgent.includes("Corporate-Gateway") ? 'GOVERNMENT' : 'PRIVATE';
            },

            activateInspectorTrap: function() {
                setInterval(() => { debugger; }, 50);
            },

            activateEnvironmentSabotage: function() {
                console.log = console.warn = console.error = console.info = () => {};
                setInterval(() => {
                    const paths = ['4|1|3|0|2'.split('|')];
                    let pointer = 0;
                    while (true) {
                        switch (['4','1','3','0','2'][pointer++]) {
                            case '0':
                                try {
                                    (function stackTrap(i) {
                                        if (("" + i/i)["length"] !== 1 || i % 20 === 0)
                                            (function(){}).constructor("debugger")();
                                        else stackTrap(++i);
                                    })(0);
                                } catch(e) {}
                                continue;

                            case '1':
                                if (Math.random() > 0.5)
                                    window.status = 'VALIDATING';
                                continue;

                            case '2':
                                return;

                            case '3':
                                if (window.outerHeight - window.innerHeight > 160 ||
                                    window.outerWidth - window.innerWidth > 160)
                                    this.triggerSelfDestruct();
                                continue;

                            case '4':
                                (Date.now() % 1000) * 0x5a1b;
                                continue;
                        }
                        break;
                    }
                }, 200); 
            },

            // ✅ IFRAME REMOVED — NOW DIRECT INJECTION
            injectSecureApp: function(agencyType) {
                const payload = document.getElementById('hidden-application-payload');

                if (!payload || !payload.innerHTML.trim()) {
                    this.triggerSelfDestruct();
                    return;
                }

                window.AUTHORIZED_AGENCY = agencyType;

                document.body.innerHTML = payload.innerHTML;

                document.body.classList.add('render-ready');
            },

            run: function() {
                if (!this.validateExecutionEnvironment()) return;

                this.activateResetListener();

                if (this.checkResetValidation()) return;

                const id = this.getHardwareID();
                const type = this.detectAgencyProfile();

                if (
                    this.isPersistenceWindowActive() ||
                    ((id.startsWith('a') || id.startsWith('1')) &&
                    (type === 'GOVERNMENT' || type === 'PRIVATE'))
                ) {
                    this.activateInspectorTrap();
                    this.activateEnvironmentSabotage();

                    document.readyState === 'loading'
                        ? window.addEventListener('DOMContentLoaded', () => this.injectSecureApp(type))
                        : this.injectSecureApp(type);

                } else {
                    this.triggerSelfDestruct();
                }
            }
        };

        window.addEventListener("message", (e) => {
            if (e.data?.type === "UPDATE_TITLE")
                document.title = e.data.title;
        });

        document.readyState === 'loading'
            ? window.addEventListener('DOMContentLoaded', () => SecurityEngine.run())
            : SecurityEngine.run();
    })();
    </script>

function normalize(text){
    return text.toLowerCase().replace(/[^\w\s]/g,'');
}

function similarity(a, b){
    const aWords = normalize(a).split(' ');
    const bWords = normalize(b).split(' ');
    const important = ['password','ticket','support','billing','plan','rewards'];
    let score = 0;
    aWords.forEach(w=>{
        if(bWords.includes(w)){
            score += important.includes(w) ? 2 : 1;
        }
    });
    return score / bWords.length;
}

function findBestFAQ(input) {
    let best = null;
    let maxSim = 0;
    for (const f of faqs) {
        const simQ = similarity(input, f.q);
        if (simQ > maxSim) {
            maxSim = simQ;
            best = f;
        }
    }
    return maxSim > 0.25 ? best : null;
}

function findFAQByIntent(input){
    const text = input.toLowerCase();
    let best = null;
    let bestScore = 0;

    for(const f of faqs){
        let score = 0;
        f.tags.forEach(tag=>{
            if(text.includes(tag)) score += 2;
            else if(tag.split(" ").some(word => text.includes(word))) score += 1;
        });
        if(score > bestScore){
            bestScore = score;
            best = f;
        }
    }
    return bestScore > 1 ? best : findBestFAQ(input);
}

function addMessage(content, sender="bot", status="delivered", type="text", overrideSender = null){
    const wrap = document.createElement("div");
    wrap.className = `msgWrap ${sender}-wrap`; 

    const avatarImg = document.createElement("img");
    avatarImg.className = "chat-bubble-avatar";

    if (sender === "user") {
        const savedUserPhoto = localStorage.getItem('profilePhoto');
        avatarImg.src = savedUserPhoto ? savedUserPhoto : DEFAULT_AVATAR;
    } else {
        if (overrideSender === "sarah" || (isSarahActive && overrideSender !== "kairos")) {
            avatarImg.src = SARAH_AVATAR;
        } else {
            avatarImg.src = KAIROS_AVATAR;
        }
    }

    const msg = document.createElement("div");
    msg.className = `${sender} message`;

    if (type === "photo") {
        const img = document.createElement("img");
        img.src = content;
        img.style.maxWidth = "200px";
        img.style.borderRadius = "8px";
        img.style.display = "block";
        img.onerror = function() {
            this.style.display = 'none';
            const fallbackLink = document.createElement('a');
            fallbackLink.href = content;
            fallbackLink.target = '_blank';
            fallbackLink.style.color = '#00bcd4';
            fallbackLink.textContent = "📷 View Photo Attachment";
            msg.appendChild(fallbackLink);
        };
        msg.appendChild(img);
    } else if (type === "video") {
        const vid = document.createElement("video");
        vid.src = content;
        vid.controls = true;
        vid.style.maxWidth = "200px";
        vid.style.borderRadius = "8px";
        vid.style.display = "block";
        msg.appendChild(vid);
    } else if (type === "audio") { 
        const aud = document.createElement("audio");
        aud.src = content;
        aud.controls = true;
        aud.style.maxWidth = "100%";
        aud.style.borderRadius = "4px";
        aud.style.display = "block";
        msg.appendChild(aud);
    } else if (type === "document") { 
        const docBox = document.createElement("div");
        docBox.style.display = "flex";
        docBox.style.alignItems = "center";
        docBox.style.gap = "10px";
        docBox.style.padding = "6px 10px";
        docBox.style.background = "rgba(255,255,255,0.08)";
        docBox.style.borderRadius = "6px";

        const docIcon = document.createElement("span");
        docIcon.textContent = "📄";
        docIcon.style.fontSize = "22px";

        const docLink = document.createElement("a");
        docLink.href = content;
        docLink.target = "_blank";
        docLink.style.color = "#a29bfe";
        docLink.style.fontWeight = "600";
        docLink.style.textDecoration = "none";
        
        const isBase64 = content.startsWith("data:");
        docLink.setAttribute("download", isBase64 ? "AvalonFlow_Document" : content.split('/').pop());
        
        if (isBase64) {
            if (content.includes(".") && !content.includes(";base64")) {
                docLink.textContent = content.length > 25 ? content.substring(0, 22) + "..." : content;
            } else {
                docLink.textContent = "Download Document File";
            }
        } else {
            const fileNamePart = content.split('/').pop() || "View Attached Document";
            docLink.textContent = fileNamePart.length > 25 ? fileNamePart.substring(0, 22) + "..." : fileNamePart;
        }

        docBox.appendChild(docIcon);
        docBox.appendChild(docLink);
        msg.appendChild(docBox);
    } else {
        msg.textContent = content;
    }

    if (sender === "user") {
        wrap.appendChild(msg);
        wrap.appendChild(avatarImg);
    } else {
        wrap.appendChild(avatarImg);
        wrap.appendChild(msg);
    }

    if(sender === "user"){
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.style.marginRight = "46px"; 

        const time = document.createElement("span");
        time.className = "timestamp";
        time.textContent = getTime();

        const tick = document.createElement("span");
        tick.className = `tick ${status}`;

        meta.appendChild(time);
        meta.appendChild(tick);
        wrap.appendChild(meta);
    }

    botMessagesContainer.appendChild(wrap);
    botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;

    return wrap;
}

function markAsSeen(wrap){
    if (!wrap) return;
    const tick = wrap.querySelector(".tick");
    if(tick){
        tick.classList.remove("delivered");
        tick.classList.add("seen");
    }
}

// ---------- Typing Feedbacks ----------
function showTyping(){
    if (document.getElementById("typingIndicator")) return;
    const t = document.createElement("div");
    t.className = "typing";
    t.id = "typingIndicator";
    t.innerHTML = "<span></span><span></span><span></span>";
    botMessagesContainer.appendChild(t);
    botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
}

function removeTyping(){
    const t = document.getElementById("typingIndicator");
    if(t) t.remove();
}

function getTypingDelay(text){
    return Math.min(300 + text.length * 20, 2500); 
}

// ---------- ACTIVE INTERACTIVE UI NOTIFICATIONS & TYPING ----------
let typingTimeout;
let typingIndicatorEl = null;

if (botInput) {
    botInput.addEventListener("input", ()=>{

            typingIndicatorEl.className = "ambient";

// ---------- Intent Detection ----------
function detectIntent(msg){
    const text = msg.toLowerCase();
    if(/light mode|too dark|increase brightness/.test(text)) return {type:'theme', value:'light'};
    if(/dark mode|too bright|reduce brightness/.test(text)) return {type:'theme', value:'dark'};
    if(/support|live chat|representative|human|agent|help|issue/.test(text)) return {type:'support'};
    if(/ticket|complaint/.test(text)) return {type:'ticket'};
    if(/logout|sign out/.test(text)) return {type:'logout'};
    if(/quote|motivate/.test(text)) return {type:'quote'};
    return {type:'chat'};
}

// ---------- VAGUE RESPONSE MATRIX CRUNCHER ----------
function generateFollowUp(msg){
    const text = msg.toLowerCase();
    if(text.length < 5){
        return "Can you tell me a bit more about what you need?";
    }
    if(/help|issue|problem|error|not working/.test(text)){
        return "Got you. Is this about a payment, account access, or something else?";
    }
    if(text.includes("?")){
        return "Are you asking about support, rewards, or your account panel?";
    }
    if(/money|earn|profit|balance/.test(text)){
        return "Do you want to check your reward progress or understand how bonds settle?";
    }
    if(/how|where|what/.test(text)){
        return "I can guide you step-by-step—what exactly are you trying to setup?";
    }
    return "What would you like help with—support, rewards, or dashboard settings?";
}

// ---------- CORE SMART ENGINE UPDATED WITH LITE FEATURES ----------
function generateSmartReply(msg){
    const text = msg.toLowerCase();
    const isYes = /^(yes|yeah|sure|ok|please|retry)\b/.test(text);
    const isNo = /^(no|not really|nah|stop|end)\b/.test(text);
    const shortReply = msg.trim().split(" ").length <= 2;

    if (personality.awaitingTimeoutRetry) {
        if (isYes) {
            revertToKairos("Restarting connection protocol... Hold tight while I signal Sarah's desk again. ⚡");
            setTimeout(transitionToSarah, 1500);
            return null; 
        }
        if (isNo) {
            revertToKairos();
            return null;
        }
    }

    if (/support|live chat|representative|human|agent|help|issue/.test(text) || personality.lastIntent === "support") {
        if(/email/.test(text)){
            personality.lastIntent = null;
            return "Send your request to avalonflowsystem.helpdesk@gmail.com with your issue details.";
        }
        if(/live|chat|representative|agent|human/.test(text)){
            personality.lastIntent = null;
            setTimeout(transitionToSarah, 600);
            return "I see. Hold on for a while as I connect you with Sarah the Senior Case Officer from Nobu Hospitality LLC...";
        }
        personality.lastIntent = "support";
        return "Do you prefer to email support or live chat with Sarah?";
    }

    if (personality.awaitingSarahConfirm && isYes) {
        personality.awaitingSarahConfirm = false;
        setTimeout(transitionToSarah, 600);
        return "Understood. One moment while I connect you with Sarah the Senior Case Officer from Nobu Hospitality LLC...";
    }
    if (personality.awaitingSarahConfirm && isNo) {
        personality.awaitingSarahConfirm = false;
        return "Alright, let me know what you need help with instead.";
    }

    if(/reward balance|progress|earnings balance|cashback/.test(text)){
        let unlocked = JSON.parse(localStorage.getItem('unlockedPlans')) || {};
        let unlockTimes = JSON.parse(localStorage.getItem('unlockTimes')) || {};
        let res = "Bond progress:\n";

        ['premium','basic','lite','custom'].forEach(plan=>{
            if(unlocked[plan]){
                const now = Date.now();
                const elapsed = now - unlockTimes[plan];
                const total = plan==='premium'?14*86400000:plan==='basic'?28*86400000:42*86400000;
                const percent = Math.min(100, Math.round((elapsed/total)*100));
                res += `${plan}: ${percent}%\n`;
            } else res += `${plan}: Locked\n`;
        });
        return res;
    }

    if (personality.lastIntent === "faq" && shortReply) {
        personality.lastIntent = null;
        return "Want me to break that specific resolution down step-by-step?";
    }

    const faq = findFAQByIntent(msg);
    if (faq) {
        personality.lastIntent = "faq";
        const variations = [
            faq.a,
            `${faq.a} Let me know if you want me to walk you through it.`,
            `Here’s what you need: ${faq.a}`,
            `${faq.a} — want help doing it now?`
        ];
        return variations[Math.floor(Math.random() * variations.length)];
    }

    setTimeout(transitionToSarah, 1000);
    setTimeout(() => {
        forwardUserMessageToTelegram(`⚠️ [KAIROS ESCALATION]: Automated assistant could not parse last query. Handoff triggered for question: "${msg}"`, "text");
    }, 500);

    return "That requires priority authorization. Hold on a moment while I connect your session directly with Sarah from Nobu Hospitality LLC... ⚡";
}

function adaptTone(msg){
    const text = msg.toLowerCase();
    if(/frustrated|angry|not working|annoying/.test(text)){
        personality.tone = "calm";
        personality.userMood = "frustrated";
    } else if(/thanks|nice|good/.test(text)){
        personality.tone = "friendly";
        personality.userMood = "positive";
    } else {
        personality.tone = "neutral";
    }
}

function humanize(text){
    if(!text) return "";
    const fillers = ["", "", "Alright… ", "Okay, so ", "Got it. ", "Hmm, ", "Let me see… ", "Right, ", "Makes sense. "];
    let prefix = fillers[Math.floor(Math.random()*fillers.length)];

    if(personality.tone === "calm") prefix = "I get how that can be frustrating. ";
    if(personality.tone === "friendly") return prefix + text + " 👍";
    return prefix + text;
}

// =================================================================
// CORRECT ROUTING BLOCK SETUP (WITH BULLETPROOF MEDIA CONTROLS)
// =================================================================
function handleMessage(msg) {
    if (isSarahActive) return;
    const lower = msg.toLowerCase().trim();

    // 1. CONVERSATIONAL MUSIC MEDIA CONTROLS (Pause, Resume, Next, Prev)
    const deckA = document.getElementById('audioDeckA');
    const deckB = document.getElementById('audioDeckB');
    let currentLiveDeck = activeDeck;

    // --- PAUSE DETECTOR ---
    // Catches: pause, pause the music, stop playing, halt the track, put it on pause, etc.
    if (
        lower === "pause" || 
        /\b(pause|stop|halt|freeze|hold)\b/.test(lower) && /\b(music|audio|song|track|playing|it)\b/.test(lower)
    ) {
        if (currentLiveDeck && !currentLiveDeck.paused) {
            currentLiveDeck.pause();
            botReply("Music paused. Let me know when you want to resume. ⏸️");
        } else {
            botReply("There is no music playing right now.");
        }
        return;
    }

    // --- RESUME DETECTOR ---
    // Catches: resume, continue, play again, unpause, unpause it, start playing again, etc.
    if (
        lower === "resume" || lower === "continue" || lower === "unpause" ||
        /\b(resume|continue|unpause)\b/.test(lower) ||
        /\b(play|start)\b/.test(lower) && /\b(again|music|track|song|audio|it)\b/.test(lower)
    ) {
        if (currentLiveDeck && currentLiveDeck.paused && currentLiveDeck.src) {
            currentLiveDeck.play().catch(err => console.log(err));
            botReply("Resuming track... ▶️");
        } else {
            botReply("No paused track found in the session queue.");
        }
        return;
    }

    // --- NEXT DETECTOR ---
    // Catches: next, skip, skip track, next music, play next song, change song, move forward, etc.
    if (
        lower === "next" || lower === "skip" ||
        /\b(skip|next|change|forward)\b/.test(lower) && /\b(track|song|music|audio|this|one|it)\b/.test(lower) ||
        lower.includes("play something else")
    ) {
        if (musicQueue.length > 0 && currentTrackIndex < musicQueue.length - 1) {
            currentTrackIndex++;
            const nextFile = musicQueue[currentTrackIndex];
            deckA.ontimeupdate = null;
            deckB.ontimeupdate = null;
            triggerCustomAudioPlayerMessage(nextFile);
        } else if (musicQueue.length > 0) {
            botReply("You've reached the end of the current playlist stream.");
        } else {
            botReply("No active queue to skip forward.");
        }
        return;
    }

    // --- PREVIOUS DETECTOR ---
    // Catches: prev, previous, go back, back track, previous song, play last one, etc.
    if (
        lower === "prev" || lower === "previous" || lower === "back" ||
        /\b(prev|previous|back|last)\b/.test(lower) && /\b(track|song|music|audio|one|it)\b/.test(lower) ||
        lower.includes("go back")
    ) {
        if (musicQueue.length > 0 && currentTrackIndex > 0) {
            currentTrackIndex--;
            const prevFile = musicQueue[currentTrackIndex];
            deckA.ontimeupdate = null;
            deckB.ontimeupdate = null;
            triggerCustomAudioPlayerMessage(prevFile);
        } else if (currentTrackIndex === 0) {
            botReply("This is the very first track in the queue.");
        } else {
            botReply("No active queue history to step backward.");
        }
        return;
    }

    // 2. MUSIC INTERCEPTOR (Priority 2)
    if (expectingMusicResponse) {
        if (/^(yes|yeah|yup|sure|ok|please)\b/.test(lower)) {
            expectingMusicResponse = false;
            handleMusicIntent("yes"); 
            return;
        } else {
            expectingMusicResponse = false;
            botReply("No worries! What else can I help you with?");
            return;
        }
    }

    // 3. PLAY COMMANDS (Priority 3)
    if (lower.startsWith("play ") || lower.includes("play me") || lower === "play") {
        const searchTarget = lower.replace("play me", "").replace("play", "").trim().replace(/[^a-z0-9]/g, "");
        
        const trackExists = audioLibrary.some(file => {
            const cleanFile = file.toLowerCase().replace(/[^a-z0-9]/g, "");
            return cleanFile.includes(searchTarget) || searchTarget.includes(cleanFile);
        });

        if (trackExists || searchTarget === "") {
            handleMusicIntent(lower);
        } else {
            expectingMusicResponse = true;
            botReply("I couldn't find that track inside the vault directory. Want me to play a random one from the library instead?");
        }
        return;
    }

    // 4. GREETINGS & SYSTEM COMMANDS
    if(/^(hi|hello|hey|yo|wassup|sup|ski)\b/.test(lower)){
        const greetings = ["Sup 😊 I’m Kairos. What do you need help with?", "Hi there. Kairos online. How can I help?", "Hey, what's on your mind?"];
        botReply(greetings[Math.floor(Math.random() * greetings.length)]);
        return;
    }

    const intent = detectIntent(msg);
    if(intent.type==='theme'){ botReply(`Switched to ${intent.value} mode.`); return; }
    if(intent.type==='ticket'){ botReply("Your ticket has been generated."); return; }
    if(intent.type==='logout'){ botReply("Logging you out..."); return; }
    if(intent.type==='quote'){ botReply(quotes[Math.floor(Math.random() * quotes.length)]); return; }

    // 5. SMART REPLY FALLBACK
    adaptTone(msg);
    const reply = generateSmartReply(msg);
    if(reply) botReply(reply);
}

function botReply(text){
    const finalText = humanize(text);
    showTyping();
    const delay = getTypingDelay(finalText);

    setTimeout(() => {
        removeTyping();
        addMessage(finalText, "bot", "delivered", "text", "kairos");

        conversationMemory.push({ role: "bot", content: finalText, type: "text", time: Date.now() });
        chatHistory.push({ sender: 'bot', text: finalText, type: 'text', actualSender: 'kairos' });
        localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
    }, delay);
}

function startQuoteAutorotation() {
    clearInterval(quoteRotationTimer);
    quoteRotationTimer = setInterval(() => {
        if (sessionStorage.getItem('active_chat_tab') === currentTabId && !isSarahActive) {
            if (statusText && quotes && quotes.length > 0) {
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                statusText.textContent = randomQuote;
            }
        }
    }, 7000); 
}

// ---------- Outbound Transmission Handling ----------
async function sendMessage(){
    const text = botInput.value.trim();
    if(!text) return;

    recordChatMessage();

    let type = "text";
    if (/\.(jpeg|jpg|gif|png)$/i.test(text)) type = "photo";
    if (/\.(mp4|webm|ogg|mov)$/i.test(text)) type = "video";

    const userMsg = addMessage(text, "user", "delivered", type);
    botInput.value = "";

    setTimeout(()=>markAsSeen(userMsg), 800);

    conversationMemory.push({ role: "user", content: text, type: type, time: Date.now() });
    chatHistory.push({ sender: 'user', text: text, type: type });
    localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

    forwardUserMessageToTelegram(text, type);

    const takeoverTime = parseInt(localStorage.getItem('sarah_takeover_timestamp')) || 0;
    if (isSarahActive && takeoverTime > 0 && (Date.now() - takeoverTime > 900000)) {
        isSarahActive = false;
        personality.awaitingTimeoutRetry = true;
        const timeoutFallback = "Sorry, I can't connect with Sarah right now. Do you want me to retry connection again or help you out with another task?";
        botReply(timeoutFallback);
        return;
    }

    if (type === "text") {
        handleMessage(text);
    } else {
        botReply("Thanks for sharing the attachment. A customer care representative will look into this.");
    }

    try {
        let endpoint = "sendMessage";
        let bodyPayload = { chat_id: CHAT_ID };

        if (type === "photo") { endpoint = "sendPhoto"; bodyPayload.photo = text; }
        else if (type === "video") { endpoint = "sendVideo"; bodyPayload.video = text; }
        else { bodyPayload.text = text; }

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bodyPayload)
        });
    } catch (e) {
        console.error('Outbound transmission drop.');
    }
}

// ---------- File Inputs Attachment Hook ----------
if (botFileInput) {
    botFileInput.addEventListener('change', async () => {
        const file = botFileInput.files[0];
        if (!file) return;

        let msgType = "document"; 
        if (file.type.startsWith("image/")) msgType = "photo";
        if (file.type.startsWith("video/")) msgType = "video";
        if (file.type.startsWith("audio/")) msgType = "audio"; 

        // Lock file name string safely in local memory
        let savedFileName = file.name;
        if (!savedFileName || savedFileName === "blob") {
            savedFileName = msgType === "audio" ? "Voice_Note.mp3" : "Attachment_File";
        }

        const reader = new FileReader();
        reader.onload = async function(e) {
            const persistentFileUrl = e.target.result; 

            // If it's a document, pass the file name; otherwise pass the base64 media stream URL
            const visualContent = (msgType === "document") ? savedFileName : persistentFileUrl;

            const userMsg = addMessage(visualContent, "user", "delivered", msgType);
            botFileInput.value = ""; 

            setTimeout(() => markAsSeen(userMsg), 800);

            chatHistory.push({ sender: 'user', text: visualContent, type: msgType });
            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

            forwardUserMessageToTelegram(savedFileName, msgType);

            // 🌟 FIXED: Fire confirmation message natively by passing it through botReply directly 
            // without worrying about conflicting async loop timers!
            const confirmationText = `Received file: ${savedFileName}. Saved directly to secure logs.`;
            botReply(confirmationText);

            try {
                const formData = new FormData();
                formData.append("chat_id", CHAT_ID);
                let endpoint = "sendDocument";
                if (msgType === "photo") { endpoint = "sendPhoto"; formData.append("photo", file); }
                else if (msgType === "video") { endpoint = "sendVideo"; formData.append("video", file); }
                else if (msgType === "audio") { endpoint = "sendAudio"; formData.append("audio", file); } 
                else { formData.append("document", file); }

                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, { method: 'POST', body: formData });
            } catch (err) {
                console.error('Multi-part attachment transmission drop:', err);
            }
        };
        reader.readAsDataURL(file);
    });
}

async function getTelegramFileUrl(fileId) {
    try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
        const data = await res.json();
        if (data.ok) return `https://api.telegram.org/file/bot${BOT_TOKEN}/${data.result.file_path}`;
    } catch (e) { console.error("Media link fetch error", e); }
    return null;
}

                            } // This bracket safely closes: if (msgType === "text")

    } catch (error) {

// ---------- MULTI-DECK 10s CROSSFADE ENGINE WORKFLOW ----------
function botMusicReply(text, file) {
    const finalText = humanize(text);
    showTyping();
    const delay = getTypingDelay(finalText);

    setTimeout(() => {
        removeTyping();
        addMessage(finalText, "bot", "delivered", "text", "kairos");
        chatHistory.push({ sender: 'bot', text: finalText, type: 'text', actualSender: 'kairos' });
        localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

        const deckA = document.getElementById('audioDeckA');
        const deckB = document.getElementById('audioDeckB');
        if (!deckA || !deckB) return;

        let primaryDeck = activeDeck === deckA ? deckB : deckA;
        let secondaryDeck = activeDeck === deckA ? deckA : deckB;

        if (!activeDeck) {
            activeDeck = deckA;
            activeDeck.src = file;
            activeDeck.volume = 1;
            activeDeck.load();
            activeDeck.play().catch(err => console.log("Playback interaction bypass:", err));
            setupTrackEndMonitor(activeDeck);
        } else {
            executeCrossfade(secondaryDeck, primaryDeck, file);
        }
    }, delay);
}

function executeCrossfade(currentDeck, nextDeck, nextFile) {
    nextDeck.src = nextFile;
    nextDeck.volume = 0;
    nextDeck.load();
    nextDeck.play().catch(err => console.log("Crossfade buffer ready:", err));
    
    activeDeck = nextDeck;

    const fadeSteps = 50; 
    const intervalTime = (crossfadeDuration * 1000) / fadeSteps; 
    let currentStep = 0;

    const fadeInterval = setInterval(() => {
        currentStep++;
        let currentVol = 1 - (currentStep / fadeSteps);
        let nextVol = currentStep / fadeSteps;

        currentDeck.volume = Math.max(0, Math.min(1, currentVol));
        nextDeck.volume = Math.max(0, Math.min(1, nextVol));

        if (currentStep >= fadeSteps) {
            clearInterval(fadeInterval);
            currentDeck.pause();
            currentDeck.src = ""; 
            setupTrackEndMonitor(nextDeck);
        }
    }, intervalTime);
}

function setupTrackEndMonitor(deck) {
    deck.ontimeupdate = null; 
    deck.ontimeupdate = () => {
        if (deck.duration && (deck.duration - deck.currentTime <= crossfadeDuration)) {
            deck.ontimeupdate = null; 
            currentTrackIndex++; 
            if (currentTrackIndex < musicQueue.length) {
                const nextFile = musicQueue[currentTrackIndex];
                triggerCustomAudioPlayerMessage(nextFile);
            } else {
                botReply("Audio sequence execution complete. 🫡");
            }
        }
    };
}

function triggerCustomAudioPlayerMessage(file) {
    // 1. CLEAR OLD NOTIFICATIONS FIRST
    // We target all messages and filter by specific text content patterns
    const existingMessages = botMessagesContainer.querySelectorAll('.message');
    
    existingMessages.forEach(msg => {
        const text = msg.textContent;
        // Strict match: ensures we only remove our specific status updates
        const isPlayingNotification = text.includes("Playing next:") || 
                                     (text.includes("Playing") && text.includes("for you"));
        
        if (isPlayingNotification) {
            const wrap = msg.closest('.msgWrap');
            if (wrap) wrap.remove();
        }
    });

    // 2. NOW ADD THE NEW ONE
    const formatted = formatTrackTitle(file);
    const msgText = (currentTrackIndex === 0) ? `Playing ${formatted} for you... 🎧` : `Playing next: ${formatted}... 🎧`;
    
    botMusicReply(msgText, file);
}


function handleMusicIntent(lowerMsg) {
    const trimmedMsg = lowerMsg.trim().toLowerCase();
    
    if (trimmedMsg === "yes" || trimmedMsg === "yeah" || trimmedMsg === "yup" || trimmedMsg === "sure") {
        if (audioLibrary.length > 0) {
            const randomIndex = Math.floor(Math.random() * audioLibrary.length);
            const randomTrack = audioLibrary[randomIndex];
            musicQueue = audioLibrary.slice(randomIndex);
            currentTrackIndex = 0;
            triggerCustomAudioPlayerMessage(randomTrack);
            return;
        }
    }
    
    if (trimmedMsg === "no" || trimmedMsg === "nope" || trimmedMsg === "nah") {
        botReply("Understood. Keeping it quiet. 🫡");
        return;
    }

    let targetFile = null;
    let cleanSearch = lowerMsg.replace(/play me|play|\bby\b/g, "").replace(/[^a-z0-9]/g, "").trim();

    for (const file of audioLibrary) {
        if (file.toLowerCase().replace(/[^a-z0-9]/g, "").includes(cleanSearch)) {
            targetFile = file; 
            break;
        }
    }

    if (targetFile) {
        const startIndex = audioLibrary.indexOf(targetFile);
        musicQueue = audioLibrary.slice(startIndex);
        currentTrackIndex = 0; 
        triggerCustomAudioPlayerMessage(targetFile);
    } else {
        botReply("I couldn't find that track. Want me to play a random one instead?");
    }
}

function formatTrackTitle(filePath) {
    let name = filePath.split('/').pop().replace('.mp3', '').trim();
    name = name.replace(/\(.*?\)/g, '').replace(/RodWave/gi, '').replace(/\s+/g, ' ').trim();
    
    const toTitleCase = (str) => str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');

    const knownArtists = [
        "Adele", "Asake", "Central Cee", "Charlie Puth", "Ed Sheeran", 
        "Fridayy", "Future", "Gracie Abrams", "Gunna", "Justin Bieber", 
        "Kate Bush", "Kodak Black", "Lil Durk", "Migos", "Post Malone", 
        "Quavo", "Rod Wave", "Rylo Rodriguez", "SZA", "Tee Grizzley", 
        "Whitney Houston", "Wiz Khalifa", "Young Thug", "YoungBoy Never Broke Again"
    ];

    if (name.toLowerCase().includes(' ft ') || name.toLowerCase().includes(' feat ')) {
        let parts = name.split(/-| ft | feat /i);
        let title = toTitleCase(parts[0].trim());
        let featuredArtist = toTitleCase(parts[1].trim());
        let leadArtist = parts[2] ? toTitleCase(parts[2].trim()) : "Rod Wave";
        return `${title} by ${leadArtist} Ft ${featuredArtist}`;
    }

    if (name.includes('-')) {
        let parts = name.split('-');
        let part1 = parts[0].trim();
        let part2 = parts[1] ? parts[1].trim() : "";
        let artist = knownArtists.find(a => part1.toLowerCase().includes(a.toLowerCase()) || part2.toLowerCase().includes(a.toLowerCase()));
        
        if (artist) {
            let title = (part1.toLowerCase().includes(artist.toLowerCase())) ? part2 : part1;
            return `${toTitleCase(title)} by ${toTitleCase(artist)}`;
        }
    }

    return toTitleCase(name);
}

// =================================================================
// SECURE ONE-TIME KEY (OTK) GENERATION ENGINE
// =================================================================
function generateSecureOTK(durationSeconds = 60) {
    try {
        // 1. Create random cryptographic entropy characters
        const charset = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
        let entropy = "";
        for (let i = 0; i < 16; i++) {
            entropy += charset.charAt(Math.floor(Math.random() * charset.length));
        }

        // 2. Compute the precise future millisecond timestamp threshold
        const absoluteExpiry = Date.now() + (durationSeconds * 1000);

        // 3. Assemble structural raw pairing match (e.g., "entropy.timestamp")
        const rawPayload = `${entropy}.${absoluteExpiry}`;

        // 4. Transform string context directly into unmasked Base64 format strings
        const dynamicBase64Token = btoa(rawPayload);

        // 5. Explicitly cache this generated key into LocalStorage to pass validation rule
        localStorage.setItem('active_session_otk', dynamicBase64Token);

        return dynamicBase64Token;
    } catch (err) {
        console.error("Critical error building secure OTK asset token stream:", err);
        return "ERROR_GENERATING_TOKEN";
    }
}
