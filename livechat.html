<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos Bot System</title>
    <style>
        /* Base page layout for centering the card */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0b0b16;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* ---------- Kairos Bot (Full UI System) ---------- */

#assistantBotCard {
  width: 100%;
  max-width: 400px;
  margin-top: 20px;
  padding: 18px;
  z-index: 1;
  box-sizing: border-box;

  background: rgba(20, 20, 35, 0.6);
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
}

/* New Unified Flex Container Bar */
.input-area {
  display: flex;
  align-items: center;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 24px;
  padding: 4px 8px;
  margin-top: 12px;
}

/* Base structural alignment for buttons */
.icon-btn {
  background: none;
  border: none;
  padding: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  transition: all 0.2s ease;
}

.icon-btn:hover {
  background-color: rgba(255, 255, 255, 0.08);
  color: #fff;
}

/* Main Input Text Field Box Customization */
#botInput {
  flex: 1;
  padding: 8px;
  border: none;
  background: transparent; /* Stripped background box layer */
  color: #fff;
  outline: none;
  font-size: 14px;
}

#botInput::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

/* Send Button Layout Profile Override */
#botSendBtn {
  background: linear-gradient(135deg, rgba(107,44,216,0.9), rgba(155,89,182,0.9));
  color: #fff;
  border-radius: 14px; /* Slightly rounded block adjustment to accent layout */
  padding: 8px 12px;
}

#botSendBtn:hover {
  transform: scale(1.02);
  background: linear-gradient(135deg, rgba(117,54,226,1), rgba(165,99,192,1));
}

#botHeader {
  background: linear-gradient(135deg, rgba(107,44,216,0.9), rgba(155,89,182,0.9));
  color: #fff;
  text-align: center;
  padding: 10px;
  font-weight: 600;
  letter-spacing: 0.4px;
  border-radius: 12px 12px 0 0;
}

#botMessagesContainer {
  height: 180px;
  overflow-y: auto;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  padding: 10px;
  border-radius: 0 0 12px 12px;
}

/* Messages */
.message {
  animation: fadeSlideIn 0.25s ease forwards;
  opacity: 0;
  font-size: 13px;
  padding: 6px 10px;
  display: inline-block;
  max-width: 85%;
}

.bot {
  text-align: left;
  color: #c7c7ff;
  background: rgba(107,44,216,0.12);
  border-radius: 10px 10px 10px 4px;
}

.user {
  text-align: right;
  color: #fff;
  background: rgba(155,89,182,0.3);
  border-radius: 10px 10px 4px 10px;
}

/* Wrap */
.msgWrap {
  display: flex;
  flex-direction: column;
  margin-bottom: 6px;
}

/* Animation */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Typing dots */
.typing {
  display: inline-flex;
  gap: 4px;
  background: rgba(107,44,216,0.12);
  padding: 6px 10px;
  border-radius: 10px 10px 10px 4px;
}

.typing span {
  width: 6px;
  height: 6px;
  background: #c7c7ff;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* Meta (time + ticks) */
.meta {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.timestamp {
  font-size: 10px;
  opacity: 0.5;
  color: #aaa;
}

/* Double ticks */
.tick {
  font-size: 11px;
  letter-spacing: -2px;
}

.tick.delivered::after {
  content: "✓✓";
  color: #bbb;
}

.tick.seen::after {
  content: "✓✓";
  color: #6c8cff;
}

/* Ambient Status Styling - Matches Video 1 Look precisely */
.ambient {
  text-align: center;
  color: rgba(255, 255, 255, 0.4); /* Clean, soft gray text */
  font-size: 13px;
  font-style: bold;
  padding: 15px;
  line-height: 1.4;
  width: 100%;
  box-sizing: border-box;
  display: block;
  margin: 10px auto;
  animation: fadeSlideIn 0.3s ease forwards;
}



    </style>
</head>

    <input type="text" id="botInput" placeholder="Ask Kairos..." autocomplete="off">

</div>

</div>


<script>
// ---------- Configuration Constants ----------
// ⚠️ WARNING: Move BOT_TOKEN to a secure backend environment as soon as possible!
const BOT_TOKEN = '8074365555:AAGL7by0c0TJCVutfkPhAZNCXCYopdInn2E';
const CHAT_ID = '-1003913850436';

// ---------- State & Personality Configuration ----------
// Moved to the top to fix ReferenceErrors during execution
const personality = { tone: "neutral", lastIntent: null, userMood: "unknown", awaitingSarahConfirm: false };
let isSarahActive = false; 

// ---------- Kairos Bot / FAQ Elements ----------
const botMessagesContainer = document.getElementById('botMessagesContainer');
const botInput = document.getElementById('botInput');
const botSendBtn = document.getElementById('botSendBtn');
const botFileInput = document.getElementById('botFileInput'); 
const statusText = document.getElementById('status-text'); 

let conversationMemory = [];
let lastUpdateId = parseInt(localStorage.getItem('tg_last_update_id')) || 0;

let baseDelay = 3000;
let currentDelay = baseDelay;

const currentTabId = Math.random().toString();
sessionStorage.setItem('active_chat_tab', currentTabId);

const sarahProfile = {
    name: "Sarah (Account Representative)",
    avatarColor: "linear-gradient(135deg, #ff416c, #ff4b2b)",
    statusText: "Connected with Sarah",
    // Clean, reassuring variations for a live human touch
    greetings: [
        "Hi, this is Sarah. I've personally stepped into this chat session to assist you. Please tell me exactly what issue you're experiencing so I can help resolve it.",
        "Hello, Sarah here. I just noticed your session flagged an issue, so I'm stepping in to handle this manually. What seems to be the problem?",
        "Hi there! This is Sarah from the support team. I'm taking over from Kairos to make sure we get your account sorted out right away. What's going on?",
        "Hello. I'm Sarah, your account representative. I've joined the session to take a look at your issue directly. Let's get this taken care of—what are you running into?"
    ]
};


const quotes = [ 
    "Believe in yourself and all that you are.", "Small steps each day lead to big results.", 
    "Consistency is the key to success.", "Trust God’s timing; He never runs late.", 
    "Don’t chase money; build systems that make money chase you.", 
    "Financial freedom begins when you learn to control your money, not your lifestyle.", 
    "Save like a pessimist, invest like an optimist.", "Wealth grows when patience waters it daily."
];

const faqs = [
    {q:"How do I reset my password?", a:"Click 'Forgot password' on the login page and follow instructions.", tags:["password","reset","login","signin","account access"]},
    {q:"How can I update my billing info?", a:"Navigate to your Sidebar, then 'Withdrawals' to update payment methods.", tags:["billing","payment","withdrawal","card","update payment","finance"]},
    {q:"How do I contact live support?", a:"Generate a ticket and email support at avalonflowsystem.helpdesk@gmail.com including your reference.", tags:["support","contact","help","email","customer service","agent"]},
    {q:"How is my transaction verified on AvalonFlow Custom?", a:"Unlike our standard tiers, AvalonFlow Custom utilizes Compliance Verification. A dedicated regulatory body oversees the fund-hold release. We verify user intent and readiness before any funds move.", tags:["custom","escrow","verification","manual verification","transaction","secure payment","fund hold"]},
    {q:"Why do Premium, Basic, and Lite have a Cycle Rate while Custom does not?", a:"Bonds are automated tiers for smaller transactions. AvalonFlow Custom is designed for high-value transactions ($500+). It bypasses the cycle queues to provide immediate priority settlement.", tags:["cycle","cycle rate","premium","basic","lite","custom","difference","bond tiers"]}
];

// ---------- NLP & Utility Engines ----------
function normalize(text){
    return text.toLowerCase().replace(/[^\w\s]/g,'');
}

function findFAQByIntent(input){
    const text = input.toLowerCase();
    let best = null;
    let bestScore = 0;

    for(const f of faqs){
        let score = 0;
        f.tags.forEach(tag=>{
            if(text.includes(tag)) score += 2;
            else if(tag.split(" ").some(word => text.includes(word))) score += 1;
        });
        if(score > bestScore){
            bestScore = score;
            best = f;
        }
    }
    return bestScore > 1 ? best : null;
}

function getTime(){
    const now = new Date();
    return now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

// ---------- Unified Message Rendering System ----------
function addMessage(content, sender="bot", status="delivered", type="text"){
    const wrap = document.createElement("div");
    wrap.className = "msgWrap";

    const msg = document.createElement("div");
    msg.className = `${sender} message`;

    if (type === "photo") {
        const img = document.createElement("img");
        img.src = content;
        img.style.maxWidth = "200px";
        img.style.borderRadius = "8px";
        img.style.display = "block";
        msg.appendChild(img);
    } else if (type === "video") {
        const vid = document.createElement("video");
        vid.src = content;
        vid.controls = true;
        vid.style.maxWidth = "200px";
        vid.style.borderRadius = "8px";
        vid.style.display = "block";
        msg.appendChild(vid);
    } else if (type === "document") {
        const docLink = document.createElement("a");
        docLink.href = content;
        docLink.target = "_blank";
        docLink.textContent = "📄 View Attached Document";
        docLink.style.color = "#ff4b2b";
        docLink.style.textDecoration = "underline";
        msg.appendChild(docLink);
    } else {
        msg.textContent = content;
    }

    wrap.appendChild(msg);

    if(sender === "user"){
        const meta = document.createElement("div");
        meta.className = "meta";

        const time = document.createElement("span");
        time.className = "timestamp";
        time.textContent = getTime();

        const tick = document.createElement("span");
        tick.className = `tick ${status}`;

        meta.appendChild(time);
        meta.appendChild(tick);
        wrap.appendChild(meta);
    }

    botMessagesContainer.appendChild(wrap);
    botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;

    return wrap;
}

function markAsSeen(wrap){
    if (!wrap) return;
    const tick = wrap.querySelector(".tick");
    if(tick){
        tick.classList.remove("delivered");
        tick.classList.add("seen");
    }
}

// ---------- Typing Feedbacks ----------
function showTyping(){
    if (document.getElementById("typingIndicator")) return;
    const t = document.createElement("div");
    t.className = "typing";
    t.id = "typingIndicator";
    t.innerHTML = "<span></span><span></span><span></span>";
    botMessagesContainer.appendChild(t);
    botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
}

function removeTyping(){
    const t = document.getElementById("typingIndicator");
    if(t) t.remove();
}

function getTypingDelay(text){
    return Math.min(300 + text.length * 20, 2500); // Optimized for faster, natural response times
}

let typingTimeout;
let typingIndicatorEl = null;

botInput.addEventListener("input", ()=>{
    if(!typingIndicatorEl){
        typingIndicatorEl = document.createElement("div");
        typingIndicatorEl.className = "ambient";
        typingIndicatorEl.textContent = "User is typing...";
        botMessagesContainer.appendChild(typingIndicatorEl);
    }
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(()=>{
        if(typingIndicatorEl) { typingIndicatorEl.remove(); typingIndicatorEl = null; }
    }, 1200);
});

// ---------- HUMANIZE AGENT SUPPORT PIPELINE ----------
function transitionToSarah() {
    if(isSarahActive) return;
    isSarahActive = true; 

    // Kill the quote timer permanently right here
    clearInterval(quoteRotationTimer);
    quoteRotationTimer = null; 

    showTyping();

    setTimeout(() => {
        removeTyping();
        const handoffMessage = "One moment while I connect you with Sarah from our support team...";
        addMessage(handoffMessage, "bot");

        conversationMemory.push({ role: "bot", content: handoffMessage, type: "text", time: Date.now() });
        showTyping();

        setTimeout(() => {
            removeTyping();
            const botHeader = document.getElementById('botHeader');
            if (botHeader) {
                botHeader.style.background = sarahProfile.avatarColor;
                botHeader.textContent = sarahProfile.name;
            }
            
            if (statusText) statusText.textContent = sarahProfile.statusText;

            // 1. Check what the user was talking about right before Sarah joined
            const userHistoryText = chatHistory.filter(m => m.sender === 'user').map(m => m.text.toLowerCase()).join(" ");
            let sarahEntryMessage = "";

            // 2. High-value Custom Escrow/Verification contextual override
            if (userHistoryText.includes("custom") || userHistoryText.includes("verification") || userHistoryText.includes("hold")) {
                sarahEntryMessage = "Hi, this is Sarah. I've personally stepped in because our system flagged a high-value Custom tier transaction verification. I'm overseeing the compliance release manually to ensure everything updates perfectly. Let's get this sorted out for you.";
            } 
            // 3. Fallback to a random conversational human greetin
            else {
                const randomIndex = Math.floor(Math.random() * sarahProfile.greetings.length);
                sarahEntryMessage = sarahProfile.greetings[randomIndex];
            }

            // 4. Render the chosen message cleanly to the chat timeline
            addMessage(sarahEntryMessage, "bot");

            conversationMemory.push({ role: "sarah", content: sarahEntryMessage, type: "text", time: Date.now() });
            chatHistory.push({ sender: 'bot', text: sarahEntryMessage, type: 'text' });
            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
        }, 30000);
    }, 20000);
}

// ---------- Intent Detection ----------
function detectIntent(msg){
    const text = msg.toLowerCase();
    if(/light mode|too dark|increase brightness/.test(text)) return {type:'theme', value:'light'};
    if(/dark mode|too bright|reduce brightness/.test(text)) return {type:'theme', value:'dark'};
    if(/support|live chat|representative|human|agent|help|issue/.test(text)) return {type:'support'};
    if(/ticket|complaint/.test(text)) return {type:'ticket'};
    if(/logout|sign out/.test(text)) return {type:'logout'};
    if(/quote|motivate/.test(text)) return {type:'quote'};
    return {type:'chat'};
}

function generateSmartReply(msg){
    const text = msg.toLowerCase();
    const isYes = /^(yes|yeah|sure|ok|please)\b/.test(text);
    const isNo = /^(no|not really|nah)\b/.test(text);

    if (/support|live chat|representative|human|agent|help|issue/.test(text) || personality.lastIntent === "support") {
        if(/email/.test(text)){
            personality.lastIntent = null;
            return "Send your request to avalonflowsystem.helpdesk@gmail.com with your issue details.";
        }
        if(/live|chat|representative|agent|human/.test(text)){
            personality.lastIntent = null;
            setTimeout(transitionToSarah, 600);
            return "Connecting you with Sarah in a bit...";
        }
        personality.lastIntent = "support";
        return "Do you prefer to email support or live chat with Sarah?";
    }

    if (personality.awaitingSarahConfirm && isYes) {
        personality.awaitingSarahConfirm = false;
        setTimeout(transitionToSarah, 600);
        return "Understood. One moment while I connect you with Sarah from our support team...";
    }
    if (personality.awaitingSarahConfirm && isNo) {
        personality.awaitingSarahConfirm = false;
        return "Alright, let me know what you need help with instead.";
    }

    const faq = findFAQByIntent(msg);
    if(faq){
        personality.lastIntent = "faq";
        return faq.a;
    }

    if(/reward balance|progress|earnings balance|cashback/.test(text)){
        let unlocked = JSON.parse(localStorage.getItem('unlockedPlans')) || {};
        let unlockTimes = JSON.parse(localStorage.getItem('unlockTimes')) || {};
        let res = "Bond progress:\n";

        ['premium','basic','lite','custom'].forEach(plan=>{
            if(unlocked[plan]){
                const now = Date.now();
                const elapsed = now - unlockTimes[plan];
                const total = plan==='premium'?14*86400000:plan==='basic'?28*86400000:42*86400000;
                const percent = Math.min(100, Math.round((elapsed/total)*100));
                res += `${plan}: ${percent}%\n`;
            } else res += `${plan}: Locked\n`;
        });
        return res;
    }

    return "What would you like help with—support, tickets, rewards, or settings?";
}

function adaptTone(msg){
    const text = msg.toLowerCase();
    if(/frustrated|angry|not working|annoying/.test(text)){
        personality.tone = "calm";
        personality.userMood = "frustrated";
    } else if(/thanks|nice|good/.test(text)){
        personality.tone = "friendly";
        personality.userMood = "positive";
    } else {
        personality.tone = "neutral";
    }
}

function humanize(text){
    if(personality.tone === "calm") return "I get how that can be frustrating. " + text;
    if(personality.tone === "friendly") return text + " 👍";
    return text;
}

// ---------- Message Output Processing ----------
function handleMessage(msg){
    if (isSarahActive) return;
    const lower = msg.toLowerCase();

    if(/^(hi|hello|hey|yo)\b/.test(lower)){
        botReply("Hey 👋 I’m Kairos. What do you need help with today?");
        return;
    }

    const intent = detectIntent(msg);
    if(intent.type==='theme'){
        botReply(`Switched to ${intent.value} mode.`);
        return;
    }
    if(intent.type==='ticket'){
        botReply("Your ticket has been generated under your profile dashboard.");
        return;
    }
    if(intent.type==='logout'){
        botReply("Logging you out securely...");
        return;
    }
    if(intent.type==='quote'){
        botReply(quotes[Math.floor(Math.random()*quotes.length)]);
        return;
    }

    adaptTone(msg);
    const reply = generateSmartReply(msg);
    botReply(reply);
}

// ---------- OPTIMIZED BOT EXECUTION ENGINE ----------

function botReply(text){
    // Humanize adds conversational filler prefixes like "Alright…", "Okay, so"
    const finalText = humanize(text);
    showTyping();
    const delay = getTypingDelay(finalText);

    setTimeout(() => {
        removeTyping();
        
        // CRITICAL FIX: Explicitly forcing standard "bot" bubble styling and "text" type
        addMessage(finalText, "bot", "delivered", "text");

        // Commit cleanly to persistence layers
        conversationMemory.push({ role: "bot", content: finalText, type: "text", time: Date.now() });
        chatHistory.push({ sender: 'bot', text: finalText, type: 'text' });
        localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
    }, delay);
}

// ---------- FIXED AUTOMATIC BACKGROUND QUOTE ROTATION ----------

function startQuoteAutorotation() {
    clearInterval(quoteRotationTimer);
    quoteRotationTimer = setInterval(() => {
        // Only run if the tab is active and the live agent (Sarah) hasn't taken over
        if (sessionStorage.getItem('active_chat_tab') === currentTabId && !isSarahActive) {
            
            // CRITICAL FIX: Update the status bar directly instead of calling botReply
            if (statusText && quotes && quotes.length > 0) {
                const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
                
                // This updates the text in place without generating any message bubbles
                statusText.textContent = randomQuote;
            }
        }
    }, 7000); // Changes text gracefully every 7 seconds to match Video 1
}



// ---------- Outbound Transmission Handling ----------
async function sendMessage(){
    const text = botInput.value.trim();
    if(!text) return;

    let type = "text";
    if (/\.(jpeg|jpg|gif|png)$/i.test(text)) type = "photo";
    if (/\.(mp4|webm|ogg|mov)$/i.test(text)) type = "video";

    const userMsg = addMessage(text, "user", "delivered", type);
    botInput.value = "";

    setTimeout(()=>markAsSeen(userMsg), 800);

    conversationMemory.push({ role: "user", content: text, type: type, time: Date.now() });
    chatHistory.push({ sender: 'user', text: text, type: type });
    localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

    if (type === "text") {
        handleMessage(text);
    } else {
        botReply("Thanks for sharing the attachment. A customer care representative will look into this.");
    }

    try {
        let endpoint = "sendMessage";
        let bodyPayload = { chat_id: CHAT_ID };

        if (type === "photo") { endpoint = "sendPhoto"; bodyPayload.photo = text; }
        else if (type === "video") { endpoint = "sendVideo"; bodyPayload.video = text; }
        else { bodyPayload.text = text; }

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bodyPayload)
        });
    } catch (e) {
        console.error('Outbound transmission drop.');
    }
}

// ---------- File Inputs Attachment Hook ----------
botFileInput.addEventListener('change', async () => {
    const file = botFileInput.files[0];
    if (!file) return;

    let msgType = "document"; 
    if (file.type.startsWith("image/")) msgType = "photo";
    if (file.type.startsWith("video/")) msgType = "video";

    const localFileUrl = URL.createObjectURL(file);
    const userMsg = addMessage(localFileUrl, "user", "delivered", msgType);
    botFileInput.value = ""; 

    setTimeout(() => markAsSeen(userMsg), 800);

    chatHistory.push({ sender: 'user', text: localFileUrl, type: msgType });
    localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

    setTimeout(() => {
        botReply(`Received file: ${file.name}. Saved directly to secure logs.`);
    }, 1000);

    try {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);
        let endpoint = "sendDocument";
        if (msgType === "photo") { endpoint = "sendPhoto"; formData.append("photo", file); }
        else if (msgType === "video") { endpoint = "sendVideo"; formData.append("video", file); }
        else { formData.append("document", file); }

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, { method: 'POST', body: formData });
    } catch (e) {
        console.error('Multi-part attachment transmission drop:', e);
    }
});

botSendBtn.addEventListener('click', sendMessage);
botInput.addEventListener('keypress', e=>{ if(e.key==='Enter') sendMessage(); });

// ---------- Inbound Long Poll Processing (Typing Queue Fix) ----------
async function getTelegramFileUrl(fileId) {
    try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
        const data = await res.json();
        if (data.ok) return `https://api.telegram.org/file/bot${BOT_TOKEN}/${data.result.file_path}`;
    } catch (e) { console.error("Media link fetch error", e); }
    return null;
}

async function listenForTelegramMessages() {
    if (sessionStorage.getItem('active_chat_tab') !== currentTabId) {
        if (statusText) statusText.textContent = "Paused (Active in another tab)";
        scheduleNextCheck();
        return;
    }

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=20`;

    try {
        const response = await fetch(url);
        if (response.status === 429) {
            currentDelay = Math.min(currentDelay * 2, maxDelay);
            scheduleNextCheck();
            return;
        }
        if (!response.ok) throw new Error('Dropped feed sync');

        const data = await response.json();

        if (data.ok && data.result.length > 0) {
            currentDelay = baseDelay;
            let chainDelay = 0;

            for (const update of data.result) {
                if (update.message) {
                    let msgContent = null;
                    let msgType = "text";

                    if (update.message.photo) {
                        const fileId = update.message.photo[update.message.photo.length - 1].file_id;
                        msgContent = await getTelegramFileUrl(fileId);
                        msgType = "photo";
                    } else if (update.message.video) {
                        const fileId = update.message.video.file_id;
                        msgContent = await getTelegramFileUrl(fileId);
                        msgType = "video";
                    } else if (update.message.document) {
                        const fileId = update.message.document.file_id;
                        msgContent = await getTelegramFileUrl(fileId);
                        msgType = "document";
                    } else if (update.message.text) {
                        msgContent = update.message.text;
                        msgType = "text";
                    }

                    if (msgContent) {
                        // Keeps multiple arriving incoming messages running smoothly without stalling the main pipeline thread
                        setTimeout(() => { showTyping(); }, chainDelay);
                        chainDelay += 800; 

                        setTimeout(() => {
                            removeTyping();
                            addMessage(msgContent, 'bot', 'delivered', msgType);

                            conversationMemory.push({ role: "bot", content: msgContent, type: msgType, time: Date.now() });
                            chatHistory.push({ sender: 'bot', text: msgContent, type: msgType });
                            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
                        }, chainDelay);

                        chainDelay += 200; 
                    }
                    lastUpdateId = update.update_id;
                    localStorage.setItem('tg_last_update_id', lastUpdateId);
                }
            }
        }
    } catch (error) {
        currentDelay = Math.min(currentDelay * 1.5, maxDelay); 
    }
    scheduleNextCheck();
}

function scheduleNextCheck() {
    clearTimeout(pollingTimer);
    pollingTimer = setTimeout(listenForTelegramMessages, currentDelay);
}

function startQuoteAutorotation() {
    clearInterval(quoteRotationTimer);
    quoteRotationTimer = setInterval(() => {
        if (sessionStorage.getItem('active_chat_tab') === currentTabId && !isSarahActive) {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            botReply(randomQuote);
        }
    }, 60000); 
}

function initiateKairosConversation() {
    if (chatHistory.length === 0) {
        showTyping();
        setTimeout(() => {
            removeTyping();
            personality.awaitingSarahConfirm = true;
            const initialGreeting = "Hey 👋 I’m Kairos. Welcome back! Do you want me to connect you with Sarah regarding any issues you might have?";
            addMessage(initialGreeting, "bot", "delivered", "text");

            conversationMemory.push({ role: "bot", content: initialGreeting, type: "text", time: Date.now() });
            chatHistory.push({ sender: 'bot', text: initialGreeting, type: 'text' });
            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
            
            // Starts changing the background text instead of sending bubbles
            startQuoteAutorotation();
        }, 1000);
    } else {
        const clearSarahActive = chatHistory.some(m => m.text && m.text.includes("this is Sarah"));
        if (clearSarahActive) {
            isSarahActive = true; 
            const botHeader = document.getElementById('botHeader');
            if (botHeader) {
                botHeader.style.background = sarahProfile.avatarColor;
                botHeader.textContent = sarahProfile.name;
            }
            if (statusText) statusText.textContent = sarahProfile.statusText;
        } else {
            // Safe fallback to run background text rotation on page reload
            startQuoteAutorotation();
        }
    }
}


// Fixed History UI Rendering Parser to safely handle both strings and uploaded attachments on reload
function loadChatHistory() {
    if (chatHistory.length > 0) {
        chatHistory.forEach(item => {
            addMessage(item.text, item.sender, "delivered", item.type || "text");
        });
        botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadChatHistory();
    initiateKairosConversation();
    scheduleNextCheck(); 
    startQuoteAutorotation(); // Starts background quotes immediately on script load
});


</script>
