        /* Base page layout for centering the card */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        /* ---------- Kairos Bot (Full UI System) ---------- */

#assistantBotCard {
  width: 100%;
  max-width: 400px;
  margin-top: 20px;
  padding: 18px;
  z-index: 1;

  background: rgba(20, 20, 35, 0.6);
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  backdrop-filter: blur(14px);
  border: 1px solid rgba(255,255,255,0.08);
}

#botHeader {
  background: linear-gradient(135deg, rgba(107,44,216,0.9), rgba(155,89,182,0.9));
  color: #fff;
  text-align: center;
  padding: 10px;
  font-weight: 600;
  letter-spacing: 0.4px;
  border-radius: 12px 12px 0 0;
}

#botMessagesContainer {
  height: 180px;
  overflow-y: auto;
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(12px);
  padding: 10px;
  border-radius: 0 0 12px 12px;
}

/* Messages */
.message {
  animation: fadeSlideIn 0.25s ease forwards;
  opacity: 0;
  font-size: 13px;
  padding: 6px 10px;
  display: inline-block;
  max-width: 85%;
}

.bot {
  text-align: left;
  color: #c7c7ff;
  background: rgba(107,44,216,0.12);
  border-radius: 10px 10px 10px 4px;
}

.user {
  text-align: right;
  color: #fff;
  background: rgba(155,89,182,0.3);
  border-radius: 10px 10px 4px 10px;
}

/* Wrap */
.msgWrap {
  display: flex;
  flex-direction: column;
  margin-bottom: 6px;
}

/* Animation */
@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Typing dots */
.typing {
  display: inline-flex;
  gap: 4px;
  background: rgba(107,44,216,0.12);
  padding: 6px 10px;
  border-radius: 10px 10px 10px 4px;
}

.typing span {
  width: 6px;
  height: 6px;
  background: #c7c7ff;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }

@keyframes blink {
  0%, 80%, 100% { opacity: 0.2; }
  40% { opacity: 1; }
}

/* Meta (time + ticks) */
.meta {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 4px;
  margin-top: 2px;
}

.timestamp {
  font-size: 10px;
  opacity: 0.5;
  color: #aaa;
}

/* Double ticks */
.tick {
  font-size: 11px;
  letter-spacing: -2px;
}

.tick.delivered::after {
  content: "✓✓";
  color: #bbb;
}

.tick.seen::after {
  content: "✓✓";
  color: #6c8cff;
}

/* Ambient */
.ambient {
  text-align: center;
  color: #aaa;
  font-size: 12px;
  opacity: 0.8;
}

/* Input */
#botInput {
  flex: 1;
  padding: 8px;
  border: none;
  border-radius: 10px;
  background: rgba(255,255,255,0.08);
  color: #fff;
  margin-right: 4px;
  outline: none;
}

/* Button */
#botSendBtn {
  background: linear-gradient(135deg, rgba(107,44,216,0.9), rgba(155,89,182,0.9));
  border: none;
  color: #fff;
  border-radius: 10px;
  padding: 8px 12px;
  cursor: pointer;
}
    </style>
</head>

// ---------- NLP ----------
function normalize(text){
    return text.toLowerCase().replace(/[^\w\s]/g,'');
}

function findFAQByIntent(input){
    const text = input.toLowerCase();
    let best = null;
    let bestScore = 0;

    for(const f of faqs){
        let score = 0;
        f.tags.forEach(tag=>{
            if(text.includes(tag)) score += 2;
            else if(tag.split(" ").some(word => text.includes(word))) score += 1;
        });
        if(score > bestScore){
            bestScore = score;
            best = f;
        }
    }
    return bestScore > 1 ? best : (typeof findBestFAQ === "function" ? findBestFAQ(input) : null);
}

// ---------- Time ----------
function getTime(){
    const now = new Date();
    return now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

// ---------- Messaging ----------
function addMessage(content, sender="bot", status="delivered", type="text"){
    const wrap=document.createElement("div");
    wrap.className="msgWrap";

    const msg=document.createElement("div");
    msg.className=`${sender} message`;

    if (type === "photo") {
        const img = document.createElement("img");
        img.src = content;
        img.style.maxWidth = "200px";
        img.style.borderRadius = "8px";
        img.style.display = "block";
        msg.appendChild(img);
    } else if (type === "video") {
        const vid = document.createElement("video");
        vid.src = content;
        vid.controls = true;
        vid.style.maxWidth = "200px";
        vid.style.borderRadius = "8px";
        vid.style.display = "block";
        msg.appendChild(vid);
    } else if (type === "document") {
        const docLink = document.createElement("a");
        docLink.href = content;
        docLink.target = "_blank";
        docLink.textContent = "📄 View Attached Document";
        docLink.style.color = "#ff4b2b";
        docLink.style.textDecoration = "underline";
        msg.appendChild(docLink);
    } else {
        msg.textContent = content;
    }

    wrap.appendChild(msg);

    if(sender==="user"){
        const meta=document.createElement("div");
        meta.className="meta";

        const time=document.createElement("span");
        time.className="timestamp";
        time.textContent=getTime();

        const tick=document.createElement("span");
        tick.className=`tick ${status}`;

        meta.appendChild(time);
        meta.appendChild(tick);
        wrap.appendChild(meta);
    }

    botMessagesContainer.appendChild(wrap);
    botMessagesContainer.scrollTop=botMessagesContainer.scrollHeight;

    return wrap;
}

function markAsSeen(wrap){
    if (!wrap) return;
    const tick=wrap.querySelector(".tick");
    if(tick){
        tick.classList.remove("delivered");
        tick.classList.add("seen");
    }
}

// ---------- INTENT ENGINE ----------
function detectIntent(msg){
    const text = msg.toLowerCase();
    if(/light mode|too dark|cant see|increase brightness/.test(text)) return {type:'theme', value:'light'};
    if(/dark mode|too bright|hurt.*eyes|reduce brightness/.test(text)) return {type:'theme', value:'dark'};
    if(/support|live chat|representative|human|agent|help|issue|problem|not working/.test(text)) return {type:'support'};
    if(/ticket|complaint|report issue/.test(text)) return {type:'ticket'};
    if(/logout|sign out|log me out|exit/.test(text)) return {type:'logout'};
    if(/quote|motivate|inspire/.test(text)) return {type:'quote'};
    return {type:'chat'};
}

function generateFollowUp(msg){
    const text = msg.toLowerCase();
    if(text.length < 5) return "Can you tell me a bit more about what you need?";
    if(/help|issue|problem|error|not working/.test(text)) return "Got you. Is this about a payment, account access, or something else?";
    if(text.includes("?")) return "Are you asking about support, rewards, or your account?";
    if(/money|earn|profit/.test(text)) return "Do you want to check your reward progress or understand how it works?";
    if(/how|where|what/.test(text)) return "I can guide you step-by-step—what exactly are you trying to do?";
    return "What would you like help with—support, tickets, rewards, or settings?";
}

// ---------- SMART RESPONSE ----------
function generateSmartReply(msg){
    const text = msg.toLowerCase();
    const isYes = /^(yes|yeah|sure|ok|please)\b/.test(text);
    const isNo = /^(no|not really|nah)\b/.test(text);

    // 1️⃣ CATEGORICAL SUPPORT CHECK: Force the routing question if they mention support/help keywords
    if (/support|live chat|representative|human|agent|help|issue|problem|not working/.test(text) || personality.lastIntent === "support") {
        if(/email|send email/.test(text)){
            personality.lastIntent = null;
            return "Send your request to avalonflowsystem.helpdesk@gmail.com with your issue details.";
        }
        if(/live|chat|representative|human|agent/.test(text)){
            personality.lastIntent = null;
            setTimeout(transitionToSarah, 600);
            return "Connecting you with Sarah now...";
        }
        personality.lastIntent = "support";
        return "Do you prefer email support or live chat with Sarah?";
    }

    // 2️⃣ STATE MANAGEMENT PRIORITY: Sarah handoff initial greeting confirmation check
    if (personality.awaitingSarahConfirm && isYes) {
        personality.awaitingSarahConfirm = false;
        setTimeout(transitionToSarah, 600);
        return "Understood. Connecting you with Sarah now...";
    }
    if (personality.awaitingSarahConfirm && isNo) {
        personality.awaitingSarahConfirm = false;
        return "Alright, let me know what you need help with instead.";
    }

    // Memory context setup
    const last = conversationMemory.slice(-2).map(m => m.content).join(" ").toLowerCase();
    const lastBot = conversationMemory.filter(m => m.role === "bot").at(-1)?.content.toLowerCase() || "";

    // 3️⃣ STATE MANAGEMENT PRIORITY: Deep conversation patterns
    if(last.includes("password") && text.includes("not working")){
        return "Got it—you’re having trouble resetting your password. Are you seeing an error or just not receiving the reset link?";
    }
    if(personality.lastIntent === "ticket" && /not working|failed|error/.test(text)){
        return "Is the ticket not generating or are you not seeing it in your dashboard?";
    }
    if(last.includes("payment") && text.includes("delay")){
        return "Are you referring to a payout delay or a transaction verification delay?";
    }

    // 4️⃣ GENERAL FAQ PARSING
    const faq = findFAQByIntent(msg);
    if(faq){
        personality.lastIntent = "faq";
        const variations = [
            faq.a,
            `${faq.a} Let me know if you want me to walk you through it.`,
            `Here’s what you need: ${faq.a}`,
            `${faq.a} — want help doing it now?`
        ];
        return variations[Math.floor(Math.random()*variations.length)];
    }

    if(isYes && lastBot.includes("ticket")){
        if (typeof generateTicket === "function") generateTicket();
        return "Done. Your support ticket has been created.";
    }
    if(isNo) return "Alright. What would you like help with instead?";

    // Reward calculation metrics
    if(/reward balance|progress|earnings balance|cashback/.test(text)){
        let unlocked=JSON.parse(localStorage.getItem('unlockedPlans'))||{};
        let unlockTimes=JSON.parse(localStorage.getItem('unlockTimes'))||{};
        let res="Bond progress:\n";

        ['premium','basic','lite','custom'].forEach(plan=>{
            if(unlocked[plan]){
                const now=Date.now();
                const elapsed=now-unlockTimes[plan];
                const total=plan==='premium'?14*86400000:plan==='basic'?28*86400000:42*86400000;
                const percent=Math.min(100,Math.round((elapsed/total)*100));
                res+=`${plan}: ${percent}%\n`;
            } else res+=`${plan}: Locked\n`;
        });
        return res;
    }

    const followUps = [
        generateFollowUp(msg),
        "Can you clarify that a bit for me?",
        "I want to make sure I understand—what exactly are you trying to do?",
        "Are you trying to fix something or just exploring?"
    ];

    const shortReply = msg.trim().split(" ").length <= 2;
    if(personality.lastIntent === "faq" && shortReply){
        personality.lastIntent = null;
        return "Want me to break that down step-by-step?";
    }
    if(personality.lastIntent === "ticket" && isYes){
        personality.lastIntent = null;
        return "Do you want to track it or describe the issue further?";
    }

    return followUps[Math.floor(Math.random()*followUps.length)];
}

const personality = { tone: "neutral", lastIntent: null, userMood: "unknown", awaitingSarahConfirm: false };

function adaptTone(msg){
    const text = msg.toLowerCase();
    if(/frustrated|angry|not working|annoying/.test(text)){
        personality.tone = "calm";
        personality.userMood = "frustrated";
    } else if(/thanks|nice|good/.test(text)){
        personality.tone = "friendly";
        personality.userMood = "positive";
    } else {
        personality.tone = "neutral";
    }
}

function humanize(text){
    const fillers = ["", "", "Alright… ", "Okay, so ", "Got it. ", "Hmm, ", "Let me see… ", "Right, ", "Makes sense. "];
    let prefix = fillers[Math.floor(Math.random()*fillers.length)];
    if(personality.tone === "calm") prefix = "I get how that can be frustrating. ";
    if(personality.tone === "friendly") return prefix + text + " 👍";
    return prefix + text;
}

// ---------- BOT EXECUTION ----------
function handleMessage(msg){
    if (isSarahActive) return;
    const lower = msg.toLowerCase();

    if(/^(hi|hello|hey|yo)\b/.test(lower)){
        const greetings = [
            "Hey 👋 I’m Kairos. What do you need help with?",
            "Hi there. I can help with support, tickets, rewards, or settings.",
            "Hey—what’s going on? Need help with something?",
            "Hello. Tell me what you're trying to do, I’ll guide you."
        ];
        botReply(greetings[Math.floor(Math.random()*greetings.length)]);
        return;
    }

    const intent = detectIntent(msg);
    if(intent.type==='theme'){
        if(typeof setTheme === "function") setTheme(intent.value);
        botReply(`Switched to ${intent.value} mode.`);
        return;
    }
    if(intent.type==='ticket'){
        personality.lastIntent = "ticket"; 
        if(typeof generateTicket === "function") generateTicket();
        botReply("Your ticket has been generated.");
        return;
    }
    if(intent.type==='logout'){
        botReply("Logging you out...");
        if(typeof logout === "function") setTimeout(()=>logout(),1000);
        return;
    }
    if(intent.type==='quote'){
        botReply(quotes[Math.floor(Math.random()*quotes.length)]);
        return;
    }

    adaptTone(msg);
    const reply = generateSmartReply(msg);
    botReply(reply);
}

function botReply(text){
    const finalText = humanize(text);
    showTyping();
    const delay = getTypingDelay(finalText);

    setTimeout(()=>{
        removeTyping();
        addMessage(finalText,"bot");

        conversationMemory.push({ role: "bot", content: finalText, type: "text", time: Date.now() });
        chatHistory.push({ sender: 'bot', text: finalText });
        localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
    }, delay);
}

// ---------- SEND TEXT OR PASTE LINK ----------
async function sendMessage(){
    const text = botInput.value.trim();
    if(!text) return;

    removeUserTyping();

    let type = "text";
    if (/\.(jpeg|jpg|gif|png)$/i.test(text)) type = "photo";
    if (/\.(mp4|webm|ogg|mov)$/i.test(text)) type = "video";

    const userMsg = addMessage(text,"user","delivered", type);
    botInput.value="";

    setTimeout(()=>markAsSeen(userMsg),800);

    conversationMemory.push({ role: "user", content: text, type: type, time: Date.now() });
    chatHistory.push({ sender: 'user', text: text });
    localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));

    if (type === "text") {
        handleMessage(text);
    } else {
        botReply("Thanks for the asset! A support manager will inspect it shortly.");
    }
    recordChatMessage();

    try {
        let endpoint = "sendMessage";
        let bodyPayload = { chat_id: CHAT_ID };

        if (type === "photo") {
            endpoint = "sendPhoto";
            bodyPayload.photo = text;
        } else if (type === "video") {
            endpoint = "sendVideo";
            bodyPayload.video = text;
        } else {
            bodyPayload.text = text;
        }

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bodyPayload)
        });
    } catch (e) {
        console.error('Outbound transmission drop.');
    }
}

// ---------- DIRECT LOCAL FILE ATTACHMENT UPLOADER ----------
botFileInput.addEventListener('change', async () => {
    const file = botFileInput.files[0];
    if (!file) return;

    let msgType = "document"; 
    if (file.type.startsWith("image/")) msgType = "photo";
    if (file.type.startsWith("video/")) msgType = "video";

    const localFileUrl = URL.createObjectURL(file);
    const userMsg = addMessage(localFileUrl, "user", "delivered", msgType);
    botFileInput.value = ""; 

    setTimeout(() => markAsSeen(userMsg), 800);

    chatHistory.push({ sender: 'user', text: `[Sent a local ${msgType}: ${file.name}]` });
    localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
    recordChatMessage();

    setTimeout(() => {
        botReply(`Received your attachment: ${file.name}. Transferring to support logs.`);
    }, 1000);

    try {
        const formData = new FormData();
        formData.append("chat_id", CHAT_ID);

        let endpoint = "sendDocument";
        if (msgType === "photo") {
            endpoint = "sendPhoto";
            formData.append("photo", file);
        } else if (msgType === "video") {
            endpoint = "sendVideo";
            formData.append("video", file);
        } else {
            formData.append("document", file);
        }

        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/${endpoint}`, {
            method: 'POST',
            body: formData
        });
    } catch (e) {
        console.error('Direct multi-part form stream drop:', e);
    }
});

botSendBtn.addEventListener('click', sendMessage);
botInput.addEventListener('keypress', e=>{ if(e.key==='Enter') sendMessage(); });

function recordChatMessage(){
    let chats=parseInt(localStorage.getItem("messagesSent")||0);
    chats++;
    localStorage.setItem("messagesSent",chats);
    if(typeof updateEngagementUI === "function") updateEngagementUI();
}

// ---------- Inbound Channel Telegram Processing Loop (Sequential Typing Fix) ----------
async function getTelegramFileUrl(fileId) {
    try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getFile?file_id=${fileId}`);
        const data = await res.json();
        if (data.ok) return `https://api.telegram.org/file/bot${BOT_TOKEN}/${data.result.file_path}`;
    } catch (e) { console.error("Media translation track err", e); }
    return null;
}

async function listenForTelegramMessages() {
    if (sessionStorage.getItem('active_chat_tab') !== currentTabId) {
        if (statusText) statusText.textContent = "Paused (Active in another tab)";
        scheduleNextCheck();
        return;
    }

    const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=20`;

    try {
        const response = await fetch(url);
        if (response.status === 429) {
            currentDelay = Math.min(currentDelay * 2, maxDelay); 
            scheduleNextCheck();
            return;
        }
        if (!response.ok) throw new Error('Dropped feed sync');

        const data = await response.json();

        if (data.ok && data.result.length > 0) {
            currentDelay = baseDelay;
            let chainDelay = 0;

            for (const update of data.result) {
                if (update.message) {
                    let msgContent = null;
                    let msgType = "text";

                    if (update.message.photo) {
                        const fileId = update.message.photo[update.message.photo.length - 1].file_id;
                        msgContent = await getTelegramFileUrl(fileId);
                        msgType = "photo";
                    } else if (update.message.video) {
                        const fileId = update.message.video.file_id;
                        msgContent = await getTelegramFileUrl(fileId);
                        msgType = "video";
                    } else if (update.message.document) {
                        const fileId = update.message.document.file_id;
                        msgContent = await getTelegramFileUrl(fileId);
                        msgType = "document";
                    } else if (update.message.text) {
                        msgContent = update.message.text;
                        msgType = "text";
                    }

                    if (msgContent) {
                        // Queue sequential typing triggers ahead of each message reveal
                        setTimeout(() => { showTyping(); }, chainDelay);
                        chainDelay += 1600; 

                        setTimeout(() => {
                            removeTyping();
                            addMessage(msgContent, 'bot', 'delivered', msgType);

                            conversationMemory.push({ role: "bot", content: msgContent, type: msgType, time: Date.now() });
                            chatHistory.push({ sender: 'bot', text: msgType === "text" ? msgContent : `[Received ${msgType}]` });
                            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
                        }, chainDelay);

                        chainDelay += 400; 
                    }
                    lastUpdateId = update.update_id;
                    localStorage.setItem('tg_last_update_id', lastUpdateId);
                }
            }
        }
    } catch (error) {
        currentDelay = Math.min(currentDelay * 1.5, maxDelay); 
    }
    scheduleNextCheck();
}

function scheduleNextCheck() {
    clearTimeout(pollingTimer);
    pollingTimer = setTimeout(listenForTelegramMessages, currentDelay);
}

function startQuoteAutorotation() {
    clearInterval(quoteRotationTimer);
    quoteRotationTimer = setInterval(() => {
        if (sessionStorage.getItem('active_chat_tab') === currentTabId && !isSarahActive) {
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            botReply(randomQuote);
        }
    }, 60000); 
}

function initiateKairosConversation() {
    if (chatHistory.length === 0) {
        showTyping();
        setTimeout(() => {
            removeTyping();
            personality.awaitingSarahConfirm = true;
            const initialGreeting = "Hey 👋 I’m Kairos. Welcome back! Do you want me to connect you with Sarah regarding any issues you might have?";
            addMessage(initialGreeting, "bot");

            conversationMemory.push({ role: "bot", content: initialGreeting, type: "text", time: Date.now() });
            chatHistory.push({ sender: 'bot', text: initialGreeting });
            localStorage.setItem('tg_chat_history_v3', JSON.stringify(chatHistory));
            startQuoteAutorotation();
        }, 1500);
    } else {
        const clearSarahActive = chatHistory.some(m => m.text && m.text.includes("this is Sarah"));
        if (clearSarahActive) {
            isSarahActive = true; 
            const botHeader = document.getElementById('botHeader');
            if (botHeader) {
                botHeader.style.background = sarahProfile.avatarColor;
                botHeader.textContent = sarahProfile.name;
            }
            if (statusText) statusText.textContent = sarahProfile.statusText;
        } else {
            startQuoteAutorotation();
        }
    }
}

function loadChatHistory() {
    if (chatHistory.length > 0) {
        chatHistory.forEach(item => {
            const wrap = document.createElement("div");
            wrap.className = "msgWrap";
            const msg = document.createElement("div");
            msg.className = `${item.sender} message`;
            msg.textContent = item.text;
            wrap.appendChild(msg);
            botMessagesContainer.appendChild(wrap);
        });
        botMessagesContainer.scrollTop = botMessagesContainer.scrollHeight;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    loadChatHistory();
    initiateKairosConversation();
    listenForTelegramMessages();
});
</script>
