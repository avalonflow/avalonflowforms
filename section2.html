<style>

    /* ---------- Base ---------- */
    body {
               font-family: 'Georgia', sans-serif; 
        margin: 0;
        background: #0d0d0d;
        color: #fff;
        overflow-x: hidden;
padding-right:20px;
padding-left:16px;
    }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ---------- Floating Background ---------- */
    #floating-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(circle at bottom, #1a0d3a, #0d0d0d);
        overflow: hidden;
    }
    .particle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.6;
        animation: floatParticles linear infinite;
        box-shadow: 0 0 10px #6b2cd8, 0 0 20px #6b2cd8;
    }
    @keyframes floatParticles {
        0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ---------- Panels & Glass Cards ---------- */
      .glass-card { background:rgba(255,255,255,0.12); backdrop-filter:blur(12px); border-radius:18px; padding:28px; margin-bottom:28px; box-shadow:0 10px 30px rgba(0,0,0,0.35); max-width:570px; margin-left:auto; margin-right:auto; }

/* Reuse Section 3 glow + hover for cards */
.payment-method {
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 28px;
  margin-bottom: 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  transition: 0.3s ease, transform 0.2s ease;
}

.payment-method:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(107,44,216,0.5); /* purple glow on hover */
}

/* Continuous shimmer + purple glow on all cards */
.payment-method.active::after {
    content: '';
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
      120deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.15) 50%,
      rgba(255,255,255,0) 100%
    );
    transform: skewX(-20deg);
    animation: shimmer 1.5s infinite;
    pointer-events: none;
    z-index: 2;
}

/* Glow around card (pulsing purple) */
.payment-method::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(107,44,216,0.25), transparent 70%);

    transform: scale(1);

    pointer-events: none;

}

@keyframes shimmer {
    0% { left: -75%; }
    50% { left: 125%; }

}

@keyframes glowPulse {

/* ================= Header Logo Card Neon ================= */
header .logo-card {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 90%;
  max-width: 300px;
  height: 180px;
  border-radius: 24px;

  margin: 0 auto;

  /* Smooth pulsing */
  animation: neonGlow 2.5s ease-in-out infinite alternate;
  transition: box-shadow 0.3s ease;
  overflow: hidden;
}

/* Inner border glow */
header .logo-card::before {
  content: '';
  position: absolute;
  inset: 2px; /* slightly smaller than card edges */
  border-radius: 22px;
  border: 2px solid rgba(107,44,216,0.6);

    0 0 20px rgba(107,44,216,0.6),
    0 0 30px rgba(107,44,216,0.4);
  pointer-events: none;
  z-index: 1;
  animation: innerGlow 2.5s ease-in-out infinite alternate;
}

/* Animated halo behind logo */
header .logo-card::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120%;
  height: 120%;
  background: radial-gradient(circle, rgba(107,44,216,0.4) 0%, transparent 70%);
  transform: translate(-50%, -50%) scale(1);
  border-radius: 50%;
  z-index: 0; /* behind logo image */
  animation: haloPulse 2.5s ease-in-out infinite alternate;
  pointer-events: none;
}

/* Image inside card stays on top */

  max-width: 90%;
  max-height: 90%;

  z-index: 2;

}

/* Outer glow pulse animation */
@keyframes neonGlow {
  0% {
    box-shadow: 
      0 0 15px rgba(107,44,216,0.4),
      0 0 30px rgba(107,44,216,0.3),
      0 0 50px rgba(107,44,216,0.2),

  50% {
    box-shadow: 
      0 0 25px rgba(107,44,216,0.8),
      0 0 50px rgba(107,44,216,0.6),
      0 0 80px rgba(107,44,216,0.4),
      0 0 120px rgba(107,44,216,0.25);

  100% {
    box-shadow: 
      0 0 15px rgba(107,44,216,0.4),
      0 0 30px rgba(107,44,216,0.3),
      0 0 50px rgba(107,44,216,0.2),
      0 0 100px rgba(107,44,216,0.15);

}

/* Inner border glow pulse animation */

  0% {

      0 0 5px rgba(107,44,216,0.5),
      0 0 10px rgba(107,44,216,0.4),
      0 0 15px rgba(107,44,216,0.3);

      0 0 10px rgba(107,44,216,0.4),
      0 0 15px rgba(107,44,216,0.3);

    opacity: 0.7;

<script>
window.addEventListener("DOMContentLoaded", () => {

    /* ---------- Floating Particles ---------- */
    const bg = document.getElementById('floating-bg');
    const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
    function particle() {
        const p = document.createElement('div');
        p.className = 'particle';
        const s = Math.random()*20+10;
        p.style.width = s+'px';
        p.style.height = s+'px';
        p.style.left = Math.random()*100+'vw';
        p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
        p.style.animationDuration = (Math.random()*20+10)+'s';
        bg.appendChild(p);
        setTimeout(()=>p.remove(),30000);
    }
    setInterval(particle,800);

        /* ---------- Notification ---------- */
    const notification = document.getElementById("planNotification");
    if (notification) {
        notification.textContent = "Welcome! Let’s get started.";

        setTimeout(() => notification.classList.add("show"), 300);
        setTimeout(() => notification.classList.remove("show"), 3300);
    }

    /* ---------- INIT EVERYTHING HERE ---------- */
    initSelect2();
    autoDetectCountry();
    setupPasswordSystem("password", "confirmPassword");

});

    


function setupPasswordSystem(passwordId, confirmId){

    const password = document.getElementById(passwordId);
    const confirm = document.getElementById(confirmId);

    /* =========================
       EYE TOGGLE
    ========================= */
    function addEyeToggle(input){

        const wrapper = document.createElement("div");
        wrapper.className = "input-wrapper";

        input.parentNode.insertBefore(wrapper, input);
        wrapper.appendChild(input);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pass-toggle";

        btn.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        `;

        wrapper.appendChild(btn);

        let timer = null;

        btn.onclick = () => {

            const isHidden = input.type === "password";
            input.type = isHidden ? "text" : "password";

            clearTimeout(timer);

            if(isHidden){
                timer = setTimeout(() => {
                    input.type = "password";
                }, 5000);
            }
        };
    }

    addEyeToggle(password);
    addEyeToggle(confirm);

    /* =========================
       LOGIC
    ========================= */
    function calculateStrength(val){
        let score = 0;

        if(val.length > 5) score++;
        if(val.length > 8) score++;
        if(/[A-Z]/.test(val)) score++;
        if(/[0-9]/.test(val)) score++;
        if(/[^A-Za-z0-9]/.test(val)) score++;

        return Math.min(score, 4);
    }

    function renderBars(meter, score){

        const bars = meter.querySelectorAll("div");

        bars.forEach((bar, i) => {
            bar.style.opacity = "1";
            bar.style.background =
                i < score
                    ? (score <= 1 ? "#ff4d4d" :
                       score === 2 ? "#ffb84d" :
                       "#4caf50")
                    : "#e0e0e0";
        });
    }

    function createBars(id){

        const meter = document.getElementById(id);
        if(!meter) return;

        meter.innerHTML = "";

        for(let i = 0; i < 4; i++){
            const bar = document.createElement("div");
            bar.style.height = "4px";
            bar.style.flex = "1";
            bar.style.background = "#e0e0e0";
            bar.style.borderRadius = "2px";
            bar.style.transition = "0.2s";
            meter.appendChild(bar);
        }
    }

    /* ✅ FIXED IDS (OPTION A) */
    createBars("strength-meter-password");
    createBars("strength-meter-confirm");

    /* =========================
       SYNC
    ========================= */
    password.addEventListener("input", sync);
    confirm.addEventListener("input", sync);

    function sync(){

        const passVal = password.value;
        const confVal = confirm.value;

        const passScore = calculateStrength(passVal);
        const confScore = calculateStrength(confVal);

        const passMeter = document.getElementById("strength-meter-password");
        const passLabel = document.getElementById("strength-label-password");

        const confMeter = document.getElementById("strength-meter-confirm");
        const confLabel = document.getElementById("strength-label-confirm");

        /* =========================
           PASSWORD
        ========================= */
        if(passLabel){
            passLabel.textContent =
                passVal.length === 0 ? "" :
                passScore <= 1 ? "Weak" :
                passScore === 2 ? "Medium" :
                "Strong";

            passLabel.style.color =
                passScore <= 1 ? "#ff4d4d" :
                passScore === 2 ? "#ffb84d" :
                "#4caf50";
        }

        if(passMeter) renderBars(passMeter, passScore);

        /* =========================
           CONFIRM
        ========================= */
        if(confVal.length === 0){
            if(confLabel) confLabel.textContent = "";
            if(confMeter) renderBars(confMeter, 0);
            return;
        }

        const mismatch = confVal !== passVal;

        if(mismatch){

            if(confLabel){
                confLabel.textContent = "Doesn't match password";
                confLabel.style.color = "#ff4d4d";
            }

            if(confMeter){
                confMeter.querySelectorAll("div").forEach(bar => {
                    bar.style.opacity = "0.25";
                });
            }

        } else {

            if(confLabel){
                confLabel.textContent =
                    confScore <= 1 ? "Weak" :
                    confScore === 2 ? "Medium" :
                    "Strong";

                confLabel.style.color =
                    confScore <= 1 ? "#ff4d4d" :
                    confScore === 2 ? "#ffb84d" :
                    "#4caf50";
            }

            if(confMeter) renderBars(confMeter, confScore);
        }
    }
}

    const passVal = password.value || "";

    // ❌ DO NOT SAVE if password mismatch OR incomplete state
    if (!emailVal || !passVal) return;
    if (passVal !== confirmVal) return;

    const data = {
  fullName: fullName.value?.trim() || "",
  email: emailVal,
  password: passVal,
  confirmPassword: confirmVal,
  location: window.jQuery ? $('#location').val() : locationEl.value || "",
  experience: experience || "",
  isPasswordValid: passVal && confirmVal && passVal === confirmVal
};

}
