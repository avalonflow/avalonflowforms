<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AvalonFlow – Section 2</title>

        <!-- Favicon as .ico -->
<link rel="icon" href="/favicon.png" type="image/png" sizes="48x48">

        <!-- Structured Data for Logo -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "AvalonFlow",
      "url": "https://avalonflow.site",
      "logo": "https://avalonFlow.site/favicon.png"
    }
</script>

<style>
*, *::before, *::after {
  box-sizing: border-box;
}

    /* ---------- Base ---------- */
    body {
        font-family: Georgia, serif;
        margin: 0;
        background: #0d0d0d;
        color: #fff;
        overflow-x: hidden;
padding-right:20px;
padding-left:16px;
    }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }

    /* ---------- Floating Background ---------- */
    #floating-bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
        background: radial-gradient(circle at bottom, #1a0d3a, #0d0d0d);
        overflow: hidden;
    }
    .particle {
        position: absolute;
        border-radius: 50%;
        opacity: 0.6;
        animation: floatParticles linear infinite;
        box-shadow: 0 0 10px #6b2cd8, 0 0 20px #6b2cd8;
    }
    @keyframes floatParticles {
        0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }

    /* ---------- Panels & Glass Cards ---------- */
      .glass-card { background:rgba(255,255,255,0.12); backdrop-filter:blur(12px); border-radius:18px; padding:28px; margin-bottom:28px; box-shadow:0 10px 30px rgba(0,0,0,0.35); max-width:570px; margin-left:auto; margin-right:auto; }

/* Reuse Section 3 glow + hover for cards */
.payment-method {
  position: relative;
  overflow: hidden;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(12px);
  border-radius: 18px;
  padding: 28px;
  margin-bottom: 28px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  transition: 0.3s ease, transform 0.2s ease;
}

.payment-method:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(107,44,216,0.5); /* purple glow on hover */
}

/* Continuous shimmer + purple glow on all cards */
.payment-method::after {
    content: '';
    position: absolute;
    top: 0;
    left: -75%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
      120deg,
      rgba(255,255,255,0) 0%,
      rgba(255,255,255,0.15) 50%,
      rgba(255,255,255,0) 100%
    );
    transform: skewX(-20deg);
    animation: shimmer 1.5s infinite;
    pointer-events: none;
    z-index: 2;
}

/* Glow around card (pulsing purple) */
.payment-method::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(107,44,216,0.25), transparent 70%);
    opacity: 0.5;
    transform: scale(1);
    animation: glowPulse 2.5s ease-in-out infinite;
    pointer-events: none;
    z-index: 1;
}

@keyframes shimmer {
    0% { left: -75%; }
    50% { left: 125%; }
    100% { left: 125%; }
}

@keyframes glowPulse {
    0% { transform: scale(1); opacity: 0.4; }
    50% { transform: scale(1.05); opacity: 0.6; }
    100% { transform: scale(1); opacity: 0.4; }
}



/* Input styling */
.payment-method input{
  width: 100%;
  padding: 14px 16px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: #fff;
/* FIX */
  box-sizing: border-box;
}

  .payment-method input::placeholder{
  color: #ccc;
  font-style: italic;
}

    input { width:100%; padding:14px; margin-top:10px; border-radius:12px; border:none; background:rgba(255,255,255,0.15); color:#fff; }

    button {
        padding: 12px 24px;
        border-radius: 12px;
        border: none;
        font-weight: bold;
        background: rgba(107,44,216,0.6);
        color: #fff;
        cursor: pointer;
    }

    .option-btn {
  background: rgba(255,255,255,0.15);
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  font-weight: bold;
  color: #fff;
  cursor: pointer;
  transition: 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
  position: relative;
}

.option-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 18px rgba(107,44,216,0.5); /* purple glow */
}

.option-btn.active {
  border: 1px solid #6b2cd8;
  box-shadow: 0 0 18px rgba(107,44,216,0.5); /* purple glow when selected */
}

/* Animated purple glow for heading */
.heading-glow::before {
  content: '';
  position: absolute;
  width:120%;
height:120%;
left:-10%;
top:-10%;
  background: radial-gradient(circle at center, rgba(107,44,216,0.25), transparent 70%);
  opacity: 0.5;
  transform: scale(1);
  animation: glowPulse 2.5s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

@keyframes glowPulse {
  0% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.05); opacity: 0.6; }
  100% { transform: scale(1); opacity: 0.4; }
}

/* Red warning glow around container */
.warning {
    animation: warning-glow 0.8s ease-in-out 2;
    box-shadow: 0 0 20px 4px rgba(255,77,77,0.9);
    border-radius: 18px;
}
@keyframes warning-glow {
    0% { box-shadow: 0 0 0 rgba(255,77,77,0.7); }
    50% { box-shadow: 0 0 20px 6px rgba(255,77,77,0.9); }
    100% { box-shadow: 0 0 0 rgba(255,77,77,0.7); }
}

/* ================= Header Logo Card Neon ================= */
header .logo-card {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 90%;
  max-width: 300px;
  height: 180px;
  border-radius: 24px;

  /* Purple glass */
  background: rgba(107,44,216,0.2);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(107,44,216,0.4);

  /* Outer neon glow */
  box-shadow: 
    0 0 10px rgba(107,44,216,0.5),
    0 0 20px rgba(107,44,216,0.4),
    0 0 40px rgba(107,44,216,0.3),
    0 0 80px rgba(107,44,216,0.2);
  position: relative;
  margin: 0 auto;

  /* Smooth pulsing */
  animation: neonGlow 2.5s ease-in-out infinite alternate;
  transition: box-shadow 0.3s ease;
  overflow: hidden;
}

/* Inner border glow */
header .logo-card::before {
  content: '';
  position: absolute;
  inset: 2px; /* slightly smaller than card edges */
  border-radius: 22px;
  border: 2px solid rgba(107,44,216,0.6);
  box-shadow:
    0 0 10px rgba(107,44,216,0.8),
    0 0 20px rgba(107,44,216,0.6),
    0 0 30px rgba(107,44,216,0.4);
  pointer-events: none;
  z-index: 1;
  animation: innerGlow 2.5s ease-in-out infinite alternate;
}

/* Animated halo behind logo */
header .logo-card::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 120%;
  height: 120%;
  background: radial-gradient(circle, rgba(107,44,216,0.4) 0%, transparent 70%);
  transform: translate(-50%, -50%) scale(1);
  border-radius: 50%;
  z-index: 0; /* behind logo image */
  animation: haloPulse 2.5s ease-in-out infinite alternate;
  pointer-events: none;
}

/* Image inside card stays on top */
header .logo-card img {
  max-width: 90%;
  max-height: 90%;
  height: auto;
  z-index: 2;
  position: relative;
}

/* Outer glow pulse animation */
@keyframes neonGlow {
  0% {
    box-shadow: 
      0 0 15px rgba(107,44,216,0.4),
      0 0 30px rgba(107,44,216,0.3),
      0 0 50px rgba(107,44,216,0.2),
      0 0 100px rgba(107,44,216,0.15);
  }
  50% {
    box-shadow: 
      0 0 25px rgba(107,44,216,0.8),
      0 0 50px rgba(107,44,216,0.6),
      0 0 80px rgba(107,44,216,0.4),
      0 0 120px rgba(107,44,216,0.25);
  }
  100% {
    box-shadow: 
      0 0 15px rgba(107,44,216,0.4),
      0 0 30px rgba(107,44,216,0.3),
      0 0 50px rgba(107,44,216,0.2),
      0 0 100px rgba(107,44,216,0.15);
  }
}

/* Inner border glow pulse animation */
@keyframes innerGlow {
  0% {
    box-shadow:
      0 0 5px rgba(107,44,216,0.5),
      0 0 10px rgba(107,44,216,0.4),
      0 0 15px rgba(107,44,216,0.3);
  }
  50% {
    box-shadow:
      0 0 15px rgba(107,44,216,0.8),
      0 0 25px rgba(107,44,216,0.6),
      0 0 35px rgba(107,44,216,0.4);
  }
  100% {
    box-shadow:
      0 0 5px rgba(107,44,216,0.5),
      0 0 10px rgba(107,44,216,0.4),
      0 0 15px rgba(107,44,216,0.3);
  }
}

/* Halo pulse animation behind logo */
@keyframes haloPulse {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.5;
  }
  50% {
    transform: translate(-50%, -50%) scale(1.15);
    opacity: 0.7;
  }
  100% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.5;
  }
}

        /* ---------- Notification Bar ---------- */
        .notification-bar {
            position: fixed;
            top: -80px;
            right: 20px;
            background: rgba(30, 144, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(30,144,255,0.4);
            color: #fff;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            transition: top 0.5s ease, opacity 0.5s ease;
            z-index: 9999;
            opacity: 0;
            max-width: 350px;
            white-space: normal;
            overflow: hidden;
        }
        .notification-bar.show {
            top: 20px;
            opacity: 1;
        }
        .notification-bar::before {
            content: '';
            position: absolute;
            left: -50%;
            top: 0;
            width: 50%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            transform: skewX(-25deg);
            animation: liquidWave 2s linear infinite;
        }
        @keyframes liquidWave {
            0% { left: -50%; }
            100% { left: 100%; }
        }

    footer {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        text-align: center;
        padding: 18px 0;
        font-size: 14px;
        color: #aaa;
        background: rgba(15,15,25,0.95);
        backdrop-filter: blur(12px);
        box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
        z-index: 6;
    }

.heading-glow{
  font-weight: bold;
  font-size: 1.8rem;

  background: linear-gradient(90deg,#6b2cd8,#b393ff,#6b2cd8);
  background-size: 200% auto;
  animation: gradientShift 6s linear infinite;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

@keyframes gradientShift{
  0% { background-position: 0% center; }
  100% { background-position: 200% center; }
}
</style>
</head>

<body>
<div id="floating-bg"></div>

        <!-- Notification Bar -->
        <div id="planNotification" class="notification-bar"></div>

<header style="text-align:center; padding:40px 0;">
  <div class="logo-card">
    <img src="assets/pictures/imagitool-export (26).jpg" alt="AvalonFlow Logo">
  </div>
</header>

<!-- Account Setup Heading (outside any card) -->
<div style="text-align:center; margin:40px 0; position:relative;">
  <h2 class="heading-glow">
    Account Setup {Basic Information}
  </h2>
</div>



<!-- Form Cards -->
<section id="section2">
  <!-- Full Name -->
  <div class="glass-card payment-method">
    <h3>👤 Full Name</h3>
    <input id="fullName" placeholder="Enter your full name">
  </div>

  <!-- Email -->
  <div class="glass-card payment-method">
    <h3>📧 Email Address</h3>
    <input id="email" type="email" placeholder="Enter your email address">
  </div>

  <!-- Location -->
  <div class="glass-card payment-method">
    <h3>🌆 City/Country</h3>
    <p style="font-style:italic; font-weight:bold;">This helps us personalize your experience.</p>
    <input id="location" placeholder="Enter your location">
  </div>

  <!-- Experience -->
  <div class="glass-card payment-method">
    <h3>👨‍💻 Familiarity with digital systems</h3>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:14px;">
        <button class="option-btn" data-value="Beginner">Beginner</button>
        <button class="option-btn" data-value="Intermediate">Intermediate</button>
        <button class="option-btn" data-value="Expert">Expert</button>
    </div>
  </div>

  <!-- Navigation Buttons -->
<div id="navButtons" style="max-width:600px;margin:40px auto 100px; display:flex;justify-content:space-between; position:relative; z-index:5;">
    <button id="prevBtn" style="background: rgba(107,44,216,0.9); border:1px solid #fff; padding:12px 24px; border-radius:12px; font-weight:bold; color:#fff;">Previous</button>
    <button id="nextBtn" style="background: rgba(107,44,216,0.9); border:1px solid #fff; padding:12px 24px; border-radius:12px; font-weight:bold; color:#fff;">Next</button>
</div>

</section>

<footer>
    © 2026 AvalonFlow • Powered by Centrical™
</footer>

<script>
window.addEventListener("DOMContentLoaded", () => {

    /* ---------- Floating Particles ---------- */
    const bg = document.getElementById('floating-bg');
    const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
    function particle() {
        const p = document.createElement('div');
        p.className = 'particle';
        const s = Math.random()*20+10;
        p.style.width = s+'px';
        p.style.height = s+'px';
        p.style.left = Math.random()*100+'vw';
        p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
        p.style.animationDuration = (Math.random()*20+10)+'s';
        bg.appendChild(p);
        setTimeout(()=>p.remove(),30000);
    }
    setInterval(particle,800);

        /* ---------- Notification ---------- */
        window.addEventListener("load", () => {
            const notification = document.getElementById("planNotification");
            notification.textContent = "Welcome! Let’s get started.";
            setTimeout(() => notification.classList.add("show"), 300);
            setTimeout(() => notification.classList.remove("show"), 3300);
        });

    /* Input elements */
  const fullName = document.getElementById("fullName");
  const email = document.getElementById("email");
  const location = document.getElementById("location");
 
  let experience = "";

  /* ---------- RESTORE SAVED DATA ---------- */
  const savedData = JSON.parse(localStorage.getItem("section2Data")) || {};

  if (savedData.fullName) fullName.value = savedData.fullName;
  if (savedData.email) email.value = savedData.email;
  if (savedData.location) location.value = savedData.location;
  if (savedData.experience) experience = savedData.experience;

  /* Restore experience button UI */
  document.querySelectorAll(".option-btn").forEach(btn => {
    if (btn.dataset.value === experience) {
      btn.classList.add("active");
    }
  });

  /* ---------- AUTO-SAVE ON INPUT ---------- */
  function saveSection2() {
    localStorage.setItem("section2Data", JSON.stringify({
      fullName: fullName.value.trim(),
      email: email.value.trim(),
      location: location.value.trim(),
      experience
    }));
  }

  fullName.addEventListener("input", saveSection2);
  email.addEventListener("input", saveSection2);
  location.addEventListener("input", saveSection2);

  /* ---------- EXPERIENCE BUTTONS ---------- */
  document.querySelectorAll(".option-btn").forEach(btn => {
    btn.onclick = () => {
      experience = btn.dataset.value;

      document.querySelectorAll(".option-btn")
        .forEach(b => b.classList.remove("active"));

      btn.classList.add("active");
      saveSection2(); // persist experience immediately
    };
  });

  /* ---------- NAVIGATION ---------- */
  document.getElementById("prevBtn").onclick = () => {
    window.location.href = "https://avalonflow.site/"; // Section 1
  };

  document.getElementById("nextBtn").onclick=()=>{
        let hasError=false;
        const inputs=[fullName,email,location];
        inputs.forEach(input=>{
            if(!input.value.trim()){
                hasError=true;
                input.closest(".payment-method").classList.add("warning");
                setTimeout(()=>input.closest(".payment-method").classList.remove("warning"),2200);
            }
        });
        if(!experience){
            hasError=true;
            const experienceCard=document.querySelector(".payment-method:nth-of-type(4)");
            experienceCard.classList.add("warning");
            setTimeout(()=>experienceCard.classList.remove("warning"),2200);
        }
        if(hasError) return;
        saveSection2();
        window.location.href="https://link.avalonflow.site/section3";
    };
});

/* ---------- FINGERPRINT ---------- */
function getFingerprint() {
  return btoa(
    navigator.userAgent +
    screen.width + screen.height +
    navigator.language
  );
}

/* ---------- BLOCK ACCESS AFTER SUBMISSION ---------- */
if (localStorage.getItem("formSubmitted") === "true") {
  window.location.href = "after-submission";
}
</script>

</body>
</html>
